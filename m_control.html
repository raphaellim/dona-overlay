<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>크리에이터별 도네이터 전체 리스트</title>
<link rel="stylesheet" href="/app.css">
<style>
  body{background:#070b12;color:#e5e7eb}
  .wrap{max-width:1180px;margin:0 auto;padding:22px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
  .title{font-size:28px;font-weight:900;letter-spacing:-.06em}
  .nav{display:flex;gap:8px;flex-wrap:wrap}
  .nav a,.btn{text-decoration:none;color:#dbeafe;background:#111827;border:1px solid #334155;padding:9px 12px;border-radius:11px;font-weight:900;cursor:pointer}
  .card{background:#0b1220;border:1px solid #253247;border-radius:18px;padding:16px;margin-bottom:14px}
  .resultBox{background:#08111f;border:1px solid #334155;border-radius:12px;padding:12px 14px;font-weight:900;color:#dbeafe;margin-bottom:14px}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  select{background:#070b12;color:#e5e7eb;border:1px solid #334155;border-radius:12px;padding:10px 12px;min-width:240px;font-weight:900}
  .summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
  .summary-box{background:#101827;border:1px solid #334155;border-radius:14px;padding:12px 13px}
  .summary-label{font-size:12px;color:#94a3b8;font-weight:900;margin-bottom:5px}
  .summary-value{font-size:24px;font-weight:900;letter-spacing:-.05em;color:#f8fafc}
  .option-grid{display:flex;gap:8px;flex-wrap:wrap}
  .option-pill{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;background:#172554;color:#dbeafe;font-weight:900;font-size:14px}
  .option-plus{color:#5ecbff}
  .option-minus{color:#ff4d5e}
  .option-zero{color:#ffe066}
  .table{width:100%;border-collapse:collapse;font-size:14px}
  .table th,.table td{border-bottom:1px solid #1f2937;padding:9px 8px;text-align:left;white-space:nowrap}
  .table th{color:#93c5fd;font-weight:900;background:#0f172a}
  .table tr:hover td{background:#101827}
  .num{text-align:right!important;font-variant-numeric:tabular-nums}
  .center{text-align:center!important}
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;color:#cbd5e1;font-weight:900}
  @media(max-width:900px){
    .top{align-items:flex-start;flex-direction:column}
    .summary-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">크리에이터별 도네이터 전체 리스트</div>
    <div class="nav">
      <a href="/summary.html">합산으로</a>
      <a href="/donations.html">전체 입력</a>
      <a href="/control.html">방송컨트롤</a>
    </div>
  </div>

  <div id="currentBroadcast" class="resultBox">현재 방송 확인 중...</div>

  <section class="card">
    <div class="toolbar">
      <b>크리에이터 선택</b>
      <select id="creatorSelect" onchange="changeCreator()"></select>
    </div>

    <div class="summary-grid">
      <div class="summary-box">
        <div class="summary-label">전체 후원금액</div>
        <div class="summary-value" id="sumTotal">0</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">계좌 합계</div>
        <div class="summary-value" id="sumAccount">0</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">투네 합계</div>
        <div class="summary-value" id="sumToonie">0</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">도네이터 수</div>
        <div class="summary-value" id="sumDonorCount">0</div>
      </div>
    </div>

    <div class="option-grid" id="optionSummary"></div>
  </section>

  <section class="card">
    <table class="table">
      <thead>
        <tr>
          <th class="center">순번</th>
          <th>도네이터</th>
          <th class="num">계좌</th>
          <th class="num">투네</th>
          <th class="num">합산</th>
          <th>최근처리</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="pager">
      <button class="btn" onclick="prevPage()">이전</button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn" onclick="nextPage()">다음</button>
    </div>
  </section>
</div>

<script src="/common.js"></script>
<script>
let summary = null;
let selectedCreator = '';
let page = 1;
const pageSize = 20;

async function load(){
  summary = await api('/api/summary');
  $('#currentBroadcast').textContent = summary.broadcast ? `현재 방송: ${summary.broadcast.title}` : '현재 방송 없음';

  const params = new URLSearchParams(location.search);
  const requested = params.get('creator') || '';

  const names = (summary.creators || []).map(r => r.creator);
  if(!selectedCreator){
    selectedCreator = requested && names.includes(requested) ? requested : (names[0] || '');
  }

  $('#creatorSelect').innerHTML = names.map(n => `
    <option value="${escAttr(n)}" ${n === selectedCreator ? 'selected' : ''}>${esc(n)}</option>
  `).join('');

  render();
}

function currentCreator(){
  return (summary.creators || []).find(c => c.creator === selectedCreator) || null;
}

function changeCreator(){
  selectedCreator = $('#creatorSelect').value;
  page = 1;
  history.replaceState(null, '', '/creator_detail.html?creator=' + encodeURIComponent(selectedCreator));
  render();
}

function fmtMan(won){
  return displayMan(Number(won || 0)).toFixed(1).replace(/\.0$/, '');
}

function getOptionSummary(creator){
  const presets = (summary?.settings?.presets || []).filter(p => p.enabled !== false);
  const nets = Array.isArray(creator?.presetNets) ? creator.presetNets : [];

  return presets.map(preset => {
    const found = nets.find(n =>
      (n.presetId && n.presetId === preset.id) ||
      (n.presetTitle && n.presetTitle === preset.title)
    );

    let plus = 0;
    let minus = 0;
    let plusName = preset.plusName || '+';
    let minusName = preset.minusName || '-';

    if(found){
      plus = Number(found.plus || 0);
      minus = Number(found.minus || 0);
      plusName = found.plusName || plusName;
      minusName = found.minusName || minusName;
    }else{
      if(preset.id === 'smoke'){
        const net = Number(creator.smokeNet || 0);
        if(net > 0) plus = net;
        if(net < 0) minus = Math.abs(net);
      }
      if(preset.id === 'food'){
        const net = Number(creator.eatNet || creator.foodNet || 0);
        if(net > 0) plus = net;
        if(net < 0) minus = Math.abs(net);
      }
    }

    const net = plus - minus;

    if(net > 0){
      return { text: `${plusName} +${net}`, className: 'option-plus' };
    }
    if(net < 0){
      return { text: `${minusName} -${Math.abs(net)}`, className: 'option-minus' };
    }
    return { text: `${preset.title} 0`, className: 'option-zero' };
  });
}

function renderSummaryBoxes(creator){
  if(!creator){
    $('#sumTotal').textContent = '0';
    $('#sumAccount').textContent = '0';
    $('#sumToonie').textContent = '0';
    $('#sumDonorCount').textContent = '0';
    $('#optionSummary').innerHTML = '';
    return;
  }

  $('#sumTotal').textContent = creator.totalText || fmtMan(creator.total);
  $('#sumAccount').textContent = creator.accountText || fmtMan(creator.account);
  $('#sumToonie').textContent = creator.toonieText || fmtMan(creator.toonie);
  $('#sumDonorCount').textContent = String((creator.donorSummary || []).length);

  const optionRows = getOptionSummary(creator);
  $('#optionSummary').innerHTML = optionRows.map(o => `
    <span class="option-pill ${o.className}">${esc(o.text)}</span>
  `).join('');
}

function render(){
  const c = currentCreator();
  renderSummaryBoxes(c);

  const rows = c ? (c.donorSummary || []) : [];
  const maxPage = Math.max(1, Math.ceil(rows.length / pageSize));

  if(page > maxPage) page = maxPage;

  const start = (page - 1) * pageSize;
  const pageRows = rows.slice(start, start + pageSize);

  $('#rows').innerHTML = pageRows.map((r, idx) => `
    <tr>
      <td class="center">${start + idx + 1}</td>
      <td><b>${esc(r.donor)}</b></td>
      <td class="num">${r.accountText}</td>
      <td class="num">${r.toonieText}</td>
      <td class="num"><b>${r.totalText}</b></td>
      <td>${esc(r.latestProcess || '')}</td>
    </tr>
  `).join('');

  $('#pageInfo').textContent = `${page} / ${maxPage}`;
}

function prevPage(){
  if(page > 1){
    page--;
    render();
  }
}

function nextPage(){
  const c = currentCreator();
  const rows = c ? (c.donorSummary || []) : [];
  const maxPage = Math.max(1, Math.ceil(rows.length / pageSize));

  if(page < maxPage){
    page++;
    render();
  }
}

function escAttr(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

load();
</script>

<script>
(function preserveStationLinks(){
  const station = new URLSearchParams(location.search).get('station') || localStorage.getItem('STATION_SLUG') || 'default';
  localStorage.setItem('STATION_SLUG', station);
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    const href=a.getAttribute('href');
    if(!href || href.includes('station=') || href.startsWith('/api/')) return;
    const u=new URL(href, location.origin);
    u.searchParams.set('station', station);
    a.setAttribute('href', u.pathname+u.search+(u.hash||''));
  });
})();
</script>

</body>
</html>
