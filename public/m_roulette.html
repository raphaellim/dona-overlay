<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>모바일 룰렛</title><link rel="stylesheet" href="/assets/css/roulette-admin.css"></head><body class="mobile"><div class="wrap"><div class="top"><div><div class="title">모바일 룰렛</div><div class="sub">체크형 선택 / 연속 수동 실행 / 금액 자동 룰렛</div></div><div class="row"><a id="backControl" href="/m_control.html">모바일 컨트롤</a><a id="pcLink" href="/roulette.html">PC</a></div></div><div class="tabs"><button class="tab" data-open="manual">수동</button><button class="tab" data-open="auto">자동</button><button class="tab" data-open="lists">리스트</button><button class="tab" data-open="result">결과</button></div><div id="status" class="status"></div><section data-tab="manual" class="card"><h2>돌릴 룰렛 선택</h2><div id="manualList" class="list"></div><div class="row"><button class="btn big" onclick="startRoulette()">START</button><button class="btn cyan big" onclick="startRoulette()">한 번 더</button><button class="btn gray" onclick="resetOverlay()">결과 숨김</button></div></section><section data-tab="auto" class="card hidden"><h2>자동 룰렛</h2><label class="row"><input id="enabled" class="checkbox" type="checkbox"> 룰렛 기능 사용</label><div class="row"><label>회전 시간(ms)<input id="duration" class="input" type="number"></label><label>결과 유지(ms)<input id="hold" class="input" type="number"></label><label>위치<select id="mode" class="select"><option value="center">중앙 크게</option><option value="side">우측 박스형</option></select></label></div><table><thead><tr><th>사용</th><th>최소 금액</th><th>룰렛</th><th></th></tr></thead><tbody id="autoRules"></tbody></table><div class="row"><button class="btn" onclick="addRule()">조건 추가</button><button class="btn cyan" onclick="saveOptions()">저장</button></div></section><section data-tab="lists" class="card hidden"><h2>룰렛 리스트</h2><div id="rouletteLists" class="list"></div><button class="btn" onclick="newList()">+ 새 룰렛</button><div class="hidden" id="editBox" style="margin-top:12px"><input id="editTitle" class="input" placeholder="룰렛 이름"><div class="muted" style="margin:8px 0">한 줄에 하나씩. #항목은 추첨 제외.</div><textarea id="editItems" class="textarea"></textarea><div class="row"><button class="btn" onclick="saveList()">저장</button><button class="btn gray" onclick="closeEdit()">닫기</button></div></div></section><section data-tab="result" class="card hidden"><h2>결과창</h2><div id="history" class="history"></div><div class="row"><button class="btn gray" onclick="resetOverlay()">오버레이 숨김</button><button class="btn red" onclick="clearHistory()">결과 삭제</button></div></section></div><script src="/common.js"></script><script src="/assets/js/roulette-admin.js"></script><script>const qs=new URLSearchParams(location.search);const st=qs.get('station')||localStorage.getItem('STATION_SLUG')||'default';document.getElementById('backControl').href='/m_control.html?station='+encodeURIComponent(st);document.getElementById('pcLink').href='/roulette.html?station='+encodeURIComponent(st);</script></body></html>
