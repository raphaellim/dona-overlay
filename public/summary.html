<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>합산</title>
<link rel="stylesheet" href="/app.css">
<style>
  body{background:#070b12;color:#e5e7eb}
  .wrap{max-width:1180px;margin:0 auto;padding:22px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
  .title{font-size:30px;font-weight:900;letter-spacing:-.06em}
  .nav{display:flex;gap:8px;flex-wrap:wrap}
  .nav a{text-decoration:none;color:#dbeafe;background:#111827;border:1px solid #334155;padding:10px 14px;border-radius:12px;font-weight:900}
  .resultBox{background:#08111f;border:1px solid #334155;border-radius:12px;padding:12px 14px;font-weight:900;color:#dbeafe;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .detail-grid{display:grid;grid-template-columns:1fr 1.15fr;gap:14px;margin-bottom:14px}
  .card{background:#0b1220;border:1px solid #253247;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:16px}
  .card h2{font-size:20px;margin:0 0 10px;font-weight:900;letter-spacing:-.05em;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .table{width:100%;border-collapse:collapse;font-size:14px}
  .table th,.table td{border-bottom:1px solid #1f2937;padding:9px 8px;text-align:left;white-space:nowrap}
  .table th{color:#93c5fd;font-weight:900;background:#0f172a}
  .table tr:hover td{background:#101827}
  .num{text-align:right!important;font-variant-numeric:tabular-nums}
  .btn{border:0;border-radius:10px;padding:8px 11px;font-weight:900;cursor:pointer;background:#334155;color:#fff;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
  .btn.green{background:#16a34a}
  .btn.blue{background:#2563eb}
  .btn.gray{background:#334155}
  .btn.mini{font-size:12px;padding:6px 9px;border-radius:8px}
  .select-line{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  select{background:#070b12;color:#e5e7eb;border:1px solid #334155;border-radius:12px;padding:10px 12px;min-width:220px}
  .stat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .pill{display:inline-flex;padding:5px 9px;border-radius:999px;background:#172554;color:#dbeafe;font-weight:900;font-size:12px}
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;color:#cbd5e1;font-weight:900}
  .hint{color:#94a3b8;font-size:13px;line-height:1.45}
  tr.clickable{cursor:pointer}
  @media(max-width:980px){.grid,.detail-grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
<link rel="stylesheet" href="/ux_compact.css">
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">합산 확인</div>
    <div class="nav">
      <a href="/admin.html">입력</a>
      <a href="/control.html">방송컨트롤</a>
      <a href="/creator_detail.html">크리에이터 전체</a>
      <a href="/donor_detail.html">도네이터 전체</a>
      <a href="/donations.html">전체 입력</a>
      <a href="/overlay.html" target="_blank">OBS화면</a>
    </div>
  </div>

  <div id="currentBroadcast" class="resultBox">현재 방송 확인 중...</div>

  <div class="grid">
    <section class="card">
      <h2>크리에이터 합산 <a class="btn blue mini" href="/creator_detail.html">전체보기</a></h2>
      <table class="table">
        <thead><tr><th>크리에이터</th><th>계좌</th><th>투네</th><th>합산</th><th>옵션</th></tr></thead>
        <tbody id="creatorRows"></tbody>
      </table>
      <p class="hint">행을 클릭하면 아래 선택 크리에이터 상세가 바뀝니다.</p>
    </section>

    <section class="card">
      <h2>도네이터 합산</h2>
      <table class="table">
        <thead><tr><th>도네이터</th><th>계좌</th><th>투네</th><th>합산</th><th>최근처리</th></tr></thead>
        <tbody id="donorRows"></tbody>
      </table>
    </section>
  </div>

  <div class="detail-grid">
    <section class="card">
      <h2>크리에이터별 도네이터 합산 <a class="btn blue mini" id="creatorDetailLink" href="/creator_detail.html">전체보기</a></h2>
      <div class="select-line">
        <label><b>크리에이터 선택</b></label>
        <select id="creatorSelect" onchange="renderCreatorDetail()"></select>
      </div>
      <div class="stat-pills" id="creatorStats"></div>
      <table class="table">
        <thead><tr><th>도네이터</th><th>계좌</th><th>투네</th><th>합산</th><th>최근처리</th></tr></thead>
        <tbody id="creatorDonorRows"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>선택 크리에이터 입력 리스트 <span class="hint">최신 5줄</span></h2>
      <table class="table">
        <thead><tr><th>시간</th><th>도네이터</th><th>계좌</th><th>투네</th><th>합산</th><th>결과</th></tr></thead>
        <tbody id="creatorDetailRows"></tbody>
      </table>
    </section>
  </div>

  <section class="card">
    <h2>전체 입력 리스트 <a class="btn blue mini" href="/donations.html">전체보기</a></h2>
    <table class="table">
      <thead><tr><th>시간</th><th>도네이터</th><th>크리에이터</th><th>계좌</th><th>투네</th><th>합산</th><th>결과</th><th>메모</th></tr></thead>
      <tbody id="allRows"></tbody>
    </table>
    <div class="pager">
      <button class="btn gray mini" onclick="prevAllPage()">이전</button>
      <span id="allPageInfo">1 / 1</span>
      <button class="btn gray mini" onclick="nextAllPage()">다음</button>
    </div>
  </section>
</div>

<script src="/common.js"></script>
<script>
let summary = null;
let selectedCreator = '';
let allPage = 1;
const allPageSize = 10;

function statusTextForCreator(row){
  const presets = (summary?.settings?.presets || []).filter(p => p.enabled !== false);
  if(!presets.length) return '-';

  const nets = row.presetNets || [];
  return presets.map(p => {
    const n = nets.find(x => x.presetId === p.id || x.presetTitle === p.title);
    if(!n) return `${p.title} 0`;
    const net = Number(n.plus || 0) - Number(n.minus || 0);
    if(net > 0) return `${n.plusName || p.plusName} +${net}`;
    if(net < 0) return `${n.minusName || p.minusName} -${Math.abs(net)}`;
    return `${p.title} 0`;
  }).join(' / ');
}

function statusNet(kind, value){
  const v = Number(value || 0);
  if(kind === 'smoke'){
    if(v > 0) return `흡연 +${v}`;
    if(v < 0) return `금연 -${Math.abs(v)}`;
    return '흡금 0';
  }
  if(v > 0) return `먹어 +${v}`;
  if(v < 0) return `먹지마 -${Math.abs(v)}`;
  return '먹먹마 0';
}

function findCreator(name){
  return (summary.creators || []).find(c => c.creator === name) || null;
}

async function load(){
  summary = await api('/api/summary');
  $('#currentBroadcast').textContent = summary.broadcast ? `현재 방송: ${summary.broadcast.title}` : '현재 방송 없음';

  $('#creatorRows').innerHTML = (summary.creators||[]).map(r => `
    <tr class="clickable" onclick="selectCreator('${escAttr(r.creator)}')">
      <td><b>${esc(r.creator)}</b></td>
      <td class="num">${r.accountText}</td>
      <td class="num">${r.toonieText}</td>
      <td class="num"><b>${r.totalText}</b></td>
      <td>${esc(statusTextForCreator(r))}</td>
    </tr>
  `).join('');

  $('#donorRows').innerHTML = (summary.donors||[]).slice(0,10).map(r => `
    <tr>
      <td><b>${esc(r.donor)}</b></td>
      <td class="num">${r.accountText}</td>
      <td class="num">${r.toonieText}</td>
      <td class="num"><b>${r.totalText}</b></td>
      <td>${esc(r.latestProcess)}</td>
    </tr>
  `).join('');

  const sel = $('#creatorSelect');
  const names = (summary.creators||[]).map(r=>r.creator);
  if(!selectedCreator || !names.includes(selectedCreator)) selectedCreator = names[0] || '';
  sel.innerHTML = names.map(n => `<option value="${escAttr(n)}" ${n===selectedCreator?'selected':''}>${esc(n)}</option>`).join('');

  renderCreatorDetail();
  renderAllRows();
}

function selectCreator(name){
  selectedCreator = name;
  $('#creatorSelect').value = name;
  renderCreatorDetail();
  document.querySelector('.detail-grid')?.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderCreatorDetail(){
  selectedCreator = $('#creatorSelect').value || selectedCreator;
  const r = findCreator(selectedCreator);

  $('#creatorDetailLink').href = '/creator_detail.html?creator=' + encodeURIComponent(selectedCreator || '');

  if(!r){
    $('#creatorStats').innerHTML = '';
    $('#creatorDonorRows').innerHTML = '';
    $('#creatorDetailRows').innerHTML = '';
    return;
  }

  $('#creatorStats').innerHTML = `
    <span class="pill">계좌 ${r.accountText}</span>
    <span class="pill">투네 ${r.toonieText}</span>
    <span class="pill">합산 ${r.totalText}</span>
    <span class="pill">${esc(statusTextForCreator(r))}</span>
  `;

  $('#creatorDonorRows').innerHTML = (r.donorSummary || []).slice(0,8).map(d => `
    <tr>
      <td><b>${esc(d.donor)}</b></td>
      <td class="num">${d.accountText}</td>
      <td class="num">${d.toonieText}</td>
      <td class="num"><b>${d.totalText}</b></td>
      <td>${esc(d.latestProcess)}</td>
    </tr>
  `).join('');

  $('#creatorDetailRows').innerHTML = (r.rows || []).slice().reverse().slice(0,5).map(row => `
    <tr>
      <td>${new Date(row.createdAt).toLocaleString('ko-KR')}</td>
      <td>${esc(row.donor)}</td>
      <td class="num">${displayMan(row.accountAmount).toFixed(1)}</td>
      <td class="num">${displayMan(row.toonieAmount).toFixed(1)}</td>
      <td class="num"><b>${esc(row.displayAmount)}</b></td>
      <td>${esc(row.resultLabel||row.processType)}</td>
    </tr>
  `).join('');
}

function renderAllRows(){
  const rows = (summary.donations || []).slice().reverse();
  const maxPage = Math.max(1, Math.ceil(rows.length / allPageSize));
  if(allPage > maxPage) allPage = maxPage;
  const start = (allPage - 1) * allPageSize;
  const pageRows = rows.slice(start, start + allPageSize);

  $('#allRows').innerHTML = pageRows.map(r => `
    <tr>
      <td>${new Date(r.createdAt).toLocaleString('ko-KR')}</td>
      <td>${esc(r.donor)}</td>
      <td>${esc(r.creator)}</td>
      <td class="num">${displayMan(r.accountAmount).toFixed(1)}</td>
      <td class="num">${displayMan(r.toonieAmount).toFixed(1)}</td>
      <td class="num"><b>${esc(r.displayAmount)}</b></td>
      <td>${esc(r.resultLabel||r.processType)}</td>
      <td>${esc(r.memo)}</td>
    </tr>
  `).join('');

  $('#allPageInfo').textContent = `${allPage} / ${maxPage}`;
}

function prevAllPage(){
  if(allPage > 1){
    allPage--;
    renderAllRows();
  }
}

function nextAllPage(){
  const rows = (summary.donations || []);
  const maxPage = Math.max(1, Math.ceil(rows.length / allPageSize));
  if(allPage < maxPage){
    allPage++;
    renderAllRows();
  }
}

function escAttr(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

load();
setInterval(load, 5000);
</script>

<script>
(function preserveStationLinks(){
  const station = new URLSearchParams(location.search).get('station') || localStorage.getItem('STATION_SLUG') || 'default';
  localStorage.setItem('STATION_SLUG', station);
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    const href=a.getAttribute('href');
    if(!href || href.includes('station=') || href.startsWith('/api/')) return;
    const u=new URL(href, location.origin);
    u.searchParams.set('station', station);
    a.setAttribute('href', u.pathname+u.search+(u.hash||''));
  });
})();
</script>


<script>(function(){
  var path=location.pathname;
  if(path==='/overlay.html') return;
  var st=new URLSearchParams(location.search).get('station')||localStorage.getItem('STATION_SLUG')||'default';
  var a=document.createElement('a');
  a.className='quick-index-link';
  a.href='/creator_index.html?station='+encodeURIComponent(st);
  a.textContent='인덱스';
  document.body.appendChild(a);
})();</script>
</body>
</html>
