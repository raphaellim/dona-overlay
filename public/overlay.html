<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>후원현황 Overlay</title>
<link rel="icon" href="data:,">
<style>
:root{
    --account-roll-height:34px;
    --overlay-w:285px;
    --top:54px;
    --right:14px;

    --pink:rgba(255,138,185,.95);
    --pink-soft:rgba(255,138,185,.36);
    --pink-text:#ffc2d6;
    --white:rgba(255,255,255,.98);
    --muted:rgba(255,255,255,.76);

    --yellow:#ffe066;
    --plus-blue:#5ecbff;
    --minus-red:#ff4d5e;

    --account-title-color:#ffffff;
    --account-name-color:#ffffff;
    --account-amount-color:#ffd1e0;
    --account-shadow:rgba(0,0,0,.85);
  }

  *{box-sizing:border-box}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent!important;
    font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;
  }

  .overlay-root{
    user-select:none;
    pointer-events:none;
    position:fixed;
    inset:0;
    background:transparent;
  }

  .overlay-stack{
    position:absolute;
    top:var(--top);
    right:var(--right);
    width:var(--overlay-w);
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .overlay-box{
    position:relative;
    color:var(--white);
    background:rgba(8,8,12,.72);
    border:2px solid var(--pink);
    border-radius:16px;
    box-shadow:none;
  }

  .account-box{padding:8px 11px 9px}
  .notice-box{padding:9px 12px;text-align:center}
  .creator-box{padding:10px 12px 12px}

  .account-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    height:34px;
    font-weight:900;
    letter-spacing:-.065em;
    text-align:center;
  }

  .account-title{
    flex:0 0 auto;
    font-size:25px;
    color:var(--account-title-color);
    white-space:nowrap;
    text-shadow:0 2px 3px var(--account-shadow),0 0 8px rgba(255,255,255,.22);
  }

  .roller{
    position:relative;
    height:32px;
    overflow:hidden;
    width:132px;
    min-width:132px;
    color:var(--account-amount-color);
    font-size:25px;
    line-height:32px;
    font-weight:950;
    letter-spacing:-.055em;
    text-shadow:0 2px 3px var(--account-shadow),0 0 8px rgba(255,160,195,.28);
  }

  .roller-track{
    position:absolute;
    left:0;
    right:0;
    top:0;
    transition:transform .42s ease;
    will-change:transform;
  }

  .roller-track.no-transition{transition:none!important}

  .roller-item{
    height:32px;
    line-height:32px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:center;
    color:var(--account-amount-color);
  }

  .account-donor{color:var(--account-name-color)}
  .account-amount{color:var(--account-amount-color)}

  .notice-title{
    font-size:14px;
    line-height:1;
    font-weight:900;
    color:var(--pink-text);
    margin-bottom:4px;
    letter-spacing:-.04em;
  }

  .notice-text{
    font-size:20px;
    line-height:1.18;
    font-weight:900;
    color:var(--white);
    letter-spacing:-.055em;
    text-shadow:0 2px 3px rgba(0,0,0,.85);
    word-break:keep-all;
    white-space:pre-line;
  }

  .creator-list{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    width:100%;
  }

  .creator-item{padding:0;width:100%;text-align:center}

  .creator-main{
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:5px;
    width:100%;
    min-height:28px;
    font-weight:900;
    letter-spacing:-.07em;
    text-align:center;
    text-shadow:0 2px 3px rgba(0,0,0,.85);
  }

  .creator-name{
    flex:0 0 78px;
    width:78px;
    color:var(--white);
    font-size:25px;
    line-height:1.08;
    white-space:nowrap;
    overflow:hidden;
    text-align:center;
  }

  .donation-amount{
    flex:0 0 auto;
    color:var(--pink-text);
    font-size:25px;
    line-height:1.08;
    white-space:nowrap;
    text-align:left;
  }

  .creator-sub{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    width:100%;
    margin-top:2px;
    font-size:23px;
    line-height:1.08;
    font-weight:900;
    letter-spacing:-.065em;
    text-align:center;
    text-shadow:0 2px 3px rgba(0,0,0,.85);
  }

  .state-item{white-space:nowrap;min-width:0;text-align:center}
  .plus{color:var(--plus-blue)}
  .blue,.red{color:var(--minus-red)}
  .muted{color:var(--yellow)}

  .option-alert{
    position:absolute;
    left:8px;
    right:8px;
    top:42px;
    z-index:50;
    padding:12px 10px 13px;
    border-radius:18px;
    border:2px solid rgba(255,220,95,.92);
    background:
      radial-gradient(circle at 12% 20%, rgba(255,255,255,.18), transparent 20%),
      linear-gradient(135deg, rgba(255,72,152,.94), rgba(105,54,255,.93) 55%, rgba(0,184,255,.92));
    color:#fff;
    text-align:center;
    letter-spacing:-.06em;
    opacity:0;
    transform:translateY(-10px) scale(.94);
    transition:opacity .22s ease, transform .22s cubic-bezier(.2,1.35,.3,1);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.24) inset,
      0 0 18px rgba(255,72,152,.48),
      0 8px 24px rgba(0,0,0,.34);
  }

  .option-alert.show{
    opacity:1;
    transform:translateY(0) scale(1);
    animation:alertPop .42s ease, alertGlow 1.15s ease-in-out infinite alternate;
  }

  @keyframes alertPop{
    0%{transform:translateY(-10px) scale(.88)}
    65%{transform:translateY(0) scale(1.045)}
    100%{transform:translateY(0) scale(1)}
  }

  @keyframes alertGlow{
    from{box-shadow:0 0 0 1px rgba(255,255,255,.24) inset,0 0 16px rgba(255,72,152,.48),0 8px 24px rgba(0,0,0,.34)}
    to{box-shadow:0 0 0 1px rgba(255,255,255,.36) inset,0 0 28px rgba(255,220,95,.58),0 8px 24px rgba(0,0,0,.34)}
  }

  .alert-line1{
    font-size:22px;
    line-height:1.15;
    font-weight:950;
    margin-bottom:5px;
    color:#fff;
    text-shadow:0 2px 3px rgba(0,0,0,.72);
  }

  .alert-line2{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    font-size:28px;
    line-height:1.05;
    font-weight:950;
    text-shadow:0 2px 3px rgba(0,0,0,.72);
  }

  .option-alert .alert-name{color:#fff5a8}
  .alert-line2 span:first-child{color:#ffffff}
  .option-alert .alert-plus{color:#9ffcff}
  .option-alert .alert-minus{color:#ffeb75}

  .hidden{display:none!important}

  @media(max-width:520px){
    :root{--overlay-w:268px;--top:50px;--right:12px}
    .overlay-stack{gap:7px}
    .account-title{font-size:23px}
    .roller{width:126px;min-width:126px;font-size:24px;height:31px;line-height:31px}
    .roller-item{height:31px;line-height:31px}
    .creator-name{flex-basis:76px;width:76px;font-size:24px}
    .donation-amount{font-size:24px}
    .creator-sub{font-size:22px;gap:9px}
    .notice-text{font-size:19px}
    .alert-line1{font-size:20px}
    .alert-line2{font-size:25px}
  }

  .notice-text{
    min-height:24px;
  }

  /* 공지 줄바꿈/줄별 색상 */
  .notice-text{
    white-space:normal !important;
  }
  .notice-line{
    display:block;
    line-height:1.22;
    margin:2px 0;
    text-shadow:0 2px 3px rgba(0,0,0,.85);
  }

  /* 세련된 Alert 카드 */
  .option-alert{
    left:8px !important;
    right:8px !important;
    top:42px !important;
    padding:13px 12px 14px !important;
    border-radius:18px !important;
    border:1px solid rgba(255,255,255,.22) !important;
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,.18), transparent 28%),
      linear-gradient(180deg, rgba(20,24,38,.96), rgba(7,10,18,.96)) !important;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.07) inset,
      0 0 0 2px rgba(255,194,214,.18),
      0 12px 28px rgba(0,0,0,.42),
      0 0 22px rgba(255,194,214,.22) !important;
    transform:translateY(-8px) scale(.96) !important;
  }

  .option-alert.show{
    transform:translateY(0) scale(1) !important;
    animation:alertCleanPop .34s ease-out, alertCleanGlow 1.2s ease-in-out infinite alternate !important;
  }

  @keyframes alertCleanPop{
    0%{transform:translateY(-8px) scale(.92)}
    70%{transform:translateY(0) scale(1.035)}
    100%{transform:translateY(0) scale(1)}
  }

  @keyframes alertCleanGlow{
    from{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.07) inset,
        0 0 0 2px rgba(255,194,214,.16),
        0 12px 28px rgba(0,0,0,.42),
        0 0 18px rgba(255,194,214,.18);
    }
    to{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.10) inset,
        0 0 0 2px rgba(94,203,255,.28),
        0 12px 28px rgba(0,0,0,.42),
        0 0 26px rgba(94,203,255,.24);
    }
  }

  .alert-donor{
    display:block;
    font-size:32px;
    line-height:1.05;
    font-weight:1000;
    color:#ffffff;
    letter-spacing:-.07em;
    text-shadow:
      0 2px 3px rgba(0,0,0,.9),
      0 0 12px rgba(255,255,255,.22);
    margin-bottom:3px;
  }

  .alert-target{
    display:block;
    font-size:17px;
    line-height:1.1;
    font-weight:900;
    color:#ffc2d6;
    letter-spacing:-.045em;
    margin-bottom:7px;
    text-shadow:0 2px 3px rgba(0,0,0,.75);
  }

  .alert-line2{
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    gap:9px !important;
    font-size:23px !important;
    line-height:1.05 !important;
    font-weight:950 !important;
  }

  .alert-amount{
    color:#ffe066 !important;
    text-shadow:0 2px 3px rgba(0,0,0,.8);
  }

  .option-alert .alert-plus{
    color:#5ecbff !important;
  }

  .option-alert .alert-minus{
    color:#ff6b7c !important;
  }


  /* 프리즘 스케일링 롤링 위치 고정 */
  .roller{
    height:var(--account-roll-height) !important;
    line-height:1 !important;
    overflow:hidden !important;
  }

  .roller-track{
    top:0 !important;
    transform:translate3d(0,0,0);
    will-change:transform;
  }

  .roller-item{
    height:var(--account-roll-height) !important;
    min-height:var(--account-roll-height) !important;
    line-height:1 !important;
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    padding-top:2px !important;
    padding-bottom:0 !important;
  }

  .account-row{
    align-items:center !important;
  }


  /* 프리즘 폰트 baseline 보정 */
  .creator-main{
    align-items:center !important;
    line-height:1 !important;
    padding-top:2px !important;
  }
  .creator-name,
  .donation-amount{
    line-height:1 !important;
  }
  .creator-sub{
    align-items:center !important;
    line-height:1 !important;
    padding-top:2px !important;
  }


  .alert-sound-title{
    color:#ffffff;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);
    border-radius:999px;
    padding:3px 8px;
    font-size:18px;
    line-height:1;
    white-space:nowrap;
  }

  /* Alert 전체 화면 중앙 표시 */
  .option-alert{
    position:fixed !important;
    left:50% !important;
    top:50% !important;
    right:auto !important;
    bottom:auto !important;
    width:min(520px, calc(100vw - 40px)) !important;
    min-height:150px !important;
    transform:translate(-50%, -50%) scale(.94) !important;
    z-index:9999 !important;
    display:flex !important;
    flex-direction:column !important;
    align-items:center !important;
    justify-content:center !important;
    text-align:center !important;
    pointer-events:none !important;
  }

  .option-alert.show{
    transform:translate(-50%, -50%) scale(1) !important;
  }

  .alert-donor{
    font-size:44px !important;
    line-height:1.05 !important;
    margin-bottom:8px !important;
  }

  .alert-target{
    font-size:24px !important;
    line-height:1.15 !important;
    margin-bottom:10px !important;
  }

  .alert-line2{
    font-size:28px !important;
    line-height:1.1 !important;
    flex-wrap:wrap !important;
  }

  .alert-sound-title{
    font-size:22px !important;
    padding:5px 11px !important;
  }

/* ===== V1 FINAL: overlay clean overrides ===== */
#overlayAlertRoot{
  position:fixed !important;
  left:var(--alert-left, 0px) !important;
  top:var(--alert-top, 0px) !important;
  width:var(--alert-width, 520px) !important;
  height:var(--alert-height, 220px) !important;
  z-index:99999 !important;
  pointer-events:none !important;
  overflow:visible !important;
}

#overlayAlertRoot .option-alert{
  position:absolute !important;
  left:50% !important;
  top:50% !important;
  right:auto !important;
  bottom:auto !important;
  width:calc(100% - 20px) !important;
  max-width:100% !important;
  transform:translate(-50%, -50%) scale(.92) !important;
}

#overlayAlertRoot .option-alert.show{
  transform:translate(-50%, -50%) scale(1) !important;
}

#overlayAlertRoot .option-alert,
body > .option-alert,
.option-alert{
  display:flex !important;
  pointer-events:none !important;
}

#overlayAlertRoot .option-alert.hidden,
body > .option-alert.hidden,
.option-alert.hidden{
  display:flex !important;
}

#overlayAlertRoot .option-alert.show,
body > .option-alert.show,
.option-alert.show{
  display:flex !important;
  visibility:visible !important;
  opacity:1 !important;
}

.option-alert .donation-alert-main{
  width:100% !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  flex-wrap:nowrap !important;
  white-space:nowrap !important;
  gap:10px !important;
  min-width:0 !important;
}

.option-alert .donation-alert-donor{
  flex:0 1 auto !important;
  min-width:0 !important;
  max-width:48% !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}

.option-alert .donation-alert-creator{
  flex:0 1 auto !important;
  min-width:0 !important;
  max-width:38% !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}

.option-alert .donation-alert-arrow{
  flex:0 0 auto !important;
}

.notice-title,
.notice-text,
.notice-line{
  text-align:center !important;
}

.notice-text{
  white-space:normal !important;
}

.notice-line{
  display:block !important;
  line-height:1.22 !important;
  margin:2px 0 !important;
  word-break:keep-all !important;
}

.creator-item.options-only .creator-main{
  justify-content:center !important;
}

.creator-item.options-only .creator-name{
  flex:0 1 auto !important;
  width:auto !important;
  max-width:100% !important;
  text-align:center !important;
}

@media(max-width:720px){
  .option-alert .donation-alert-main{
    flex-wrap:nowrap !important;
    gap:6px !important;
  }

  .option-alert .donation-alert-donor{
    font-size:clamp(28px, 8vw, 39px) !important;
    max-width:47% !important;
  }

  .option-alert .donation-alert-arrow{
    min-width:30px !important;
    height:30px !important;
    font-size:20px !important;
  }

  .option-alert .donation-alert-creator{
    font-size:clamp(22px, 6vw, 29px) !important;
    max-width:38% !important;
  }
}

/* ===== V1 PLUS: 노래방/펀딩/방송타이머 ===== */
.broadcast-timer-box{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:30;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:8px 18px;
  border-radius:999px;
  background:rgba(0,0,0,.58);
  border:1px solid rgba(255,255,255,.28);
  color:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  pointer-events:none;
}
.timer-label{font-size:18px;font-weight:900;opacity:.86;}
.timer-value{font-size:24px;line-height:1;font-weight:1000;color:#fff3a3;text-shadow:0 0 10px rgba(255,243,163,.55);}
.karaoke-box,.funding-box{
  width:100%;
  box-sizing:border-box;
  border-radius:18px;
  background:rgba(0,0,0,.58);
  border:1px solid rgba(255,255,255,.22);
  color:#fff;
  padding:12px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.30);
}
.karaoke-title,.funding-title{font-size:22px;line-height:1.05;font-weight:1000;text-align:center;letter-spacing:-.04em;}
.karaoke-current{margin-top:7px;font-size:20px;font-weight:900;text-align:center;color:#fff3a3;}
.karaoke-queue{margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;overflow:hidden;}
.queue-label{font-size:18px;font-weight:900;opacity:.9;}
.queue-num{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);font-size:18px;font-weight:1000;}
.karaoke-coin{margin-top:8px;font-size:18px;text-align:center;font-weight:900;}
.karaoke-ticker{width:100%;overflow:hidden;white-space:nowrap;margin-top:9px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);}
.karaoke-ticker span{display:inline-block;padding-left:100%;font-size:17px;line-height:32px;font-weight:900;animation:karaokeTickerMove 16s linear infinite;}
@keyframes karaokeTickerMove{from{transform:translateX(0);}to{transform:translateX(-100%);}}
.funding-value{margin-top:8px;font-size:28px;line-height:1;font-weight:1000;text-align:center;color:#bdf8ff;text-shadow:0 0 10px rgba(0,234,255,.45);}

/* 계좌후원 이름 ♥ 금액 표시 */
.roller-item{display:flex !important;align-items:center !important;justify-content:center !important;gap:5px !important;white-space:nowrap !important;}
.account-heart{display:inline-flex !important;align-items:center !important;justify-content:center !important;font-size:.76em !important;line-height:1 !important;transform:translateY(1px);text-shadow:0 0 7px rgba(255,255,255,.45), 0 3px 8px rgba(0,0,0,.35) !important;}
.account-heart.heart-lv1{color:#60a5fa !important;}
.account-heart.heart-lv2{color:#34d399 !important;}
.account-heart.heart-lv3{color:#facc15 !important;}
.account-heart.heart-lv4{color:#ff4fd8 !important;text-shadow:0 0 8px rgba(255,79,216,.85), 0 0 16px rgba(255,79,216,.55), 0 3px 8px rgba(0,0,0,.35) !important;}
.account-amount{font-size:.66em !important;font-weight:900 !important;letter-spacing:-.06em !important;opacity:.95 !important;}
.account-title,.account-box-title,.account-header{font-size:23px !important;line-height:1.05 !important;letter-spacing:-.04em !important;}

@media(max-width:720px){
  .broadcast-timer-box{top:8px;padding:7px 14px;}
  .timer-label{font-size:15px;}
  .timer-value{font-size:20px;}
  .karaoke-title,.funding-title{font-size:20px;}
}


/* ===== FORCE FIX: ALERT를 공지/후원 박스 안으로 제한 ===== */
#overlayAlertRoot{
  position:fixed !important;
  left:var(--alert-left, 0px) !important;
  top:var(--alert-top, 0px) !important;
  width:var(--alert-width, 520px) !important;
  height:var(--alert-height, 220px) !important;
  right:auto !important;
  bottom:auto !important;
  inset:auto !important;
  z-index:999999 !important;
  pointer-events:none !important;
  overflow:visible !important;
  transform:none !important;
}

#overlayAlertRoot > #optionAlert.option-alert,
#overlayAlertRoot #optionAlert.option-alert{
  position:absolute !important;
  left:50% !important;
  top:50% !important;
  right:auto !important;
  bottom:auto !important;
  inset:auto !important;
  width:calc(100% - 20px) !important;
  max-width:100% !important;
  min-width:0 !important;
  transform:translate(-50%, -50%) scale(.92) !important;
  transform-origin:center center !important;
  margin:0 !important;
}

#overlayAlertRoot > #optionAlert.option-alert.show,
#overlayAlertRoot #optionAlert.option-alert.show{
  transform:translate(-50%, -50%) scale(1) !important;
}

@media(max-width:720px){
  #overlayAlertRoot > #optionAlert.option-alert,
  #overlayAlertRoot #optionAlert.option-alert{
    width:calc(100% - 12px) !important;
    max-width:100% !important;
  }
}

<script>
  let latestSettingsForTimer = null;
  let showCreatorDonations = true;
(() => {
  const API_SUMMARY = "/api/summary";

  const PARAMS = new URLSearchParams(location.search);
  const ACCESS_TOKEN = PARAMS.get("token") || "";
  const STATION_SLUG = PARAMS.get("station") || "default";
  const IS_MONITOR = PARAMS.get("monitor") === "1";

  const $accountBox = document.getElementById("accountBox");
  const $noticeBox = document.getElementById("noticeBox");

  const $karaokeBox = document.getElementById("karaokeBox");

  const $karaokeCurrentText = document.getElementById("karaokeCurrentText");
  const $karaokeQueueList = document.getElementById("karaokeQueueList");

  const broadcastStartedAt = Date.now();
  const $noticeText = document.getElementById("noticeText");
  const $noticeTitleText = document.getElementById("noticeTitleText");
  const $list = document.getElementById("creatorList");
  const $track = document.getElementById("rollerTrack");
  const $alert = document.getElementById("optionAlert");
  /* 안전 사운드 로더
     - 페이지 로딩 시 모든 mp3를 미리 요청하지 않습니다.
     - 실제 Alert 재생 순간에 필요한 파일만 /sounds/에서 요청합니다.
     - control.html에서 파일명을 비워두면 해당 사운드는 재생하지 않습니다.
  */
  let soundRulesCache = null;
  const audioCache = {};

  function sanitizeSoundFile(file){
    return String(file || "").replace(/[\\/]/g, "").trim();
  }

  function cacheSoundRules(settings){
    soundRulesCache = settings?.soundRules || {
      enabled: true,
      defaultSound: "",
      amountRules: []
    };
  }

  function getAudio(file){
    const safe = sanitizeSoundFile(file);
    if(!safe) return null;

    if(!audioCache[safe]){
      const audio = new Audio("/sounds/" + safe);
      audio.volume = 0.85;
      audio.preload = "none";
      audioCache[safe] = audio;
    }
    return audioCache[safe];
  }


  let rollingItems = [];
  let rollingIndex = 0;
  let rollingTimer = null;
  let enabledPresets = [];
  let lastSignature = "";
  let lastDonationKey = localStorage.getItem("overlay_last_alert_key") || "";
  let lastSoundEventAt = localStorage.getItem("overlay_last_sound_event_at") || new Date().toISOString();
  const overlaySoundBootAt = new Date().toISOString();
  const claimedSoundEventIds = new Set();
  sessionStorage.setItem("overlay_sound_event_session_start", lastSoundEventAt);
  let alertTimer = null;
  let alertQueue = [];
  let alertPlaying = false;
  let alertShowing = false;

  const defaultSettings = {
    noticeTitle:"공지",
    notice:"",
    noticeColors:["#ffffff", "#ffe066", "#5ecbff", "#ffb4ca", "#ff4d5e"],
    overlaySections:{ account:true, notice:false, creators:true },
    soundRules:{
      enabled:true,
      defaultSound:"alert.mp3",
      amountRules:[
        {title:"계좌 1만원 미만",min:1,max:9999,sound:"account_small.mp3"},
        {title:"계좌 1만원 이상",min:10000,max:49999,sound:"account_mid.mp3"},
        {title:"계좌 5만원 이상",min:50000,max:99999,sound:"account_big.mp3"},
        {title:"계좌 10만원 이상",min:100000,max:0,sound:"account_super.mp3"}
      ]
    },
    creators:[],
    presets:[
      {id:"smoke",enabled:true,title:"펴피지마",plusName:"흡연",minusName:"금연"},
      {id:"food",enabled:true,title:"먹먹마",plusName:"먹어",minusName:"먹지마"}
    ]
  };

  const demoData = {
    settings:{
      ...defaultSettings,
      notice:"오늘 룰 확인하고 후원해주세요",
      overlaySections:{account:true,notice:true,creators:true}
    },
    accountDonors:[{donor:"열려",amount:36000},{donor:"이잉",amount:123400}],
    creators:[],
    donations:[]
  };

  function num(v){ const n=Number(v||0); return Number.isFinite(n)?n:0; }
  function displayAmount(won){ const cut=Math.floor(num(won)/1000)/10; return cut.toFixed(1).replace(/\.0$/,""); }
  function normalizeName(v){ return String(v??"").replace(/\s+/g," ").trim(); }
  function escapeHtml(str){ return String(str).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch])); }
  function formatCreatorName(name){
    const arr=Array.from(String(name||"").trim());
    if(arr.length>=3) return arr.slice(0,3).join("");
    if(arr.length===2) return arr.join(" ");
    if(arr.length===1) return arr[0]+"  ";
    return "익 명";
  }
  function getEnabledPresets(settings){
    const presets=settings&&Array.isArray(settings.presets)?settings.presets:[];
    return presets.filter(p=>p&&p.enabled!==false);
  }

  function getOverlaySections(settings){
    const s = settings?.overlaySections || {};
    return {
      account: s.account !== false,
      notice: s.notice === true,
      creators: s.creators !== false,
      creatorDonations: s.creatorDonations !== false,
      karaoke: s.karaoke === true,
      funding: s.funding === true,
      broadcastTimer: s.broadcastTimer === true
    };
  }


  
  
  function renderFunding(settings){
    if(!$fundingBox) return;
    const items = (settings?.fundingData?.items || []).filter(f => f.enabled !== false);
    const valueEl = $fundingBox.querySelector(".funding-value");
    if(!valueEl) return;
    if(!items.length){
      valueEl.innerHTML = `<div class="funding-line">등록된 펀딩 없음</div>`;
      return;
    }
    valueEl.innerHTML = items.map((f, idx) => {
      const cur = Number(f.current || 0);
      const target = Number(f.target || 0);
      const pct = target > 0 ? Math.min(100, Math.round(cur / target * 100)) : 0;
      return `<div class="funding-line"><span>${idx+1}. ${escapeHtml(f.title)}</span><b>${cur}/${target}</b><em style="width:${pct}%"></em></div>`;
    }).join("");
  }

  function timerBaseMs(settings){
    const t = settings?.broadcastTimerData || {};
    if(!t.startedAt) return 0;
    const start = new Date(t.startedAt).getTime();
    if(!start) return 0;
    const end = t.running ? Date.now() : (t.endedAt ? new Date(t.endedAt).getTime() : Date.now());
    return Math.max(0, end - start);
  }

  function coinLabel(type){
    return type === "full" ? "완곡" : type === "special" ? "스페셜" : "1절";
  }

  function renderKaraoke(settings){
    const data = settings?.karaokeData || {};
    const users = Array.isArray(data.users) ? data.users : [];
    const songs = Array.isArray(data.songs) ? data.songs.filter(s => s.status !== "삭제") : [];

    if($karaokeTitleText) $karaokeTitleText.textContent = data.title || "노래방 공지 알림판";

    const running = songs.find(s => s.status === "진행");
    if($karaokeCurrentText){
      $karaokeCurrentText.textContent = running
        ? `진행중: ${running.nick} - ${running.title}`
        : "진행중";
    }

    if($karaokeQueueList){
      const queue = songs.filter(s => s.status === "대기" || s.status === "보류").slice(0, 4);
      $karaokeQueueList.innerHTML = `<span class="queue-label">예약순번</span>` + (
        queue.length
          ? queue.map((s, idx) => `<span class="queue-num ${s.status === "보류" ? "hold" : ""}">${idx+1}. ${escapeHtml(s.nick)} ${escapeHtml(s.title)}</span>`).join("")
          : `<span class="queue-empty">대기 없음</span>`
      );
    }

    if($karaokeCoinText){
      const totals = users.reduce((acc, u) => {
        const c = u.coins || {};
        acc.verse += Number(c.verse || 0);
        acc.full += Number(c.full || 0);
        acc.special += Number(c.special || 0);
        return acc;
      }, {verse:0, full:0, special:0});

      $karaokeCoinText.textContent = `현재 코인보유 1절 ${totals.verse} · 완곡 ${totals.full} · 스페셜 ${totals.special}`;
    }

    if($karaokeTickerText) $karaokeTickerText.textContent = data.ticker || "신청곡은 채팅으로 남겨주세요";
  }


  function renderNotice(settings){
    const titleEl = document.querySelector(".notice-title");
    const textEl = document.querySelector(".notice-text");
    if(!titleEl || !textEl) return;

    const rawNotice = settings?.notice;
    let title = "공지사항";
    let text = "";
    let colors = [];

    if(typeof rawNotice === "string"){
      text = rawNotice;
      title = String(settings?.noticeTitle || settings?.notice_title || "공지사항");
      colors = Array.isArray(settings?.noticeColors) ? settings.noticeColors : [];
    }else if(rawNotice && typeof rawNotice === "object"){
      title = String(rawNotice.title ?? settings?.noticeTitle ?? settings?.notice_title ?? "공지사항");
      text = String(rawNotice.text ?? rawNotice.content ?? settings?.noticeText ?? settings?.notice_text ?? "");
      colors = Array.isArray(rawNotice.colors)
        ? rawNotice.colors
        : (Array.isArray(settings?.noticeColors) ? settings.noticeColors : []);
    }else{
      title = String(settings?.noticeTitle || settings?.notice_title || "공지사항");
      text = String(settings?.noticeText || settings?.notice_text || "");
      colors = Array.isArray(settings?.noticeColors) ? settings.noticeColors : [];
    }

    text = String(text || "").replace(/\\n/g, "\n");
    titleEl.textContent = title.trim() || "공지사항";

    if(!text.trim()){
      textEl.innerHTML = "";
      return;
    }

    textEl.innerHTML = text.split(/\r?\n/).map((line, idx) => {
      const color = colors[idx] || "";
      const style = color ? ` style="color:${escapeHtml(color)}"` : "";
      return `<span class="notice-line"${style}>${escapeHtml(line)}</span>`;
    }).join("");
  }

  function applySections(settings){
    const sections = getOverlaySections(settings);

    if($broadcastTimerBox) $broadcastTimerBox.classList.toggle("hidden", !sections.broadcastTimer);
    if($accountBox) $accountBox.classList.toggle("hidden", !sections.account);
    if($fundingBox) $fundingBox.classList.toggle("hidden", !sections.funding);
    if($noticeBox) $noticeBox.classList.toggle("hidden", !sections.notice);
    if($karaokeBox) $karaokeBox.classList.toggle("hidden", !sections.karaoke);
    if($creatorBox) $creatorBox.classList.toggle("hidden", !sections.creators);

    showCreatorDonations = sections.creatorDonations !== false;

    const stack = document.querySelector(".overlay-stack");
    if(stack) stack.classList.remove("hidden");

    ensureAlertIndependent();
  }

  function zeroCreatorsFromSettings(settings){
    const creators = Array.isArray(settings?.creators) ? settings.creators : [];
    return creators.map(name => ({
      creator: normalizeName(name),
      total: 0,
      smokeNet: 0,
      eatNet: 0,
      presetNets: []
    })).filter(row => row.creator);
  }

  function aggregateAccountDonorsFromDonations(donations){
    const map=new Map();
    (donations||[]).forEach(d=>{
      const account=num(d.accountAmount??d.account_amount);
      if(account<=0) return;
      const donor=normalizeName(d.donor||d.donor_name||"익명");
      if(!map.has(donor)) map.set(donor,{donor,amount:0,latestAt:d.createdAt||d.created_at||""});
      const row=map.get(donor);
      row.amount+=account;
      if(new Date(d.createdAt||d.created_at||0)>new Date(row.latestAt||0)) row.latestAt=d.createdAt||d.created_at||"";
    });
    return Array.from(map.values()).sort((a,b)=>new Date(b.latestAt||0)-new Date(a.latestAt||0)).slice(0,10);
  }

  function aggregateCreatorsFromDonations(donations, settings){
    const allowed = new Set((Array.isArray(settings?.creators) ? settings.creators : [])
      .map(normalizeName)
      .filter(Boolean));

    const map = new Map();
    zeroCreatorsFromSettings(settings).forEach(c => map.set(c.creator, c));
    if(!allowed.size) return Array.from(map.values()).slice(0,5);

    (donations||[]).forEach(d=>{
      const creator=normalizeName(d.creator||"");
      if(!creator || !allowed.has(creator)) return;

      const account=num(d.accountAmount??d.account_amount);
      const toonie=num(d.toonieAmount??d.toonie_amount);
      const total=num(d.totalAmount??d.total_amount??account+toonie);

      const row=map.get(creator) || {creator,total:0,smokeNet:0,eatNet:0,presetNets:[]};
      row.total+=total;
      row.smokeNet+=num(d.smoke||0)-num(d.nosmoke||0);
      row.eatNet+=num(d.eat||0)-num(d.noeat||0);

      (Array.isArray(d.checks)?d.checks:[]).forEach(ch=>{
        const key=ch.presetId||ch.presetTitle;
        if(!key) return;
        let n=row.presetNets.find(x=>(ch.presetId&&x.presetId===ch.presetId)||(ch.presetTitle&&x.presetTitle===ch.presetTitle));
        if(!n){
          n={presetId:ch.presetId,presetTitle:ch.presetTitle,plusName:"",minusName:"",plus:0,minus:0};
          row.presetNets.push(n);
        }
        if(ch.side==="minus"){ n.minus += num(ch.count||1); n.minusName=ch.name||n.minusName; }
        else { n.plus += num(ch.count||1); n.plusName=ch.name||n.plusName; }
      });

      map.set(creator,row);
    });

    return Array.from(map.values()).slice(0,5);
  }

  function normalizeCreatorRows(summary){
    const settings = summary?.settings || defaultSettings;
    const allowed = new Set((Array.isArray(settings?.creators) ? settings.creators : [])
      .map(normalizeName)
      .filter(Boolean));

    const rows = Array.isArray(summary?.creators)
      ? summary.creators
      : (Array.isArray(summary?.creatorSummary) ? summary.creatorSummary : []);

    const cleaned = rows
      .map(row => ({...row, creator: normalizeName(row.creator || row.name || "")}))
      .filter(row => row.creator && (!allowed.size || allowed.has(row.creator)));

    if(cleaned.length) return cleaned.slice(0,5);

    const aggregated = aggregateCreatorsFromDonations(summary?.donations||[], settings);
    return aggregated.length ? aggregated : zeroCreatorsFromSettings(settings);
  }

  function statusLabelsFromPresetNets(presets,row){
    const nets=Array.isArray(row.presetNets)?row.presetNets:[];
    return presets.map(preset=>{
      const n=nets.find(x=>(x.presetId&&x.presetId===preset.id)||(x.presetTitle&&x.presetTitle===preset.title));
      if(n){
        const net=num(n.plus)-num(n.minus);
        if(net>0) return `<span class="plus">${escapeHtml(n.plusName||preset.plusName||"+")} +${Math.abs(net)}</span>`;
        if(net<0) return `<span class="red">${escapeHtml(n.minusName||preset.minusName||"-")} -${Math.abs(net)}</span>`;
      }
      if(preset.id==="smoke"){
        const net=num(row.smokeNet??row.smoke_net??0);
        if(net>0) return `<span class="plus">${escapeHtml(preset.plusName||"흡연")} +${Math.abs(net)}</span>`;
        if(net<0) return `<span class="red">${escapeHtml(preset.minusName||"금연")} -${Math.abs(net)}</span>`;
      }
      if(preset.id==="food"){
        const net=num(row.eatNet??row.foodNet??row.food_net??0);
        if(net>0) return `<span class="plus">${escapeHtml(preset.plusName||"먹어")} +${Math.abs(net)}</span>`;
        if(net<0) return `<span class="red">${escapeHtml(preset.minusName||"먹지마")} -${Math.abs(net)}</span>`;
      }
      return `<span class="muted">${escapeHtml(preset.title||"처리")} 0</span>`;
    });
  }

  function accountHeartClass(amount){
    const v=num(amount);
    if(v<=10000) return "heart-lv1";
    if(v<=50000) return "heart-lv2";
    if(v<=100000) return "heart-lv3";
    return "heart-lv4";
  }

  function renderAccountRoller(items){
    rollingItems=items&&items.length?items:[{donor:"-",amount:0}];
    if(rollingTimer){ clearInterval(rollingTimer); rollingTimer=null; }

    const makeItemHtml=item=>{
      const donor=normalizeName(item.donor||item.name||"익명");
      const rawAmount=item.amount??item.accountAmount??item.account_amount??item.total??0;
      const amount=displayAmount(rawAmount);
      const heartClass=accountHeartClass(rawAmount);
      return `<div class="roller-item"><span class="account-donor">${escapeHtml(donor)}</span><span class="account-heart ${heartClass}">♥</span><span class="account-amount">${amount}</span></div>`;
    };

    const moveToIndex = (index, useTransition=true) => {
      const item = $track.children[index];
      const y = item ? item.offsetTop : 0;

      if(useTransition){
        $track.classList.remove("no-transition");
      }else{
        $track.classList.add("no-transition");
      }

      // offsetTop 기준으로 이동해서 프리즘 스케일/폰트 렌더링 차이에도 누적 오차가 생기지 않음
      $track.style.transform = `translate3d(0, ${-y}px, 0)`;
    };

    if(rollingItems.length<=1){
      rollingIndex=0;
      $track.innerHTML=rollingItems.map(makeItemHtml).join("");
      moveToIndex(0, false);
      return;
    }

    const renderItems=[...rollingItems,rollingItems[0]];
    $track.innerHTML=renderItems.map(makeItemHtml).join("");

    rollingIndex=0;
    moveToIndex(0, false);
    $track.offsetHeight;
    $track.classList.remove("no-transition");

    const holdMs=2600;
    const transitionMs=420;

    rollingTimer=setInterval(()=>{
      rollingIndex+=1;
      moveToIndex(rollingIndex, true);

      if(rollingIndex===rollingItems.length){
        setTimeout(()=>{
          rollingIndex=0;
          moveToIndex(0, false);
          $track.offsetHeight;
          $track.classList.remove("no-transition");
        },transitionMs+30);
      }
    },holdMs);
  }

  function renderCreators(creators){
    const rows=(Array.isArray(creators)?creators:[]).slice(0,5);
    const visiblePresets=(enabledPresets||[]).filter(p=>p.enabled!==false);
    const showDonation = (typeof showCreatorDonations === "undefined") ? true : showCreatorDonations;

    if(!rows.length){
      $list.innerHTML = "";
      return;
    }

    $list.innerHTML=rows.map(row=>{
      const rawName=normalizeName(row.creator||row.name||"익명");
      const name=formatCreatorName(rawName);
      const total=displayAmount(row.total??row.totalAmount??row.total_amount??row.amount??0);
      const labels=visiblePresets.length?statusLabelsFromPresetNets(visiblePresets,row):[];
      const donationHtml = showDonation
        ? `<div class="donation-amount">후원(${total})</div>`
        : ``;

      return `
        <article class="creator-item ${showDonation ? "" : "options-only"}">
          <div class="creator-main">
            <div class="creator-name">${escapeHtml(name)}${showDonation ? " -" : ""}</div>
            ${donationHtml}
          </div>
          ${labels.length?`<div class="creator-sub">${labels.map(label=>`<span class="state-item">${label}</span>`).join("")}</div>`:``}
        </article>
      `;
    }).join("");
  }

  function makeDonationAlertHtml(row){
    const donor=escapeHtml(row.donor||"익명");
    const creator=escapeHtml(row.creator||"익명");
    const accountAmount=num(row.accountAmount??row.account_amount);
    const toonieAmount=num(row.toonieAmount??row.toonie_amount);
    const totalAmount=num(row.totalAmount??row.total_amount??accountAmount+toonieAmount);
    const amountText=displayAmount(totalAmount);
    const checks=Array.isArray(row.checks)?row.checks:[];
    const manualSoundTitle = String(row.manualSoundTitle || row.manual_sound_title || '').trim();
    let optionText="";

    if(checks.length){
      const ch=checks[checks.length-1];
      const sign=ch.side==="minus"?"-":"+";
      const cls=ch.side==="minus"?"alert-minus":"alert-plus";
      const name=escapeHtml(ch.name||"옵션");
      const count=Math.abs(num(ch.count));
      optionText=`<span class="${cls}">${name}${sign}${count}</span>`;
    }

    if(manualSoundTitle){
      optionText = optionText
        ? `${optionText}<span class="alert-sound-title">${escapeHtml(manualSoundTitle)}</span>`
        : `<span class="alert-sound-title">${escapeHtml(manualSoundTitle)}</span>`;
    }

    return `
      <div class="alert-donor">${donor}</div>
      <div class="alert-target">→ ${creator}</div>
      <div class="alert-line2"><span class="alert-amount">${amountText}</span>${optionText}</div>
    `;
  }
  function pickSoundFileForDonation(row){
    if(soundRulesCache && soundRulesCache.enabled === false) return "";

    // 1순위: 수동 사운드 이벤트
    const manualFile = sanitizeSoundFile(row?.manualSoundFile || row?.manual_sound_file || "");
    if(manualFile) return manualFile;

    // 2순위: 프리셋 사운드
    const checks = Array.isArray(row?.checks) ? row.checks : [];
    const latestCheck = checks.length ? checks[checks.length - 1] : null;
    if(latestCheck){
      const presetId = String(latestCheck.presetId || "");
      const presetTitle = String(latestCheck.presetTitle || "");
      const preset = (enabledPresets || []).find(p => p.id === presetId || p.title === presetTitle);
      if(preset && preset.soundFile) return sanitizeSoundFile(preset.soundFile);
    }

    // 3순위: 계좌금액 구간 사운드
    const accountAmount = num(row?.accountAmount ?? row?.account_amount);
    const rules = Array.isArray(soundRulesCache?.amountRules) ? soundRulesCache.amountRules : [];
    const matched = rules
      .filter(r => accountAmount >= num(r.min) && (!num(r.max) || accountAmount <= num(r.max)) && r.sound)
      .sort((a,b) => num(b.min) - num(a.min))[0];

    if(matched) return sanitizeSoundFile(matched.sound);

    // 4순위: 기본 사운드
    return sanitizeSoundFile(soundRulesCache?.defaultSound || "");
  }

  function playSoundForDonation(row){
    const file = typeof pickSoundFileForDonation === "function" ? pickSoundFileForDonation(row) : "";
    if(!file) return null;

    const audio = typeof getAudio === "function"
      ? getAudio(file)
      : new Audio("/sounds/" + String(file).replace(/[\\\/]/g, ""));

    if(!audio) return null;

    try{
      audio.pause();
      audio.currentTime = 0;
      const p = audio.play();
      if(p && typeof p.catch === "function") p.catch(() => {});
      return audio;
    }catch(e){
      return null;
    }
  }

  async function markManualSoundPlayed(eventId){
    if(!eventId) return;
    try{
      await fetchJson("/api/sound-events/" + encodeURIComponent(eventId) + "/played", { method:"POST" });
    }catch(e){}
  }


  function playAlertQueue(){
    if(alertShowing || !alertQueue.length) return;

    alertShowing = true;
    alertPlaying = true;

    const alertItem = alertQueue.shift();
    const html = typeof alertItem === "string" ? alertItem : (alertItem.html || "");
    const row = typeof alertItem === "string" ? {} : (alertItem.row || {});
    const eventId = typeof alertItem === "string" ? "" : (alertItem.eventId || "");

    $alert.innerHTML = html;
    ensureAlertIndependent();
    $alert.classList.remove("hidden");
    ensureAlertIndependent();
    $alert.classList.add("show");
    ensureAlertIndependent();

    const audio = playSoundForDonation(row);

    let closed = false;
    let minDone = false;
    let fallbackTimer = null;

    const closeAlert = () => {
      if(closed) return;
      closed = true;
      clearTimeout(fallbackTimer);
      $alert.classList.remove("show");
      setTimeout(() => {
        alertShowing = false;
        alertPlaying = false;
        playAlertQueue();
      }, 280);
    };

    setTimeout(() => {
      minDone = true;
      if(!audio || audio.ended || audio.paused) closeAlert();
    }, 2600);

    if(audio){
      const onEnded = () => {
        audio.removeEventListener("ended", onEnded);
        audio.removeEventListener("error", onError);
        if(minDone) closeAlert();
      };

      const onError = () => {
        audio.removeEventListener("ended", onEnded);
        audio.removeEventListener("error", onError);
        if(minDone) closeAlert();
      };

      audio.addEventListener("ended", onEnded);
      audio.addEventListener("error", onError);

      // 긴 음악은 최대 1분까지 Alert 유지
      fallbackTimer = setTimeout(closeAlert, 60000);
    }else{
      fallbackTimer = setTimeout(closeAlert, 3200);
    }
  }

  function checkLatestOptionAlert(donations){
    const rows=(donations||[]).slice().sort((a,b)=>new Date(a.createdAt||a.created_at||0)-new Date(b.createdAt||b.created_at||0));
    if(!rows.length) return;

    if(!lastDonationKey){
      const latest=rows[rows.length-1];
      const key=(latest.id||"")+"_"+(latest.createdAt||latest.created_at||"");
      lastDonationKey=key;
      localStorage.setItem("overlay_last_alert_key",key);
      return;
    }

    let passedLast=false;
    const newRows=[];

    for(const row of rows){
      const key=(row.id||"")+"_"+(row.createdAt||row.created_at||"");
      if(key===lastDonationKey){
        passedLast=true;
        continue;
      }
      if(passedLast) newRows.push(row);
    }

    if(!passedLast){
      const latest=rows[rows.length-1];
      const key=(latest.id||"")+"_"+(latest.createdAt||latest.created_at||"");
      lastDonationKey=key;
      localStorage.setItem("overlay_last_alert_key",key);
      return;
    }

    if(!newRows.length) return;

    const last=newRows[newRows.length-1];
    const lastKey=(last.id||"")+"_"+(last.createdAt||last.created_at||"");
    lastDonationKey=lastKey;
    localStorage.setItem("overlay_last_alert_key",lastKey);

    newRows.forEach(row=>alertQueue.push({ html: makeDonationAlertHtml(row), row }));
    playAlertQueue();
  }



  function makeManualSoundEventAlertHtml(ev){
    const displayTitle = escapeHtml(ev.title || "수동 Alert");
    const rawFile = String(ev.soundFile || "");
    const baseName = rawFile.replace(/\.[^.]+$/, "");
    const soundName = escapeHtml(baseName || "사운드");

    const total = Math.max(1, Number(ev.repeatTotal || 1));
    const played = Math.max(0, Number(ev.repeatPlayed || 0));
    const current = Math.min(total, played + 1);
    const progress = total > 1 ? `<span class="alert-sound-title">${current}/${total}</span>` : "";

    return `
      <div class="alert-donor">${displayTitle}</div>
      <div class="alert-target">${soundName}</div>
      <div class="alert-line2">${progress}</div>
    `;
  }

  async function checkManualSoundEvents(){
    try{
      if(IS_MONITOR) return;
      if(alertShowing || alertPlaying || alertQueue.length > 0) return;

      const url = "/api/sound-events?after=" + encodeURIComponent(overlaySoundBootAt);
      const data = await fetchJson(url);
      const events = Array.isArray(data.events) ? data.events : [];
      if(!events.length) return;

      const ev = events[0];
      if(!ev || !ev.id) return;

      const repeatKey = `${ev.id}:${Number(ev.repeatPlayed || 0)}`;
      if(claimedSoundEventIds.has(repeatKey)) return;

      claimedSoundEventIds.add(repeatKey);
      markManualSoundPlayed(ev.id);

      alertQueue.push({
        eventId:ev.id,
        repeatKey,
        html: makeManualSoundEventAlertHtml(ev),
        row: {
          manualSoundFile:ev.soundFile,
          manualSoundTitle:ev.title
        }
      });

      playAlertQueue();
    }catch(e){}
  }

  function testSoundFromQuery(){
    const testFileOrKey = PARAMS.get("testSound");
    if(!testFileOrKey) return;
    setTimeout(() => {
      let file = testFileOrKey;
      const aliases = {
        accountSmall: soundRulesCache?.amountRules?.find(r=>r.id==='small')?.sound || 'account_small.mp3',
        accountMid: soundRulesCache?.amountRules?.find(r=>r.id==='mid')?.sound || 'account_mid.mp3',
        accountBig: soundRulesCache?.amountRules?.find(r=>r.id==='big')?.sound || 'account_big.mp3',
        accountSuper: soundRulesCache?.amountRules?.find(r=>r.id==='super')?.sound || 'account_super.mp3',
        default: soundRulesCache?.defaultSound || 'alert.mp3'
      };
      if(aliases[testFileOrKey]) file = aliases[testFileOrKey];
      const audio = getAudio(file);
      if(!audio) return;
      try{
        audio.pause();
        audio.currentTime = 0;
        const p = audio.play();
        if(p && typeof p.catch === "function") p.catch(() => {});
      }catch(e){}
    }, 800);
  }

  async function fetchJson(url, options={}){
    let finalUrl = url;
    const sep1 = finalUrl.includes("?") ? "&" : "?";
    finalUrl = finalUrl + sep1 + "station=" + encodeURIComponent(STATION_SLUG);
    if(ACCESS_TOKEN){
      const sep = finalUrl.includes("?") ? "&" : "?";
      finalUrl = finalUrl + sep + "token=" + encodeURIComponent(ACCESS_TOKEN);
    }
    const fetchOptions = Object.assign({cache:"no-store"}, options || {});
    if(fetchOptions.method && fetchOptions.method !== "GET"){
      fetchOptions.headers = Object.assign({"Content-Type":"application/json"}, fetchOptions.headers || {});
    }
    const res=await fetch(finalUrl, fetchOptions);
    if(!res.ok) throw new Error(url+" "+res.status);
    return res.json();
  }

  async function loadData(){
    const params=new URLSearchParams(location.search);
    if(params.get("demo")==="1") return demoData;

    try{
      const s = await fetchJson(API_SUMMARY);
      const settings = s.settings && Object.keys(s.settings).length ? s.settings : defaultSettings;
      const accountDonors=(s.accountDonors&&s.accountDonors.length)?s.accountDonors:aggregateAccountDonorsFromDonations(s.donations||[]);
      return {
        settings,
        accountDonors,
        creators:normalizeCreatorRows({...s, settings}),
        donations:s.donations||[]
      };
    }catch(e){
      try{
        const settings = await fetchJson(API_SETTINGS);
        return {
          settings,
          accountDonors:[],
          creators:zeroCreatorsFromSettings(settings),
          donations:[]
        };
      }catch(err){
        return {
          settings: defaultSettings,
          accountDonors: [],
          creators: [],
          donations: []
        };
      }
    }
  }

  function ensureAlertIndependent(){
    const root = document.getElementById("overlayAlertRoot");
    let alertEl = document.getElementById("optionAlert");
    if(!alertEl) return;

    if(root && alertEl.parentElement !== root){
      root.appendChild(alertEl);
    }

    const noticeBox = document.getElementById("noticeBox");
    const accountBox = document.getElementById("accountBox");
    const creatorBox = document.getElementById("creatorBox");
    const stack = document.querySelector(".overlay-stack");

    const isVisible = el => {
      if(!el || el.classList.contains("hidden")) return false;
      const rect = el.getBoundingClientRect();
      return rect.width > 0 && rect.height > 0;
    };

    const baseBox =
      (isVisible(noticeBox) && noticeBox) ||
      (isVisible(accountBox) && accountBox) ||
      (isVisible(creatorBox) && creatorBox) ||
      stack;

    if(root && baseBox){
      const rect = baseBox.getBoundingClientRect();
      root.style.setProperty("--alert-left", Math.round(rect.left) + "px");
      root.style.setProperty("--alert-top", Math.round(rect.top) + "px");
      root.style.setProperty("--alert-width", Math.round(rect.width) + "px");
      root.style.setProperty("--alert-height", Math.round(rect.height) + "px");
    }

    alertEl.classList.remove("hidden");

    alertEl.style.position = "absolute";
    alertEl.style.left = "50%";
    alertEl.style.top = "50%";
    alertEl.style.right = "auto";
    alertEl.style.bottom = "auto";
    alertEl.style.margin = "0";

    if(alertEl.classList.contains("show")){
      alertEl.style.display = "flex";
      alertEl.style.visibility = "visible";
      alertEl.style.opacity = "1";
      alertEl.style.transform = "translate(-50%, -50%) scale(1)";
    }else{
      alertEl.style.display = "";
      alertEl.style.visibility = "";
      alertEl.style.opacity = "";
      alertEl.style.transform = "translate(-50%, -50%) scale(.92)";
    }
  }

  
  function updateBroadcastTimer(){
    if(!$broadcastTimerValue) return;

    const diff = latestSettingsForTimer ? timerBaseMs(latestSettingsForTimer) : 0;
    const sec = Math.floor(diff / 1000);

    const h = String(Math.floor(sec / 3600)).padStart(2, "0");
    const m = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");

    $broadcastTimerValue.textContent = `${h}:${m}:${s}`;
  }

  setInterval(updateBroadcastTimer, 1000);
  updateBroadcastTimer();

  window.addEventListener("resize", () => {
    if(typeof ensureAlertIndependent === "function") ensureAlertIndependent();
  });

  async function refresh(){
    let data;
    try{ data=await loadData(); }
    catch(e){ data={settings:defaultSettings,accountDonors:[],creators:[],donations:[]}; }

    const settings = data.settings || defaultSettings;
    cacheSoundRules(settings);
    enabledPresets=getEnabledPresets(settings);
    const creators = data.creators && data.creators.length ? data.creators : zeroCreatorsFromSettings(settings);

    const signature=JSON.stringify({
      sections:getOverlaySections(settings),
      notice:settings.notice||"",
      noticeColors:settings.noticeColors||[],
      soundRules:settings.soundRules||{},
      noticeTitle:settings.noticeTitle||"공지",
      accountDonors:data.accountDonors||[],
      creators,
      presets:enabledPresets.map(p=>({id:p.id,enabled:p.enabled,title:p.title,plusName:p.plusName,minusName:p.minusName}))
    });

    ensureAlertIndependent();
    checkLatestOptionAlert(data.donations||[]);
    checkManualSoundEvents();

    if(signature!==lastSignature){
      lastSignature=signature;
      latestSettingsForTimer = settings;
    applySections(settings);
    renderNotice(settings);
    renderKaraoke(settings);
    renderFunding(settings);
      renderAccountRoller(data.accountDonors);
      renderCreators(creators);
    }
  }

  refresh();
  testSoundFromQuery();
  setInterval(refresh,5000);
})();

  window.addEventListener("resize", () => {
    if(typeof ensureAlertIndependent === "function") ensureAlertIndependent();
  });

  const alertBoxPositionWatch = setInterval(() => {
    const el = document.getElementById("optionAlert");
    if(el && el.classList.contains("show") && typeof ensureAlertIndependent === "function"){
      ensureAlertIndependent();
    }
  }, 500);
