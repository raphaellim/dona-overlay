<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>후원현황 Overlay</title>
  <!-- overlay-debug-enabled-v2 -->
  <link rel="icon" href="data:,">
  <style>
 :root{
  --account-roll-height:34px;

  --overlay-w:340px;
  --top:54px;
  --right:30px;

  --white:rgba(255,255,255,.98);
  --yellow:#ffe680;
  --plus-blue:#5ecbff;
  --minus-red:#ff4d5e;

  --box-bg-top:rgba(18,22,32,.88);
  --box-bg-bottom:rgba(10,12,20,.82);

  --style-box-border:rgba(255,216,106,.52);
  --style-box-bg-top:var(--box-bg-top);
  --style-box-bg-bottom:var(--box-bg-bottom);

  --style-account-title-size:20px;
  --style-notice-title-size:20px;
  --style-funding-title-size:20px;
  --style-karaoke-title-size:20px;
  --style-content-size:20px;
  --style-creator-content-size:24px;
  --style-account-roll-size:25px;
  --style-alert-size:30px;

  --style-karaoke-notice-size:17px;
  --style-karaoke-current-size:18px;
  --style-karaoke-queue-size:15px;
  --style-karaoke-coin-size:15px;

  --style-box-radius:18px;
  --style-overlay-gap:6px;
  --style-vip-threshold:100000;

  --oc-accent:#ffd86a;
  --oc-title-account:#ffd86a;
  --oc-title-notice:#64d9ff;
  --oc-title-creator:#ff79bd;
  --oc-title-karaoke:#a8ff8a;
  --oc-title-funding:#a8ff8a;
  --oc-plus:#64d9ff;
  --oc-minus:#ff6178;
  --oc-zero:#ffd86a;
  --oc-line:rgba(255,216,106,.52);
  --oc-soft-line:rgba(255,255,255,.16);
  --oc-shadow:0 1px 2px rgba(0,0,0,.76);
  --oc-title-shadow:0 1px 2px rgba(0,0,0,.78);
  --oc-panel-bg:
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.010)),
    rgba(0,0,0,.50);

  --alert-height:118px;
  --top-slide-opacity:1;
}

/* ===== 테마 ===== */
body.theme-gold{
  --oc-accent:#ffd86a;
  --oc-title-account:#ffd86a;
  --oc-title-notice:#64d9ff;
  --oc-title-creator:#ff79bd;
  --oc-title-karaoke:#a8ff8a;
  --oc-title-funding:#a8ff8a;
  --oc-line:rgba(255,216,106,.52);
}
body.theme-pink{
  --oc-accent:#ff79bd;
  --oc-title-account:#ffd86a;
  --oc-title-notice:#85e8ff;
  --oc-title-creator:#ff79bd;
  --oc-title-karaoke:#baffb0;
  --oc-title-funding:#baffb0;
  --oc-line:rgba(255,121,189,.54);
}
body.theme-blue{
  --oc-accent:#64d9ff;
  --oc-title-account:#ffe38a;
  --oc-title-notice:#64d9ff;
  --oc-title-creator:#c59cff;
  --oc-title-karaoke:#9dffdd;
  --oc-title-funding:#9dffdd;
  --oc-line:rgba(100,217,255,.54);
}
body.theme-green{
  --oc-accent:#a8ff8a;
  --oc-title-account:#ffe38a;
  --oc-title-notice:#9ee7ff;
  --oc-title-creator:#ff9ccc;
  --oc-title-karaoke:#a8ff8a;
  --oc-title-funding:#a8ff8a;
  --oc-line:rgba(168,255,138,.50);
}

/* ===== 기본 ===== */
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent!important;
  font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;
}
.overlay-root{
  user-select:none;
  pointer-events:none;
  position:fixed;
  inset:0;
  background:transparent;
}
.hidden{display:none!important}

/* ===== 전체 배치 ===== */
.overlay-stack{
  position:absolute;
  top:var(--top)!important;
  right:max(var(--right),30px)!important;
  width:var(--overlay-w)!important;
  max-width:calc(100vw - 54px)!important;
  display:flex!important;
  flex-direction:column!important;
  align-items:stretch!important;
  gap:var(--style-overlay-gap)!important;
  padding:0!important;
  border:0!important;
  background:transparent!important;
  box-shadow:none!important;
  overflow:visible!important;
}

.overlay-panel{
  position:relative!important;
  display:flex!important;
  flex-direction:column!important;
  gap:0!important;
  width:100%!important;
  padding:8px 11px!important;
  border:1.5px solid var(--oc-line)!important;
  border-radius:16px!important;
  background:var(--oc-panel-bg)!important;
  box-shadow:0 6px 18px rgba(0,0,0,.42), inset 0 0 12px rgba(255,255,255,.025)!important;
  backdrop-filter:blur(2px)!important;
  -webkit-backdrop-filter:blur(2px)!important;
  overflow:hidden!important;
  pointer-events:none!important;
}

.overlay-box,
.account-box,
.notice-box,
.funding-box,
.karaoke-box,
.creator-box,
.broadcast-timer-box{
  position:relative!important;
  z-index:1!important;
  width:100%!important;
  max-width:100%!important;
  box-sizing:border-box!important;
  color:var(--white)!important;
  background:transparent!important;
  border:0!important;
  border-radius:0!important;
  box-shadow:none!important;
  pointer-events:none!important;
  text-shadow:var(--oc-shadow)!important;
  -webkit-text-stroke:0!important;
  filter:none!important;
}

.overlay-panel>#fundingBox:not(.hidden),
.overlay-panel>#noticeBox:not(.hidden),
.overlay-panel>#karaokeBox:not(.hidden),
.overlay-panel>#creatorBox:not(.hidden){
  border-top:1px solid var(--oc-soft-line)!important;
}

.account-box{padding:3px 0 5px!important}
.funding-box{padding:6px 0!important}
.notice-box{padding:6px 0!important;text-align:left!important}
.karaoke-box{padding:6px 0!important;text-align:left!important;overflow:hidden!important}
.creator-box{padding:7px 0 3px!important}
.broadcast-timer-box{padding:4px 0 6px!important}

/* ===== 계좌후원: 한 줄 공간 보정 ===== */
.account-row{
  display:flex!important;
  align-items:center!important;
  justify-content:stretch!important;
  height:calc(var(--style-account-roll-size,25px) + 9px)!important;
  gap:5px!important;
  font-weight:1000!important;
  letter-spacing:-.055em!important;
}

.account-title{
  flex:0 0 42px!important;
  width:42px!important;
  min-width:42px!important;
  padding:0!important;
  background:transparent!important;
  border:0!important;
  color:transparent!important;
  font-size:0!important;
  line-height:1!important;
  text-align:left!important;
  text-shadow:none!important;
  overflow:visible!important;
  white-space:nowrap!important;
}
.account-title::before{
  content:"계좌"!important;
  display:inline-block!important;
  color:var(--oc-title-account)!important;
  font-size:calc(var(--style-account-title-size,20px) * .9)!important;
  line-height:1!important;
  font-weight:1000!important;
  letter-spacing:-.055em!important;
  text-shadow:var(--oc-title-shadow)!important;
  white-space:nowrap!important;
}

.roller{
  position:relative!important;
  flex:1 1 auto!important;
  min-width:0!important;
  width:auto!important;
  height:calc(var(--style-account-roll-size,25px) + 8px)!important;
  line-height:calc(var(--style-account-roll-size,25px) + 8px)!important;
  overflow:hidden!important;
  font-size:var(--style-account-roll-size,25px)!important;
  font-weight:1000!important;
  letter-spacing:-.055em!important;
  color:#fff!important;
}

.roller-track{
  position:absolute!important;
  left:0!important;
  right:0!important;
  top:0!important;
  transition:transform .42s ease!important;
  will-change:transform;
  transform:translate3d(0,0,0);
}
.roller-track.no-transition{transition:none!important}

.roller-item{
  height:calc(var(--style-account-roll-size,25px) + 8px)!important;
  min-height:calc(var(--style-account-roll-size,25px) + 8px)!important;
  line-height:1!important;
  display:flex!important;
  align-items:center!important;
  justify-content:flex-end!important;
  gap:4px!important;
  padding:0!important;
  white-space:nowrap!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
}

.account-donor{
  min-width:0!important;
  max-width:170px!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
  white-space:nowrap!important;
  color:#fff!important;
  -webkit-text-fill-color:#fff!important;
  background:none!important;
  font-size:1em!important;
  font-weight:1000!important;
  letter-spacing:-.035em!important;
  text-shadow:var(--oc-shadow)!important;
  filter:none!important;
}

.account-heart{
  display:inline-flex!important;
  align-items:center!important;
  justify-content:center!important;
  flex:0 0 auto!important;
  font-size:.70em!important;
  line-height:1!important;
  margin:0 1px!important;
  transform:translateY(1px);
  color:#7cff9e!important;
  -webkit-text-fill-color:#7cff9e!important;
  text-shadow:0 1px 2px rgba(0,0,0,.72)!important;
}

.account-amount{
  flex:0 0 auto!important;
  color:var(--oc-title-account)!important;
  -webkit-text-fill-color:var(--oc-title-account)!important;
  background:none!important;
  font-size:.82em!important;
  font-weight:1000!important;
  letter-spacing:-.035em!important;
  margin-left:4px!important;
  text-shadow:var(--oc-shadow)!important;
  opacity:1!important;
  filter:none!important;
}

/* ===== 고액후원 메탈 텍스트 ===== */
/* renderAccountRoller에서 vip-account / vip-10 / vip-30 / vip-50 / vip-100 class가 붙어야 적용됨 */
.roller-item.vip-account{
  background:transparent!important;
  border:0!important;
  box-shadow:none!important;
  position:relative!important;
  isolation:isolate!important;
}
.roller-item.vip-account::before,
.roller-item.vip-account::after{
  display:none!important;
  content:none!important;
  opacity:0!important;
  animation:none!important;
  background:none!important;
  box-shadow:none!important;
}

.roller-item.vip-account .account-donor,
.roller-item.vip-account .account-heart,
.roller-item.vip-account .account-amount{
  -webkit-background-clip:text!important;
  background-clip:text!important;
  -webkit-text-fill-color:transparent!important;
  color:transparent!important;
  font-weight:1000!important;
  -webkit-text-stroke:0!important;
  animation:none!important;
  filter:none!important;
  opacity:1!important;
  text-shadow:
    0 1px 0 rgba(255,255,255,.18),
    0 2px 3px rgba(0,0,0,.55)!important;
}

/* 10만원 이상 - 샴페인 골드 */
.roller-item.vip-10 .account-donor,
.roller-item.vip-10 .account-heart,
.roller-item.vip-10 .account-amount{
  background:linear-gradient(180deg,#fffef7 0%,#fff3b0 18%,#f3d15f 40%,#b8841f 58%,#fff0a2 78%,#fffef8 100%)!important;
}

/* 30만원 이상 - 로즈 골드 */
.roller-item.vip-30 .account-donor,
.roller-item.vip-30 .account-heart,
.roller-item.vip-30 .account-amount{
  background:linear-gradient(180deg,#fff8f8 0%,#ffd8d8 20%,#f2a7a7 45%,#b76b6b 60%,#ffdcdc 82%,#fff8f8 100%)!important;
}

/* 50만원 이상 - 화이트 골드 */
.roller-item.vip-50 .account-donor,
.roller-item.vip-50 .account-heart,
.roller-item.vip-50 .account-amount{
  background:linear-gradient(180deg,#ffffff 0%,#f8f8f8 25%,#d8d8d8 45%,#8b8b8b 62%,#ffffff 82%,#ffffff 100%)!important;
}

/* 100만원 이상 - 블루 사파이어 메탈 */
.roller-item.vip-100 .account-donor,
.roller-item.vip-100 .account-heart,
.roller-item.vip-100 .account-amount{
  background:linear-gradient(180deg,#ffffff 0%,#dff5ff 18%,#8ad6ff 42%,#2e72c8 60%,#dff5ff 82%,#ffffff 100%)!important;
}

/* 금액은 고액에서도 작게 유지 */
.roller-item.vip-account .account-amount{
  font-size:.82em!important;
  margin-left:5px!important;
}

/* ===== 공지 ===== */
.notice-title,
.funding-title,
.karaoke-title{
  display:block!important;
  width:100%!important;
  max-width:100%!important;
  margin:0 0 4px!important;
  padding:0!important;
  background:transparent!important;
  border:0!important;
  box-shadow:none!important;
  border-radius:0!important;
  font-size:calc(var(--style-notice-title-size,20px) * .9)!important;
  line-height:1.05!important;
  font-weight:1000!important;
  letter-spacing:-.055em!important;
  text-align:left!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
  white-space:nowrap!important;
}
.notice-title{color:var(--oc-title-notice)!important}
.notice-title::before{content:"• "}
.funding-title{color:var(--oc-title-funding)!important;font-size:calc(var(--style-funding-title-size,20px) * .9)!important}
.funding-title::before{content:"• "}
.karaoke-title{color:var(--oc-title-karaoke)!important;font-size:calc(var(--style-karaoke-title-size,20px) * .9)!important}
.karaoke-title::before{content:"• "}

.notice-text,
.notice-line{
  font-size:var(--style-content-size,20px)!important;
  line-height:1.14!important;
  font-weight:1000!important;
  letter-spacing:-.06em!important;
  word-break:keep-all!important;
  overflow-wrap:anywhere!important;
  color:var(--style-notice-content-color,#fff)!important;
  text-align:left!important;
  text-shadow:var(--oc-shadow)!important;
}
.notice-line{
  display:block!important;
  margin:1px 0!important;
}
.notice-line.notice-align-left{text-align:left!important}
.notice-line.notice-align-center{text-align:center!important}
.notice-line.notice-align-right{text-align:right!important}

.notice-roll-window{
  height:calc(var(--style-content-size,20px) * 1.14 * 3)!important;
  overflow:hidden!important;
  position:relative!important;
}
.notice-roll-track{
  display:flex!important;
  flex-direction:column!important;
  animation:noticeRollUp var(--notice-roll-duration,10s) linear infinite!important;
}
.notice-roll-track .notice-line{
  min-height:calc(var(--style-content-size,20px) * 1.14)!important;
}
.notice-text.rolling .notice-line:nth-child(n+4){display:block!important}
.notice-text:not(.rolling) .notice-line:nth-child(n+4){display:none!important}
@keyframes noticeRollUp{
  0%,18%{transform:translateY(0)}
  100%{transform:translateY(var(--notice-roll-distance,-50%))}
}

/* ===== 용돈 ===== */
.allowance-row{
  margin-top:5px!important;
  padding:5px 0 0!important;
  border-top:1px solid rgba(255,255,255,.18)!important;
  font-size:calc(var(--style-content-size,20px) * .95)!important;
  line-height:1.1!important;
  font-weight:1000!important;
  color:#fff3a6!important;
  letter-spacing:-.055em!important;
  text-align:left!important;
  text-shadow:var(--oc-shadow)!important;
}
.allowance-plus,
.allowance-positive{color:#fff3a6!important;font-weight:1000!important}
.allowance-minus,
.allowance-negative{color:#ff5c73!important;font-weight:1000!important}

/* ===== 펀딩 ===== */
.funding-title{display:none!important}
.funding-value{
  display:flex!important;
  flex-direction:column!important;
  gap:0!important;
  margin-top:0!important;
  font-size:var(--style-content-size,20px)!important;
  line-height:1!important;
  font-weight:1000!important;
  text-align:left!important;
  color:#f8fafc!important;
}
.funding-value>.funding-line:not(:first-child){display:none!important}
.funding-value .funding-roller .funding-line{display:flex!important}
.funding-line{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  overflow:hidden;
  min-height:calc(var(--style-content-size,20px) + 13px)!important;
  height:calc(var(--style-content-size,20px) + 13px)!important;
  padding:5px 8px!important;
  border-radius:8px!important;
  background:rgba(0,0,0,.18)!important;
  border:1px solid rgba(255,255,255,.14)!important;
  font-size:var(--style-content-size,20px)!important;
  font-weight:1000!important;
  letter-spacing:-.06em!important;
}
.funding-line span,
.funding-line b{
  position:relative;
  z-index:2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.funding-line b{flex:0 0 auto;color:var(--style-funding-content-color,#f8fafc)!important}
.funding-line em{
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  z-index:1;
  background:var(--style-funding-bar,linear-gradient(90deg,rgba(0,234,255,.20),rgba(255,79,216,.12)))!important;
  opacity:.95!important;
  pointer-events:none;
}
.funding-roller{
  position:relative!important;
  height:calc(var(--style-content-size,20px) + 13px)!important;
  overflow:hidden!important;
}
.funding-track.no-transition{transition:none!important}
.funding-track .funding-line{
  height:calc(var(--style-content-size,20px) + 13px)!important;
  margin:0 0 4px!important;
}

/* ===== 노래방 ===== */
.karaoke-mini-title{display:none!important}
.karaoke-notice{
  margin-top:4px!important;
  color:var(--style-karaoke-notice-color,#fde68a)!important;
  font-size:var(--style-karaoke-notice-size,17px)!important;
  line-height:1.1!important;
  font-weight:1000!important;
  text-align:left!important;
  text-shadow:var(--oc-shadow)!important;
}
.karaoke-current{
  display:grid!important;
  grid-template-columns:auto auto minmax(0,1fr)!important;
  align-items:center!important;
  gap:4px!important;
  margin-top:8px!important;
  overflow:hidden!important;
  font-size:var(--style-karaoke-current-size,18px)!important;
  line-height:1.1!important;
  font-weight:1000!important;
  text-align:left!important;
  color:var(--style-karaoke-current-color,#e0f2fe)!important;
}
.karaoke-current b,
.karaoke-heart{color:var(--style-karaoke-heart-color,#ff4fa3)!important;font-weight:1000!important;white-space:nowrap!important}
.karaoke-current em,
.karaoke-donor{
  color:var(--style-karaoke-donor-color,#39ff88)!important;
  font-style:normal!important;
  font-weight:1000!important;
  white-space:nowrap!important;
}
.karaoke-reserve-title{
  margin-top:5px!important;
  color:var(--oc-title-karaoke)!important;
  text-align:left!important;
  font-size:calc(var(--style-karaoke-queue-size,15px) * 1.12)!important;
  font-weight:1000!important;
}
.karaoke-queue{
  display:flex!important;
  flex-direction:column!important;
  align-items:stretch!important;
  gap:4px!important;
  margin-top:5px!important;
  text-align:left!important;
  overflow:visible!important;
}
.karaoke-song-row{
  display:grid!important;
  grid-template-columns:36px auto minmax(0,1fr)!important;
  align-items:center!important;
  gap:4px!important;
  min-width:0!important;
  overflow:hidden!important;
  color:var(--style-karaoke-queue-color,#fff)!important;
  font-size:var(--style-karaoke-queue-size,15px)!important;
  font-weight:900!important;
  line-height:1.15!important;
  text-align:left!important;
}
.karaoke-song-row.hold{opacity:.78!important}
.karaoke-order{color:#fff1a8!important;white-space:nowrap!important;font-weight:1000!important}
.karaoke-hold-title{
  margin-top:7px!important;
  padding-top:6px!important;
  border-top:1px solid rgba(255,255,255,.16)!important;
  color:#ff9bd6!important;
  font-size:14px!important;
  line-height:1!important;
  font-weight:1000!important;
  text-align:left!important;
}
.karaoke-song-title-wrap{
  display:block!important;
  min-width:0!important;
  overflow:hidden!important;
  white-space:nowrap!important;
}
.karaoke-song-title-text{
  display:inline-block!important;
  color:#fff!important;
  font-weight:950!important;
  white-space:nowrap!important;
  padding-left:0;
  animation:karaokeSongMarquee 7.5s linear infinite;
  animation-delay:1s;
}
@keyframes karaokeSongMarquee{
  0%,18%{transform:translateX(0)}
  100%{transform:translateX(-55%)}
}
.queue-empty{
  display:block!important;
  padding:4px 0!important;
  color:rgba(255,255,255,.68)!important;
  font-size:15px!important;
  font-weight:900!important;
  text-align:left!important;
  opacity:.72!important;
}
.karaoke-coin-ticker{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  margin-top:9px;
  border-radius:999px;
  background:rgba(0,0,0,.20)!important;
  border:1px solid rgba(255,255,255,.14)!important;
  text-align:left!important;
}
.karaoke-coin-ticker span{
  display:inline-block;
  padding-left:100%;
  font-size:var(--style-karaoke-coin-size,15px)!important;
  line-height:26px!important;
  font-weight:1000;
  color:var(--style-karaoke-coin-color,#fff)!important;
  animation:karaokeTickerMove 8s linear infinite;
}
@keyframes karaokeTickerMove{
  from{transform:translateX(0)}

      function num(v) { const n = Number(v || 0); return Number.isFinite(n) ? n : 0; }
      function displayManAmount(won) {
        const v = Math.trunc(Number(won || 0) / 1000) / 10;
        return v.toFixed(1).replace(/\.0$/, "");
      }

      function displayAmount(won) {
        return Math.floor(num(won)).toLocaleString("ko-KR");
      }
      function normalizeName(v) { return String(v ?? "").replace(/\s+/g, " ").trim(); }
      function escapeHtml(str) { return String(str).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch])); }
      function formatCreatorName(name) {
        const arr = Array.from(String(name || "").trim());
        if (arr.length >= 3) return arr.slice(0, 3).join("");
        if (arr.length === 2) return arr.join(" ");
        if (arr.length === 1) return arr[0] + "  ";
        return "익 명";
      }
      function getEnabledPresets(settings) {
        const presets = settings && Array.isArray(settings.presets) ? settings.presets : [];
        return presets.filter(p => p && p.enabled !== false);
      }


      function applyLuxuryTheme(settings) {
        const st = settings?.stationStyle || {};
        const theme = String(st.luxuryTheme || new URLSearchParams(location.search).get("theme") || "gold").trim().toLowerCase();
        document.body.classList.remove("theme-gold", "theme-pink", "theme-blue", "theme-green");
        document.body.classList.add("theme-" + (["gold","pink","blue","green"].includes(theme) ? theme : "gold"));
      }

      function applyStationStyle(settings) {
        const st = settings?.stationStyle || {};
        const root = document.documentElement;
        const set = (name, value) => {
          if (value !== undefined && value !== null && String(value).trim() !== "") {
            root.style.setProperty(name, String(value));
          }
        };

        set("--style-box-border", st.boxBorderColor);
        set("--style-box-bg-top", st.boxBgTop);
        set("--style-box-bg-bottom", st.boxBgBottom);
        set("--style-account-title-color", st.accountTitleColor);
        set("--style-notice-title-color", st.noticeTitleColor);
        set("--style-funding-title-color", st.fundingTitleColor);
        set("--style-karaoke-title-color", st.karaokeTitleColor);
        set("--style-content-color", st.contentColor);
        set("--style-notice-content-color", st.noticeContentColor);
        set("--style-funding-content-color", st.fundingContentColor);
        set("--style-karaoke-content-color", st.karaokeContentColor);
        set("--style-karaoke-notice-color", st.karaokeNoticeColor);
        set("--style-karaoke-current-color", st.karaokeCurrentColor);
        set("--style-karaoke-queue-color", st.karaokeQueueColor);
        set("--style-karaoke-coin-color", st.karaokeCoinColor);
        set("--style-karaoke-donor-color", st.karaokeDonorColor);
        set("--style-karaoke-heart-color", st.karaokeHeartColor);
        set("--style-funding-bar", st.fundingBarColor);
        if (st.overlayWidth) set("--overlay-w", Number(st.overlayWidth) + "px");
        if (st.overlayTop !== undefined) set("--top", Number(st.overlayTop) + "px");
        if (st.overlayRight !== undefined) set("--right", Number(st.overlayRight) + "px");
        if (st.overlayGap !== undefined) set("--style-overlay-gap", Number(st.overlayGap) + "px");
        if (st.boxRadius !== undefined) set("--style-box-radius", Number(st.boxRadius) + "px");
        // if(st.topSlideHeight !== undefined) set("--top-slide-height", Number(st.topSlideHeight) + "px");
        if (st.topSlideOpacity !== undefined) set("--top-slide-opacity", Number(st.topSlideOpacity));
        if (st.karaokeNoticeSize) set("--style-karaoke-notice-size", Number(st.karaokeNoticeSize) + "px");
        if (st.karaokeCurrentSize) set("--style-karaoke-current-size", Number(st.karaokeCurrentSize) + "px");
        if (st.karaokeQueueSize) set("--style-karaoke-queue-size", Number(st.karaokeQueueSize) + "px");
        if (st.karaokeCoinSize) set("--style-karaoke-coin-size", Number(st.karaokeCoinSize) + "px");
        document.body.classList.toggle("box-group-single", st.boxGroupMode === "single");
        set("--style-vip-bg1", st.vipAccountBg1);
        set("--style-vip-bg2", st.vipAccountBg2);
        if (st.vipAccountThreshold !== undefined) set("--style-vip-threshold", Number(st.vipAccountThreshold));

        if (st.accountTitleSize) set("--style-account-title-size", Number(st.accountTitleSize) + "px");
        if (st.noticeTitleSize) set("--style-notice-title-size", Number(st.noticeTitleSize) + "px");
        if (st.fundingTitleSize) set("--style-funding-title-size", Number(st.fundingTitleSize) + "px");
        if (st.karaokeTitleSize) set("--style-karaoke-title-size", Number(st.karaokeTitleSize) + "px");
        if (st.contentFontSize) set("--style-content-size", Number(st.contentFontSize) + "px");
        if (st.creatorContentSize) set("--style-creator-content-size", Number(st.creatorContentSize) + "px");
        if (st.accountRollFontSize) set("--style-account-roll-size", Number(st.accountRollFontSize) + "px");
        if (st.alertFontSize) set("--style-alert-size", Number(st.alertFontSize) + "px");
      }

      function getOverlaySections(settings) {
        const s = settings?.overlaySections || {};
        return {
          account: s.account !== false,
          notice: s.notice === true,
          allowance: s.allowance === true,
          creators: s.creators !== false,
          creatorDonations: s.creatorDonations !== false,
          karaoke: s.karaoke === true,
          funding: s.funding === true,
          broadcastTimer: s.broadcastTimer === true,
          media: s.media !== false
        };
      }





      let fundingRollIndex = 0;
      let topSlideTimer = null;
      let topSlideIndex = 0;
      function renderTopSlide(settings) {
        debugLog("renderTopSlide input", {
          stationStyle: settings?.stationStyle,
          overlaySections: settings?.overlaySections,
          media: settings?.media
        });

        const box = document.getElementById("topSlideBox");
        if (!box) return;

        const st = settings?.stationStyle || {};
        const sections = getOverlaySections(settings);

        const enabled = sections.media !== false;

        const normalizeSlideSrc = (item) => {
          if (!item) return "";
          if (typeof item === "string") return item.trim();
          if (typeof item === "object") {
            return String(item.url || item.src || item.path || item.file || "").trim();
          }
          return "";
        };

        const splitTextList = (value) => String(value || "")
          .split(/\r?\n|,/)
          .map(v => v.trim())
          .filter(Boolean);

        let media = [];

        [
          st.topSlideImages,
          st.topSlideItems,
          st.mediaSlides,
          st.slideImages,
          st.slides,
          settings?.media?.slides,
          settings?.media?.items,
          settings?.topSlideImages,
          settings?.mediaSlides
        ].forEach(list => {
          if (Array.isArray(list)) {
            list.map(normalizeSlideSrc).filter(Boolean).forEach(src => {
              if (!media.includes(src)) media.push(src);
            });
          } else if (typeof list === "string") {
            splitTextList(list).forEach(src => {
              if (!media.includes(src)) media.push(src);
            });
          }
        });

        if (Array.isArray(st.mediaItems)) {
          st.mediaItems.map(normalizeSlideSrc).filter(Boolean).forEach(src => {
            if (!media.includes(src)) media.push(src);
          });
        }

        if (topSlideTimer) {
          clearInterval(topSlideTimer);
          topSlideTimer = null;
        }

        topSlideIndex = 0;

        debugLog("topSlide enabled", enabled);
        debugLog("topSlide sections.media", sections.media);
        debugLog("topSlide media count", media.length);
        debugLog("topSlide media", media);

        if (!enabled || !media.length) {
          box.classList.add("hidden");
          box.innerHTML = "";
          return;
        }

        const isVideo = (src) => /\.(mp4|webm|mov)(\?|#|$)/i.test(String(src));

        const html = media.map((src, idx) => {
          const active = idx === 0 ? "active" : "";
          const safe = escapeHtml(src);

          return isVideo(src)
            ? '<video class="top-slide-video ' + active + '" data-debug-slide="' + idx + '" src="' + safe + '" muted playsinline loop preload="metadata"></video>'
            : '<img class="top-slide-img ' + active + '" data-debug-slide="' + idx + '" src="' + safe + '" alt="slide">';
        }).join("");

        box.classList.remove("hidden");
        box.innerHTML = html;

        debugLog("topSlide rendered html length", html.length);

        function applySlideRatio(el) {
          if (!el) return;

          if (el.tagName === "IMG" && el.naturalWidth && el.naturalHeight) {
            document.documentElement.style.setProperty(
              "--active-slide-ratio",
              el.naturalWidth + " / " + el.naturalHeight
            );
          }

          if (el.tagName === "VIDEO" && el.videoWidth && el.videoHeight) {
            document.documentElement.style.setProperty(
              "--active-slide-ratio",
              el.videoWidth + " / " + el.videoHeight
            );
          }
        }

        box.querySelectorAll("img").forEach(img => {
          img.onload = () => {
            applySlideRatio(img);
            debugLog("slide img loaded", img.src);
          };

          img.onerror = () => {
            debugLog("slide img error", img.src);
          };

          if (img.complete) {
            applySlideRatio(img);
          }
        });

        box.querySelectorAll("video").forEach(v => {
          v.onloadedmetadata = () => {
            applySlideRatio(v);
            debugLog("slide video loaded", v.src);
          };

          v.onerror = () => {
            debugLog("slide video error", v.src);
          };
        });

        const playActive = () => {
          box.querySelectorAll("video").forEach(v => {
            try {
              v.pause();
              v.currentTime = 0;
            } catch (_) { }
          });

          const active = box.querySelector(".active");
          applySlideRatio(active);

          if (active && active.tagName === "VIDEO") {
            active.play().catch(() => { });
          }
        };

        playActive();

        if (media.length > 1) {
          const interval = Math.max(800, Number(st.topSlideInterval || 3500));

          topSlideTimer = setInterval(() => {
            const slides = Array.from(
              box.querySelectorAll(".top-slide-img,.top-slide-video")
            );

            if (!slides.length) return;

            slides.forEach(el => el.classList.remove("active"));

            topSlideIndex = (topSlideIndex + 1) % slides.length;
            slides[topSlideIndex].classList.add("active");

            playActive();
          }, interval);
        }
      }

      function renderFunding(settings) {
        if (!$fundingBox) return;

        const items = (settings?.fundingData?.items || [])
          .filter(f => f.enabled !== false);

        const valueEl = $fundingBox.querySelector(".funding-value");
        if (!valueEl) return;

        const rowHtml = (f) => {
          const cur = Number(f.current || 0);
          const target = Number(f.target || 0);
          const pct = target > 0 ? Math.min(100, Math.round(cur / target * 100)) : 0;

          return `
      <div class="funding-line">
        <span>${escapeHtml(f.title)}</span>
        <b>${cur}/${target}</b>
        <em style="width:${pct}%"></em>
      </div>
    `;
        };

        if (!items.length) {
          valueEl.innerHTML = `<div class="funding-line">등록된 펀딩 없음</div>`;
          return;
        }

        if (items.length === 1) {
          valueEl.innerHTML = rowHtml(items[0]);
          return;
        }

        valueEl.innerHTML = `
    <div class="funding-roller">
      <div class="funding-track" id="fundingTrack">
        ${items.concat(items[0]).map(rowHtml).join("")}
      </div>
    </div>
  `;

        const track = valueEl.querySelector("#fundingTrack");
        const rows = Array.from(track.children);

        fundingRollIndex = fundingRollIndex % items.length;

        const moveToIndex = (index, useTransition = true) => {
          const row = rows[index];
          const y = row ? row.offsetTop : 0;

          if (useTransition) {
            track.classList.remove("no-transition");
          } else {
            track.classList.add("no-transition");
          }

          track.style.transform = `translate3d(0, ${-y}px, 0)`;
        };

        moveToIndex(fundingRollIndex, false);

        setTimeout(() => {
          fundingRollIndex += 1;
          moveToIndex(fundingRollIndex, true);

          if (fundingRollIndex === items.length) {
            setTimeout(() => {
              fundingRollIndex = 0;
              moveToIndex(0, false);
              track.offsetHeight;
              track.classList.remove("no-transition");
            }, 460);
          }
        }, 2600);
      }

      function timerBaseMs(settings) {
        const t = settings?.broadcastTimerData || {};
        const now = Date.now();
        if (t.mode === "until" && t.targetAt) {
          const target = new Date(t.targetAt).getTime();
          return Math.max(0, target - now);
        }
        let elapsed = Math.max(0, Number(t.elapsedMs || 0));
        if (t.running && t.startedAt) {
          const start = new Date(t.startedAt).getTime();
          if (start) elapsed += Math.max(0, now - start);
        }
        if (t.mode === "countdown") {
          const dur = Math.max(0, Number(t.durationMs || 0));
          return Math.max(0, dur - elapsed);
        }
        return elapsed;
      }

      function coinLabel(type) {
        return type === "full" ? "완곡" : type === "special" ? "스페셜" : "1절";
      }

      function renderKaraoke(settings) {
        const data = settings?.karaokeData || {};
        const users = Array.isArray(data.users) ? data.users : [];
        const songs = Array.isArray(data.songs) ? data.songs.filter(s => s.status !== "삭제" && s.status !== "완료") : [];

        if ($karaokeTitleText) $karaokeTitleText.textContent = data.title || "노래방 공지 알림판";
        if ($karaokeNoticeText) $karaokeNoticeText.textContent = data.notice || data.ticker || "노래문의필수";

        const songMarquee = (title) => {
          const safeTitle = escapeHtml(title || "");
          return `<span class="karaoke-song-title-wrap"><span class="karaoke-song-title-text">${safeTitle}</span></span>`;
        };

        const running = songs.find(s => s.status === "진행");
        if ($karaokeCurrentText) {
          $karaokeCurrentText.innerHTML = running
            ? `<b>진행중<span class="karaoke-heart">♥</span></b><em>${escapeHtml(running.nick)}</em>${songMarquee(running.title)}`
            : `<b>진행중<span class="karaoke-heart">♥</span></b>`;
        }

        if ($karaokeQueueList) {
          const waitQueue = songs.filter(s => s.status === "대기").slice(0, 6);
          const holdQueue = songs.filter(s => s.status === "보류").slice(0, 6);

          const waitHtml = waitQueue.length
            ? waitQueue.map((s, idx) => `
          <div class="karaoke-song-row">
            <span class="karaoke-order">${idx + 1}번</span>
            <em class="karaoke-donor">${escapeHtml(s.nick)}</em>
            ${songMarquee(s.title)}
          </div>
        `).join("")
            : `<div class="queue-empty">예약 없음</div>`;

          const holdHtml = holdQueue.length

        const titleEl = document.querySelector(".notice-title");
        const textEl = document.querySelector(".notice-text");
        if (!titleEl || !textEl) return;

        const rawNotice = settings?.notice;

        if (typeof rawNotice === "string") {
          text = rawNotice;
          title = String(settings?.noticeTitle || settings?.notice_title || "공지사항");
          colors = Array.isArray(settings?.noticeColors) ? settings.noticeColors : [];
        } else if (rawNotice && typeof rawNotice === "object") {
          title = String(rawNotice.title ?? settings?.noticeTitle ?? settings?.notice_title ?? "공지사항");
          text = String(rawNotice.text ?? rawNotice.content ?? settings?.noticeText ?? settings?.notice_text ?? "");
          colors = Array.isArray(rawNotice.colors)
            ? rawNotice.colors
            : (Array.isArray(settings?.noticeColors) ? settings.noticeColors : []);
        } else {
          title = String(settings?.noticeTitle || settings?.notice_title || "공지사항");
          text = String(settings?.noticeText || settings?.notice_text || "");
          colors = Array.isArray(settings?.noticeColors) ? settings.noticeColors : [];
        }

        text = String(text || "").replace(/\\n/g, "\n");
        titleEl.textContent = title.trim() || "공지사항";

        if (!text.trim()) {
          textEl.innerHTML = "";
          return;
        }

        const lines = text.split(/\r?\n/).filter(line => String(line).trim() !== "");
        const noticeAligns = Array.isArray(settings?.noticeAligns) ? settings.noticeAligns : [];
        const lineHtml = lines.map((line, idx) => {
          let text = String(line || "");
          let align = String(noticeAligns[idx] || "left").toLowerCase();

          const tagMatch = text.match(/^\s*\[(left|center|right|왼쪽|가운데|오른쪽)\]\s*/i);
          if (tagMatch) {
            const tag = tagMatch[1].toLowerCase();
            align = tag === "왼쪽" ? "left" : tag === "가운데" ? "center" : tag === "오른쪽" ? "right" : tag;
            text = text.replace(tagMatch[0], "");
          }

          if (!["left", "center", "right"].includes(align)) align = "left";

          const color = colors[idx] || "";
          const style = color ? ` style="color:${escapeHtml(color)} !important"` : "";
          return `<span class="notice-line notice-align-${align}"${style}>${escapeHtml(text)}</span>`;
        }).join("");

        if (lines.length > 3) {
          textEl.classList.add("rolling");
          const duration = Math.max(8, lines.length * 2.4);
          textEl.style.setProperty("--notice-roll-duration", duration + "s");
          textEl.innerHTML = `
        <div class="notice-roll-window">
          <div class="notice-roll-track">
            ${lineHtml}
            ${lineHtml}

      function zeroCreatorsFromSettings(settings) {
        const creators = Array.isArray(settings?.creators) ? settings.creators : [];
        return creators.map(name => ({
          creator: normalizeName(name),
          total: 0,
          smokeNet: 0,
          eatNet: 0,
          presetNets: []
        })).filter(row => row.creator);

      function aggregateAccountDonorsFromDonations(donations) {
        const map = new Map();
        (donations || []).forEach(d => {
          const account = num(d.accountAmount ?? d.account_amount);
          if (account <= 0) return;
          const donor = normalizeName(d.donor || d.donor_name || "익명");
          if (!map.has(donor)) map.set(donor, { donor, amount: 0, latestAt: d.createdAt || d.created_at || "" });
          const row = map.get(donor);
          row.amount += account;
          if (new Date(d.createdAt || d.created_at || 0) > new Date(row.latestAt || 0)) row.latestAt = d.createdAt || d.created_at || "";
        });
        return Array.from(map.values()).sort((a, b) => new Date(b.latestAt || 0) - new Date(a.latestAt || 0)).slice(0, 10);
      }

      function aggregateCreatorsFromDonations(donations, settings) {
        const allowed = new Set((Array.isArray(settings?.creators) ? settings.creators : [])
          .map(normalizeName)
          .filter(Boolean));

        const map = new Map();
        zeroCreatorsFromSettings(settings).forEach(c => map.set(c.creator, c));
        if (!allowed.size) return Array.from(map.values()).slice(0, 5);

        (donations || []).forEach(d => {
          const creator = normalizeName(d.creator || "");
          if (!creator || !allowed.has(creator)) return;

          const account = num(d.accountAmount ?? d.account_amount);
          const toonie = num(d.toonieAmount ?? d.toonie_amount);
          const total = num(d.totalAmount ?? d.total_amount ?? account + toonie);

          const row = map.get(creator) || { creator, total: 0, smokeNet: 0, eatNet: 0, presetNets: [] };
          row.total += total;
          row.smokeNet += num(d.smoke || 0) - num(d.nosmoke || 0);
          row.eatNet += num(d.eat || 0) - num(d.noeat || 0);

          (Array.isArray(d.checks) ? d.checks : []).forEach(ch => {
            const key = ch.presetId || ch.presetTitle;
            if (!key) return;
            let n = row.presetNets.find(x => (ch.presetId && x.presetId === ch.presetId) || (ch.presetTitle && x.presetTitle === ch.presetTitle));
            if (!n) {
              n = { presetId: ch.presetId, presetTitle: ch.presetTitle, plusName: "", minusName: "", plus: 0, minus: 0 };
              row.presetNets.push(n);
            }
            if (ch.side === "minus") { n.minus += num(ch.count || 1); n.minusName = ch.name || n.minusName; }
            else { n.plus += num(ch.count || 1); n.plusName = ch.name || n.plusName; }
          });

          map.set(creator, row);
        });

        return Array.from(map.values()).slice(0, 5);
      }

      function normalizeCreatorRows(summary) {
        const settings = summary?.settings || defaultSettings;
        const allowed = new Set((Array.isArray(settings?.creators) ? settings.creators : [])
          .map(normalizeName)
          .filter(Boolean));

        const rows = Array.isArray(summary?.creators)
          ? summary.creators
          : (Array.isArray(summary?.creatorSummary) ? summary.creatorSummary : []);

        const cleaned = rows
          .map(row => ({ ...row, creator: normalizeName(row.creator || row.name || "") }))
          .filter(row => row.creator && (!allowed.size || allowed.has(row.creator)));

        if (cleaned.length) return cleaned.slice(0, 5);

        const aggregated = aggregateCreatorsFromDonations(summary?.donations || [], settings);
        return aggregated.length ? aggregated : zeroCreatorsFromSettings(settings);
      }

      function statusLabelsFromPresetNets(presets, row) {
        const nets = Array.isArray(row.presetNets) ? row.presetNets : [];
        return presets.map(preset => {
          const n = nets.find(x => (x.presetId && x.presetId === preset.id) || (x.presetTitle && x.presetTitle === preset.title));
          if (n) {
            const net = num(n.plus) - num(n.minus);
            if (net > 0) return `<span class="plus">${escapeHtml(n.plusName || preset.plusName || "+")} +${Math.abs(net)}</span>`;
            if (net < 0) return `<span class="red">${escapeHtml(n.minusName || preset.minusName || "-")} -${Math.abs(net)}</span>`;
          }
          if (preset.id === "smoke") {
            const net = num(row.smokeNet ?? row.smoke_net ?? 0);
            if (net > 0) return `<span class="plus">${escapeHtml(preset.plusName || "흡연")} +${Math.abs(net)}</span>`;
            if (net < 0) return `<span class="red">${escapeHtml(preset.minusName || "금연")} -${Math.abs(net)}</span>`;
          }
          if (preset.id === "food") {
            const net = num(row.eatNet ?? row.foodNet ?? row.food_net ?? 0);
            if (net > 0) return `<span class="plus">${escapeHtml(preset.plusName || "먹어")} +${Math.abs(net)}</span>`;
            if (net < 0) return `<span class="red">${escapeHtml(preset.minusName || "먹지마")} -${Math.abs(net)}</span>`;
          }
          return `<span class="muted">${escapeHtml(preset.title || "처리")} 0</span>`;
        });
      }

let vipClass = "";
if (amountNum >= 1000000) vipClass = " vip-account vip-100";

        const moveToIndex = (index, useTransition = true) => {

          if (useTransition) {

          } else {
            $track.classList.add("no-transition");
          }

          // offsetTop 기준으로 이동해서 프리즘 스케일/폰트 렌더링 차이에도 누적 오차가 생기지 않음
          $track.style.transform = `translate3d(0, ${-y}px, 0)`;
        };

        if (rollingItems.length <= 1) {
          rollingIndex = 0;
          $track.innerHTML = rollingItems.map(makeItemHtml).join("");
          moveToIndex(0, false);
          return;
        }

        const renderItems = [...rollingItems, rollingItems[0]];
        $track.innerHTML = renderItems.map(makeItemHtml).join("");

        rollingIndex = 0;
        moveToIndex(0, false);
        $track.offsetHeight;
        $track.classList.remove("no-transition");

        const holdMs = 2600;
        const transitionMs = 420;

        rollingTimer = setInterval(() => {
          rollingIndex += 1;
          moveToIndex(rollingIndex, true);

          if (rollingIndex === rollingItems.length) {
            setTimeout(() => {
              rollingIndex = 0;
              moveToIndex(0, false);

              $track.classList.remove("no-transition");

      function renderCreators(creators) {
        const creatorOrder = new Map(
  (Array.isArray(latestSettingsForTimer?.creators) ? latestSettingsForTimer.creators : [])
    .map((name, idx) => [normalizeName(name), idx])
);

const rows = (Array.isArray(creators) ? creators : [])
  .slice()
  .sort((a, b) => {
    const an = normalizeName(a.creator || a.name || "");
    const bn = normalizeName(b.creator || b.name || "");
    return (creatorOrder.get(an) ?? 9999) - (creatorOrder.get(bn) ?? 9999);
  })
  .slice(0, 5);
        const visiblePresets = (enabledPresets || []).filter(p => p.enabled !== false);
        const showDonation = (typeof showCreatorDonations === "undefined") ? true : showCreatorDonations;

        if (!rows.length) {
          $list.innerHTML = "";
          return;
        }

        function presetShortName(preset) {
          const plus = String(preset?.plusName || preset?.title || "옵션").trim();
          if (plus === "흡연") return "흡";
          if (plus === "먹어") return "먹";
          return plus.length > 2 ? plus.slice(0, 2) : plus;
        }

        function presetNetValue(row, preset) {
          const nets = Array.isArray(row.presetNets) ? row.presetNets : [];
          const n = nets.find(x =>
            (preset.id && x.presetId === preset.id) ||
            (preset.title && x.presetTitle === preset.title)
          );

          if (n) return num(n.plus) - num(n.minus);

          if (preset.id === "smoke") {
            return num(row.smokeNet ?? row.smoke_net ?? 0);
          }

          if (preset.id === "food") {
            return num(row.eatNet ?? row.foodNet ?? row.food_net ?? 0);
          }

          return 0;
        }

        function signedText(prefix, value) {
          const n = Number(value || 0);
          return prefix + (n < 0 ? "-" + Math.abs(n) : "+" + n);
        }

        function signClass(value) {
          const n = Number(value || 0);
          if (n < 0) return "red";
          if (n > 0) return "plus";
          return "muted";
        }

        $list.innerHTML = rows.map(row => {
          const rawName = normalizeName(row.creator || row.name || "익명");
          const shortName = Array.from(rawName).slice(0, 4).join("") || "익명";
          const total = displayManAmount(row.total ?? row.totalAmount ?? row.total_amount ?? row.amount ?? 0);

          const totalHtml = showDonation
            ? `<span class="creator-align-total">(${escapeHtml(total)})</span>`
            : "";

          const optionHtml = visiblePresets.map(preset => {
            const value = presetNetValue(row, preset);
            const label = signedText(presetShortName(preset), value);
            return `<span class="creator-align-opt ${signClass(value)}">${escapeHtml(label)}</span>`;
          }).join("");

          return `

          <div class="creator-align-line" style="--preset-count:${visiblePresets.length || 1}">
            <span class="creator-align-main">${escapeHtml(shortName)}${totalHtml}</span>
            <span class="creator-align-options">${optionHtml}</span>
          </div>
        </article>
      `;
        }).join("");
      }

      function donationWon(row) {
        const accountAmount = num(row?.accountAmount ?? row?.account_amount);
        const toonieAmount = num(row?.toonieAmount ?? row?.toonie_amount);
        return num(row?.totalAmount ?? row?.total_amount ?? accountAmount + toonieAmount);
      }

      function donationAccountWon(row) {
        return num(row?.accountAmount ?? row?.account_amount);
      }

      function donationToonieWon(row) {
        return num(row?.toonieAmount ?? row?.toonie_amount);
      }

      function donationCreatedTime(row) {
        const raw = row?.createdAt || row?.created_at || 0;
        const t = new Date(raw).getTime();
        return Number.isFinite(t) ? t : 0;
      }

      function donationAlertKey(row) {
        return (row?.id || "") + "_" + (row?.createdAt || row?.created_at || "");
      }

      function donationAlertGroupKey(group) {
        const rows = Array.isArray(group?.alertGroupRows) && group.alertGroupRows.length
          ? group.alertGroupRows
          : [group];

        const ids = rows
          .map(r => r && r.id)
          .filter(Boolean)
          .sort();

        if (ids.length) return ids.join("|");

        return rows
          .map(r => donationAlertKey(r))
          .filter(Boolean)
          .sort()
          .join("|");
      }

      function isSilentDonationRow(row) {
        return row?.silentAlert === true
          || String(row?.memo || '').includes('[무알림]')
          || (Array.isArray(row?.checks) && row.checks.some(c => c && c.meta === true && c.silentAlert === true));
      }

      function formatCreatorManAmount(won) {
        // ALERT 크리에이터별 금액은 만원 단위 숫자만 표시합니다.
        // 예: 30000 -> 3, 33000 -> 3.3, 100000 -> 10
        return displayManAmount(won);
      }

      function buildDonationAlertGroups(rows) {
        const cleanRows = (rows || [])
          .filter(row => !isSilentDonationRow(row))
          .slice()
          .sort((a, b) => donationCreatedTime(a) - donationCreatedTime(b));

        const map = new Map();
        const groups = [];

        cleanRows.forEach(row => {
          const donor = normalizeName(row.donor || "익명") || "익명";
          // 같은 저장 묶음 안에서 동일 도네이터는 ALERT 1번으로 합칩니다.
          // 크리에이터 여러 명에게 나눠 입력된 경우 행은 여러 개지만, 화면 알림은 도네이터 기준 1회만 표시합니다.
          const key = donor;
          let group = map.get(key);
          if (!group) {
            group = {
              ...row,
              donor,
              alertGroupRows: [],
              accountAmount: 0,
              toonieAmount: 0,
              totalAmount: 0,
              createdAt: row.createdAt || row.created_at || "",
              id: row.id || ""
            };
            map.set(key, group);
            groups.push(group);
          }
          group.alertGroupRows.push(row);
          group.accountAmount += donationAccountWon(row);
          group.toonieAmount += donationToonieWon(row);
          group.totalAmount += donationWon(row);
          if (donationCreatedTime(row) >= donationCreatedTime(group)) {
            group.createdAt = row.createdAt || row.created_at || group.createdAt;
            group.id = row.id || group.id;
            group.checks = Array.isArray(row.checks) ? row.checks : group.checks;
            group.processType = row.processType || row.process_type || group.processType;
            group.process_type = row.process_type || row.processType || group.process_type;
            group.manualSoundFile = row.manualSoundFile || row.manual_sound_file || group.manualSoundFile;
            group.manual_sound_file = row.manual_sound_file || row.manualSoundFile || group.manual_sound_file;
          }
        });

        return groups;
      }

      function makeDonationAlertHtml(row) {
        const groupRows = Array.isArray(row.alertGroupRows) && row.alertGroupRows.length ? row.alertGroupRows : [row];
        const isGrouped = groupRows.length > 1;
        const donor = escapeHtml(row.donor || groupRows[0]?.donor || "익명");

        const accountAmount = num(row.accountAmount ?? row.account_amount);
        const toonieAmount = num(row.toonieAmount ?? row.toonie_amount);
        const totalAmount = num(row.totalAmount ?? row.total_amount ?? accountAmount + toonieAmount);

        const baseSource =
          accountAmount > 0 && toonieAmount > 0 ? "계좌/투네" :
            accountAmount > 0 ? "계좌" :
              toonieAmount > 0 ? "투네" :
                (row.sourceType || row.source_type || "계좌");

        let processLabel = String(row.processType || row.process_type || "").trim();

        // 룰렛 제목이 없는 값은 후원으로 처리
        if (
          !processLabel ||
          processLabel === "룰렛" ||
          processLabel === "룰렛+" ||
          processLabel === "룰렛-" ||
          processLabel === "roulette"
        ) {
          processLabel = "후원";
        }

        // 룰렛+룰렛, 룰렛+룰렛+시그 같은 중복 정리
        processLabel = processLabel.replace(/^룰렛\+룰렛\+?/, "룰렛+");
        processLabel = processLabel.replace(/^룰렛\+룰렛$/, "룰렛");

        // 그래도 룰렛 제목이 없으면 후원 처리
        if (processLabel === "룰렛" || processLabel === "룰렛+" || processLabel === "룰렛-") {
          processLabel = "후원";
        }

        // 표시용 변환: 룰렛+시그 → 룰렛-시그
        processLabel = processLabel.replace(/^룰렛\+/, "룰렛-");

        const sourceLabel = escapeHtml(`(${baseSource})${processLabel}`);

        let optionText = "";
        const checks = Array.isArray(row.checks) ? row.checks : [];

        if (checks.length) {
          const ch = checks[checks.length - 1];
          const sign = ch.side === "minus" ? "-" : "+";
          const cls = ch.side === "minus" ? "alert-minus" : "alert-plus";
          const name = escapeHtml(ch.name || "옵션");
          const count = Math.abs(num(ch.count || 1));
          optionText = `<span class="${cls}">${name}${sign}${count}</span>`;
        }

        if (isGrouped) {
          const creatorLines = groupRows.map(r => {
            const creator = escapeHtml(r.creator || "익명");
            const amount = escapeHtml(formatCreatorManAmount(donationWon(r)));
            return `<span class="alert-target alert-split-chip">${creator} ${amount}</span>`;
          }).join("");

          return `
    <div class="alert-up-line alert-donor-total-line">
      <span class="alert-donor blink-donor">${donor}</span>
      <span class="alert-amount alert-total-amount">${displayAmount(totalAmount)}원</span>
    </div>
    <div class="alert-creator-line alert-split-line">
      ${creatorLines}
    </div>
    <div class="alert-line2">
      <span class="alert-source">${sourceLabel}</span>
      ${optionText}
    </div>
  `;
        }

        const creator = escapeHtml(groupRows[0]?.creator || row.creator || "익명");

      }
      function pickSoundFileForDonation(row) {
        if (soundRulesCache && soundRulesCache.enabled === false) return "";

        // 1순위: 수동 사운드 이벤트
        const manualFile = sanitizeSoundFile(row?.manualSoundFile || row?.manual_sound_file || "");
        if (manualFile) return manualFile;

        // 2순위: 프리셋 사운드
        const checks = Array.isArray(row?.checks) ? row.checks : [];
        const latestCheck = checks.length ? checks[checks.length - 1] : null;
        if (latestCheck) {
          const presetId = String(latestCheck.presetId || "");
          const presetTitle = String(latestCheck.presetTitle || "");
          const preset = (enabledPresets || []).find(p => p.id === presetId || p.title === presetTitle);
          if (preset && preset.soundFile) return sanitizeSoundFile(preset.soundFile);
        }

        // 3순위: 계좌금액 구간 사운드
        const accountAmount = num(row?.accountAmount ?? row?.account_amount);
        const rules = Array.isArray(soundRulesCache?.amountRules) ? soundRulesCache.amountRules : [];
        const matched = rules
          .filter(r => accountAmount >= num(r.min) && (!num(r.max) || accountAmount <= num(r.max)) && r.sound)
          .sort((a, b) => num(b.min) - num(a.min))[0];

        if (matched) return sanitizeSoundFile(matched.sound);

        // 4순위: 기본 사운드
        return sanitizeSoundFile(soundRulesCache?.defaultSound || "");
      }

      function playSoundForDonation(row) {
        const file = typeof pickSoundFileForDonation === "function" ? pickSoundFileForDonation(row) : "";
        if (!file) return null;

        const audio = typeof getAudio === "function"
          ? getAudio(file)
          : new Audio("/sounds/" + String(file).replace(/[\\\/]/g, ""));

        if (!audio) return null;

        try {
          audio.pause();
          audio.currentTime = 0;
          const p = audio.play();
          if (p && typeof p.catch === "function") p.catch(() => { });
          return audio;
        } catch (e) {
          return null;
        }
      }

      function playAlertQueue() {
  if (alertShowing || alertPlaying || !alertQueue.length) return;

        alertShowing = true;
        alertPlaying = true;

        const alertItem = alertQueue.shift();
        const html = typeof alertItem === "string" ? alertItem : (alertItem.html || "");
        const row = typeof alertItem === "string" ? {} : (alertItem.row || {});
        const eventId = typeof alertItem === "string" ? "" : (alertItem.eventId || "");

        $alert.innerHTML = html;
        ensureAlertIndependent();
        $alert.classList.remove("hidden");
        ensureAlertIndependent();
        $alert.classList.add("show");
        ensureAlertIndependent();

        const audio = playSoundForDonation(row);

        let closed = false;
        let minDone = false;
        let fallbackTimer = null;

        const closeAlert = () => {
          if (closed) return;
          closed = true;
          clearTimeout(fallbackTimer);
          $alert.classList.remove("show");
          setTimeout(() => {
            alertShowing = false;
            alertPlaying = false;
            playAlertQueue();
          }, 280);
        };

        const accountForDuration = num(row?.accountAmount ?? row?.account_amount);
        const vipLimit = Number(getComputedStyle(document.documentElement).getPropertyValue('--style-vip-threshold')) || 500000;
        const minAlertMs = accountForDuration >= vipLimit ? 3600 : 2600;
        setTimeout(() => {
          minDone = true;
          if (!audio || audio.ended || audio.paused) closeAlert();
        }, minAlertMs);

        if (audio) {
          const onEnded = () => {
            audio.removeEventListener("ended", onEnded);
            audio.removeEventListener("error", onError);
            if (minDone) closeAlert();
          };

          const onError = () => {
            audio.removeEventListener("ended", onEnded);
            audio.removeEventListener("error", onError);
            if (minDone) closeAlert();
          };

          audio.addEventListener("ended", onEnded);
          audio.addEventListener("error", onError);

          // 후원 ALERT는 사운드가 길어도 화면을 오래 잡아먹지 않게 고정 시간으로 종료합니다.
          // 수동 사운드 이벤트만 기존처럼 최대 1분 유지합니다.
          fallbackTimer = setTimeout(closeAlert, eventId ? 60000 : 6200);
        } else {
          fallbackTimer = setTimeout(closeAlert, (row && num(row.accountAmount ?? row.account_amount) >= (Number(getComputedStyle(document.documentElement).getPropertyValue('--style-vip-threshold')) || 500000)) ? 4600 : 3400);
        }
      }

      function checkLatestOptionAlert(donations) {
        const rows = (donations || [])
          .slice()
          .sort((a, b) => new Date(a.createdAt || a.created_at || 0) - new Date(b.createdAt || b.created_at || 0));

        if (!rows.length) return;

        // 첫 조회에서는 기존 후원을 ALERT로 재생하지 않고 기준점만 잡습니다.
        // 기존 버전의 중복방지 흐름은 유지하고, 도네이터 묶음 ALERT만 id 묶음 기준으로 확장합니다.
        if (!donationAlertBootReady) {
          const latest = rows[rows.length - 1];
          const key = donationAlertKey(latest);
          lastDonationKey = key;
          localStorage.setItem("overlay_last_alert_key", key);
          donationAlertBootReady = true;
          return;
        }

        let passedLast = false;
        const newRows = [];

        for (const row of rows) {
          const key = donationAlertKey(row);

          if (key === lastDonationKey) {
            passedLast = true;
            continue;
          }

          if (passedLast) {
            newRows.push(row);
          }
        }

        // 기준점이 목록에서 사라진 경우에는 과거 ALERT 재생을 막고 최신 건으로 기준만 재설정합니다.
        if (!passedLast) {
          const latest = rows[rows.length - 1];
          const key = donationAlertKey(latest);
          lastDonationKey = key;
          localStorage.setItem("overlay_last_alert_key", key);
          return;
        }

        if (!newRows.length) return;

        const groups = buildDonationAlertGroups(newRows);

        groups.forEach(group => {
          const groupKey = donationAlertGroupKey(group);
          if (!groupKey) return;

          const storageKey = "overlay_group_alert_done_" + groupKey;

          if (
  playedDonationAlertKeys.has(groupKey) ||
  localStorage.getItem(storageKey) === "1"
) {
  return;
}

playedDonationAlertKeys.add(groupKey);
localStorage.setItem(storageKey, "1");

alertQueue.push({
  html: makeDonationAlertHtml(group),
  row: group
});
 });
        const last = newRows[newRows.length - 1];
        const lastKey = donationAlertKey(last);
        lastDonationKey = lastKey;
        localStorage.setItem("overlay_last_alert_key", lastKey);

        playAlertQueue();
      }






      function makeManualSoundEventAlertHtml(ev) {
        const displayTitle = escapeHtml(ev.title || "수동 Alert");
        const rawFile = String(ev.soundFile || "");
        const baseName = rawFile.replace(/\.[^.]+$/, "");
        const soundName = escapeHtml(baseName || "사운드");

        const total = Math.max(1, Number(ev.repeatTotal || 1));
        const played = Math.max(0, Number(ev.repeatPlayed || 0));
        const current = Math.min(total, played + 1);
        const progress = total > 1 ? `<span class="alert-sound-title">${current}/${total}</span>` : "";

        return `
      <div class="alert-donor">${displayTitle}</div>
      <div class="alert-target">${soundName}</div>
      <div class="alert-line2">${progress}</div>
    `;
      }

      async function checkManualSoundEvents() {
        try {
          if (IS_MONITOR) return;
          if (alertShowing || alertPlaying || alertQueue.length > 0) return;

          const url = "/api/sound-events?after=" + encodeURIComponent(overlaySoundBootAt);

          if (!ev || !ev.id) return;

          const repeatKey = `${ev.id}:${Number(ev.repeatPlayed || 0)}`;

          claimedSoundEventIds.add(repeatKey);

            eventId: ev.id,
            repeatKey,
            html: makeManualSoundEventAlertHtml(ev),
            row: {
              manualSoundFile: ev.soundFile,
              manualSoundTitle: ev.title
            }
          });

          playAlertQueue();
        } catch (e) { }

      async function fetchJson(url, options = {}) {
        let finalUrl = url;
        const sep1 = finalUrl.includes("?") ? "&" : "?";
        finalUrl = finalUrl + sep1 + "station=" + encodeURIComponent(STATION_SLUG);
        if (ACCESS_TOKEN) {
          const sep = finalUrl.includes("?") ? "&" : "?";
          finalUrl = finalUrl + sep + "token=" + encodeURIComponent(ACCESS_TOKEN);
        }
        const sepNoCache = finalUrl.includes("?") ? "&" : "?";
        finalUrl = finalUrl + sepNoCache + "_=" + Date.now();
        const fetchOptions = Object.assign({ cache: "no-store" }, options || {});
        if (fetchOptions.method && fetchOptions.method !== "GET") {
          fetchOptions.headers = Object.assign({ "Content-Type": "application/json" }, fetchOptions.headers || {});
        }
        const res = await fetch(finalUrl, fetchOptions);
        if (!res.ok) throw new Error(url + " " + res.status);
        return res.json();
      }

      async function loadData() {

        try {

          const accountDonors = (s.accountDonors && s.accountDonors.length) ? s.accountDonors : aggregateAccountDonorsFromDonations(s.donations || []);
          return {
            settings,
            accountDonors,
            creators: normalizeCreatorRows({ ...s, settings }),
            donations: s.donations || []
          };
        } catch (e) {
          try {
            const settings = await fetchJson(API_SETTINGS);
            return {

              donations: []
            };
          } catch (err) {
            return {
              settings: defaultSettings,
              accountDonors: [],

              donations: []
            };
          }
        }
      }

      function ensureAlertIndependent() {
        const root = document.getElementById("overlayAlertRoot");
        const alertEl = document.getElementById("optionAlert");
        const stack = document.querySelector(".overlay-stack");
        const panel = document.getElementById("overlayPanel") || stack;
        const accountBox = document.getElementById("accountBox");

        if (!root || !alertEl || !stack || !panel) return;

        if (alertEl.parentElement !== root) {
          root.appendChild(alertEl);
        }

        // ALERT root를 계좌후원 박스 바로 다음 DOM 위치로 이동
        // overlayPanel 구조에서도 기존처럼 계좌후원 바로 아래에 고정
        if (accountBox && accountBox.parentElement === panel) {
          if (root.parentElement !== panel || root.previousElementSibling !== accountBox) {
            panel.insertBefore(root, accountBox.nextSibling);
          }
        } else {
          if (root.parentElement !== panel) {
            panel.insertBefore(root, panel.firstChild);
          }
        }

        root.style.position = "relative";
        root.style.left = "auto";
        root.style.top = "auto";
        root.style.right = "auto";
        root.style.bottom = "auto";
        root.style.inset = "auto";
        root.style.width = "100%";
        if (alertEl.classList.contains("show")) {
          root.style.height = "var(--alert-height, 170px)";
          root.style.flex = "0 0 var(--alert-height, 170px)";
        } else {
          root.style.height = "0";
          root.style.flex = "0 0 0";
        }
        root.style.zIndex = "999999";
        root.style.pointerEvents = "none";
        root.style.overflow = "visible";
        root.style.transform = "none";

        alertEl.classList.remove("hidden");
        alertEl.style.position = "absolute";
        alertEl.style.left = "0";
        alertEl.style.top = "0";
        alertEl.style.right = "auto";
        alertEl.style.bottom = "auto";
        alertEl.style.inset = "auto";
        alertEl.style.width = "100%";
        alertEl.style.maxWidth = "100%";
        alertEl.style.minWidth = "0";
        alertEl.style.margin = "0";
        alertEl.style.transformOrigin = "top center";

        if (alertEl.classList.contains("show")) {
          alertEl.style.display = "flex";
          alertEl.style.visibility = "visible";
          alertEl.style.opacity = "1";
          alertEl.style.transform = "scale(1)";
        } else {
          alertEl.style.display = "";
          alertEl.style.visibility = "";
          alertEl.style.opacity = "";
          alertEl.style.transform = "scale(.92)";
        }
      }
      
      function preloadMissionTimerVideo(videoFile){
  const safeFile = String(videoFile || "mission_30sec.mp4").replace(/[\\\/]/g, "");

  if(missionVideoCache && missionVideoCacheSrc === src) return;

  missionVideoCacheSrc = src;
  missionVideoCache = document.createElement("video");
  missionVideoCache.src = src;

}
      


function updateBroadcastTimer() {
  if (!$broadcastTimerValue) return;

  const diff = latestSettingsForTimer ? timerBaseMs(latestSettingsForTimer) : 0;
  const timerData = latestSettingsForTimer?.broadcastTimerData || {};

  const labelEl = document.querySelector(".timer-label");
  if (labelEl) {
    labelEl.textContent = Object.prototype.hasOwnProperty.call(timerData, "label") ? String(timerData.label ?? "") : "미션타이머";
  }

  const sec = Math.max(0, Math.floor(diff / 1000));

  const h = String(Math.floor(sec / 3600)).padStart(2, "0");
  const m = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");

  $broadcastTimerValue.textContent = `${h}:${m}:${s}`;

  const isCountdownMode =
    timerData.mode === "countdown" ||
    timerData.mode === "until";

  if (isCountdownMode) {
    if (sec <= 30 && sec > 0 && !mission30SoundPlayed) {
      mission30SoundPlayed = true;

      try {
        const soundFile =
          timerData.warningSoundFile ||
          timerData.missionSoundFile ||
          "mission_30sec.mp3";

        const audio = new Audio("/sounds/" + soundFile);
        audio.volume = 1.0;
        audio.play().catch(() => {});
      } catch (e) {
        console.warn("[mission-sound] play failed", e);
      }
    }

    if (sec > 30) {
      mission30SoundPlayed = false;
    }

    const big = document.getElementById("missionCountdownBig");

    if (big) {
      if (sec <= 10 && sec > 0) {
        if (missionCountdownLastSec !== sec) {
          missionCountdownLastSec = sec;

          big.textContent = sec;
          big.classList.remove("show");
          void big.offsetWidth;
          big.classList.add("show");
        }
      } else {
        big.classList.remove("show");
        missionCountdownLastSec = null;
      }
    }
  }
}
