<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>후원현황 Overlay</title>
<style>
  :root{
    --panel-w: 258px;
    --top: 54px;
    --right: 14px;

    --pink: rgba(255, 155, 185, .95);
    --pink-soft: rgba(255, 155, 185, .38);
    --pink-text: #ffb4ca;
    --white: rgba(255,255,255,.96);
    --muted: rgba(255,255,255,.76);
    --green: #7df18c;
    --blue: #83c9ff;
    --red: #ff8a8a;
    --glass: rgba(10, 8, 13, .30);
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent !important;
    font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;
  }

  .overlay-root{
    user-select:none;
    pointer-events:none;
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    background:transparent;
  }

  .donation-panel{
    position:absolute;
    top:var(--top);
    right:var(--right) !important;
    left:auto !important;
    width:var(--panel-w);
    padding:11px 12px 11px;
    color:var(--white);
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012)), var(--glass);
    border:2px solid var(--pink);
    border-radius:19px;
    box-shadow:0 0 0 1px rgba(255,255,255,.03) inset, 0 0 7px rgba(255,115,165,.12);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
  }

  .account-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    height:30px;
    padding:0 0 8px;
    border-bottom:1px solid var(--pink-soft);
    font-weight:900;
    letter-spacing:-0.065em;
    text-align:center;
  }

  .account-title{
    flex:0 0 auto;
    font-size:22px;
    color:var(--white);
    text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.55), 0 0 5px rgba(255,120,165,.14);
    white-space:nowrap;
  }

  .roller{
    position:relative;
    height:28px;
    overflow:hidden;
    text-align:center;
    width:92px;
    min-width:92px;
    color:var(--pink-text);
    font-size:21px;
    line-height:28px;
    font-weight:900;
    letter-spacing:-0.055em;
    text-shadow:0 1px 2px rgba(0,0,0,.62), 0 0 4px rgba(255,145,185,.18);
  }

  .roller-track{
    position:absolute;
    left:0;
    right:0;
    top:0;
    transition:transform .42s ease;
    will-change:transform;
  }

  .roller-track.no-transition{
    transition:none !important;
  }

  .roller-item{
    height:28px;
    line-height:28px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:center;
  }

  .creator-list{
    padding-top:8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    width:100%;
  }

  .creator-item{
    padding:0;
    width:100%;
    text-align:center;
  }

  .creator-main{
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:5px;
    width:100%;
    min-height:25px;
    font-weight:900;
    letter-spacing:-0.068em;
    text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.70), 0 0 4px rgba(255,255,255,.07);
  }

  .creator-name{
    flex:0 0 72px;
    width:72px;
    color:var(--white);
    font-size:23px;
    line-height:1.05;
    white-space:nowrap;
    overflow:hidden;
    text-align:center;
  }

  .donation-amount{
    flex:0 0 auto;
    color:var(--pink-text);
    font-size:23px;
    line-height:1.05;
    white-space:nowrap;
    text-align:left;
  }

  .creator-sub{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:11px;
    width:100%;
    margin-top:2px;
    font-size:21px;
    line-height:1.08;
    font-weight:900;
    letter-spacing:-0.064em;
    text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.75), 0 0 4px rgba(0,0,0,.30);
  }

  .state-item{
    white-space:nowrap;
    min-width:0;
    text-align:center;
  }

  .plus{ color:var(--green); }
  .blue{ color:var(--blue); }
  .red{ color:var(--red); }
  .muted{ color:var(--muted); }

  .empty{
    opacity:.72;
    font-size:18px;
    padding:14px 0 4px;
    text-align:center;
  }

  @media (max-width:520px){
    :root{
      --panel-w:252px;
      --top:50px;
      --right:12px;
    }
    .donation-panel{ padding:10px 11px 10px; }
    .account-row{ gap:7px; }
    .account-title{ font-size:21px; }
    .roller{
      width:88px;
      min-width:88px;
      font-size:20px;
    }
    .creator-name{
      flex-basis:70px;
      width:70px;
      font-size:22px;
    }
    .donation-amount{ font-size:22px; }
    .creator-sub{
      font-size:20px;
      gap:10px;
    }
  }
</style>
</head>
<body>
  <div class="overlay-root">
    <section class="donation-panel">
      <div class="account-row">
        <div class="account-title">계좌후원</div>
        <div class="roller" id="accountRoller">
          <div class="roller-track" id="rollerTrack">
            <div class="roller-item">- : 0</div>
          </div>
        </div>
      </div>
      <div class="creator-list" id="creatorList"></div>
    </section>
  </div>

<script>
(() => {
  const API_SUMMARY = "/api/summary";

  const demoData = {
    settings: {
      presets: [
        { id:"smoke", enabled:true, title:"펴피지마", plusName:"흡연", minusName:"금연" },
        { id:"food", enabled:true, title:"먹먹마", plusName:"먹어", minusName:"먹지마" }
      ]
    },
    accountDonors: [
      { donor:"열려", amount:36000 },
      { donor:"또영", amount:15000 }
    ],
    creators: [
      { creator:"빵떠기", total:36000, smokeNet:-2, eatNet:0, presetNets:[{presetId:"smoke", plus:0, minus:2, plusName:"흡연", minusName:"금연"}, {presetId:"food", plus:0, minus:0, plusName:"먹어", minusName:"먹지마"}] },
      { creator:"또영", total:20000, smokeNet:0, eatNet:0, presetNets:[{presetId:"smoke", plus:0, minus:0, plusName:"흡연", minusName:"금연"}, {presetId:"food", plus:0, minus:0, plusName:"먹어", minusName:"먹지마"}] },
      { creator:"수박", total:20000, smokeNet:3, eatNet:1, presetNets:[{presetId:"smoke", plus:3, minus:0, plusName:"흡연", minusName:"금연"}, {presetId:"food", plus:1, minus:0, plusName:"먹어", minusName:"먹지마"}] }
    ],
    donations: []
  };

  const $list = document.getElementById("creatorList");
  const $track = document.getElementById("rollerTrack");

  let rollingItems = [];
  let rollingIndex = 0;
  let rollingTimer = null;
  let enabledPresets = [];
  let lastSignature = "";

  function num(v){
    const n = Number(v || 0);
    return Number.isFinite(n) ? n : 0;
  }

  function displayAmount(won){
    const n = num(won);
    const cut = Math.floor(n / 1000) / 10;
    return cut.toFixed(1).replace(/\.0$/, "");
  }

  function normalizeName(v){
    return String(v ?? "").replace(/\s+/g, " ").trim();
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, ch => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[ch]));
  }

  function formatCreatorName(name){
    const arr = Array.from(String(name || "").trim());
    if(arr.length >= 3) return arr.slice(0, 3).join("");
    if(arr.length === 2) return arr.join(" ");
    if(arr.length === 1) return arr[0] + "  ";
    return "익 명";
  }

  function getEnabledPresets(settings){
    const presets = settings && Array.isArray(settings.presets) ? settings.presets : [];
    return presets.filter(p => p && p.enabled !== false);
  }

  function aggregateAccountDonorsFromDonations(donations){
    const map = new Map();
    (donations || []).forEach(d => {
      const account = num(d.accountAmount ?? d.account_amount);
      if(account <= 0) return;

      const donor = normalizeName(d.donor || d.donor_name || "익명");
      if(!map.has(donor)){
        map.set(donor, { donor, amount:0, latestAt:d.createdAt || d.created_at || "" });
      }
      const row = map.get(donor);
      row.amount += account;
      if(new Date(d.createdAt || d.created_at || 0) > new Date(row.latestAt || 0)){
        row.latestAt = d.createdAt || d.created_at || "";
      }
    });

    return Array.from(map.values())
      .sort((a,b) => new Date(b.latestAt || 0) - new Date(a.latestAt || 0))
      .slice(0, 10);
  }

  function aggregateCreatorsFromDonations(donations){
    const map = new Map();

    (donations || []).forEach(d => {
      const creator = normalizeName(d.creator || "익명");
      const account = num(d.accountAmount ?? d.account_amount);
      const toonie = num(d.toonieAmount ?? d.toonie_amount);
      const total = num(d.totalAmount ?? d.total_amount ?? account + toonie);

      if(!map.has(creator)){
        map.set(creator, {
          creator,
          total:0,
          smokeNet:0,
          eatNet:0,
          presetNets:[]
        });
      }

      const row = map.get(creator);
      row.total += total;
      row.smokeNet += num(d.smoke || 0) - num(d.nosmoke || 0);
      row.eatNet += num(d.eat || 0) - num(d.noeat || 0);

      const checks = Array.isArray(d.checks) ? d.checks : [];
      checks.forEach(ch => {
        const key = ch.presetId || ch.presetTitle;
        if(!key) return;

        let n = row.presetNets.find(x =>
          (ch.presetId && x.presetId === ch.presetId) ||
          (ch.presetTitle && x.presetTitle === ch.presetTitle)
        );

        if(!n){
          n = {
            presetId: ch.presetId,
            presetTitle: ch.presetTitle,
            plusName:"",
            minusName:"",
            plus:0,
            minus:0
          };
          row.presetNets.push(n);
        }

        if(ch.side === "plus"){
          n.plusName = ch.name;
          n.plus += num(ch.count);
        }else{
          n.minusName = ch.name;
          n.minus += num(ch.count);
        }
      });
    });

    return Array.from(map.values())
      .filter(c => num(c.total) > 0)
      .sort((a,b) => num(b.total) - num(a.total))
      .slice(0,5);
  }

  function normalizeCreatorRows(summary){
    let creators = summary.creators || summary.creatorSummary || summary.creator_summary || [];

    // 서버가 기본 크리에이터만 주고 total이 0이거나 빈 배열이면 donations로 복구
    const hasVisible = (creators || []).some(c =>
      num(c.total ?? c.totalAmount ?? c.total_amount ?? c.amount) > 0
    );

    if((!creators || !creators.length || !hasVisible) && Array.isArray(summary.donations)){
      const fallback = aggregateCreatorsFromDonations(summary.donations);
      if(fallback.length) creators = fallback;
    }

    return (creators || [])
      .filter(c => num(c.total ?? c.totalAmount ?? c.total_amount ?? c.amount) > 0)
      .slice(0,5);
  }

  function statusLabelsFromPresetNets(presets, row){
    const nets = Array.isArray(row.presetNets) ? row.presetNets : [];

    return presets.map(preset => {
      const n = nets.find(x =>
        (x.presetId && x.presetId === preset.id) ||
        (x.presetTitle && x.presetTitle === preset.title)
      );

      if(n){
        const plus = num(n.plus);
        const minus = num(n.minus);
        const net = plus - minus;

        if(net > 0){
          return `<span class="plus">${escapeHtml(n.plusName || preset.plusName || "+")} +${Math.abs(net)}</span>`;
        }
        if(net < 0){
          const cls = preset.id === "food" ? "red" : "blue";
          return `<span class="${cls}">${escapeHtml(n.minusName || preset.minusName || "-")} -${Math.abs(net)}</span>`;
        }
      }

      if(preset.id === "smoke"){
        const net = num(row.smokeNet ?? row.smoke_net ?? (num(row.smoke || 0) - num(row.nosmoke || 0)));
        if(net > 0) return `<span class="plus">${escapeHtml(preset.plusName || "흡연")} +${Math.abs(net)}</span>`;
        if(net < 0) return `<span class="blue">${escapeHtml(preset.minusName || "금연")} -${Math.abs(net)}</span>`;
      }

      if(preset.id === "food"){
        const net = num(row.eatNet ?? row.foodNet ?? row.food_net ?? (num(row.eat || 0) - num(row.noeat || 0)));
        if(net > 0) return `<span class="plus">${escapeHtml(preset.plusName || "먹어")} +${Math.abs(net)}</span>`;
        if(net < 0) return `<span class="red">${escapeHtml(preset.minusName || "먹지마")} -${Math.abs(net)}</span>`;
      }

      return `<span class="muted">${escapeHtml(preset.title || "처리")} 0</span>`;
    });
  }

  function renderAccountRoller(items){
    rollingItems = items && items.length ? items : [{ donor:"-", amount:0 }];

    if(rollingTimer){
      clearInterval(rollingTimer);
      rollingTimer = null;
    }

    const makeItemHtml = (item) => {
      const donor = normalizeName(item.donor || item.name || "익명");
      const amount = displayAmount(item.amount ?? item.accountAmount ?? item.account_amount ?? item.total ?? 0);
      return `<div class="roller-item">${escapeHtml(donor)} : ${amount}</div>`;
    };

    if(rollingItems.length <= 1){
      rollingIndex = 0;
      $track.classList.add("no-transition");
      $track.innerHTML = rollingItems.map(makeItemHtml).join("");
      $track.style.transform = "translateY(0px)";
      return;
    }

    const renderItems = [...rollingItems, rollingItems[0]];
    $track.innerHTML = renderItems.map(makeItemHtml).join("");

    rollingIndex = 0;
    $track.classList.add("no-transition");
    $track.style.transform = "translateY(0px)";
    $track.offsetHeight;
    $track.classList.remove("no-transition");

    const itemHeight = 28;
    const holdMs = 2600;
    const transitionMs = 420;

    rollingTimer = setInterval(() => {
      rollingIndex += 1;
      $track.classList.remove("no-transition");
      $track.style.transform = `translateY(${-rollingIndex * itemHeight}px)`;

      if(rollingIndex === rollingItems.length){
        setTimeout(() => {
          rollingIndex = 0;
          $track.classList.add("no-transition");
          $track.style.transform = "translateY(0px)";
          $track.offsetHeight;
          $track.classList.remove("no-transition");
        }, transitionMs + 30);
      }
    }, holdMs);
  }

  function renderCreators(creators){
    const rows = (creators || []).filter(c =>
      num(c.total ?? c.totalAmount ?? c.total_amount ?? c.amount) > 0
    ).slice(0, 5);

    if(!rows.length){
      $list.innerHTML = `<div class="empty">크리에이터 후원 없음</div>`;
      return;
    }

    const visiblePresets = (enabledPresets || []).filter(p => p.enabled !== false);

    $list.innerHTML = rows.map(row => {
      const rawName = normalizeName(row.creator || row.name || "익명");
      const name = formatCreatorName(rawName);
      const total = displayAmount(row.total ?? row.totalAmount ?? row.total_amount ?? row.amount ?? row.donation ?? 0);
      const labels = visiblePresets.length ? statusLabelsFromPresetNets(visiblePresets, row) : [];

      return `
        <article class="creator-item">
          <div class="creator-main">
            <div class="creator-name">${escapeHtml(name)} -</div>
            <div class="donation-amount">후원(${total})</div>
          </div>
          ${labels.length ? `<div class="creator-sub">${labels.map(label => `<span class="state-item">${label}</span>`).join("")}</div>` : ``}
        </article>
      `;
    }).join("");
  }

  async function fetchJson(url){
    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error(url + " " + res.status);
    return res.json();
  }

  async function loadData(){
    const params = new URLSearchParams(location.search);
    if(params.get("demo") === "1") return demoData;

    try{
      const s = await fetchJson(API_SUMMARY);

      const accountDonors = (s.accountDonors && s.accountDonors.length)
        ? s.accountDonors
        : aggregateAccountDonorsFromDonations(s.donations || []);

      return {
        settings: s.settings || {},
        accountDonors,
        creators: normalizeCreatorRows(s),
        donations: s.donations || []
      };
    }catch(e){
      return demoData;
    }
  }

  async function refresh(){
    const data = await loadData();
    enabledPresets = getEnabledPresets(data.settings || {});

    const signature = JSON.stringify({
      accountDonors: data.accountDonors || [],
      creators: data.creators || [],
      presets: enabledPresets.map(p => ({ id:p.id, enabled:p.enabled, title:p.title, plusName:p.plusName, minusName:p.minusName }))
    });

    if(signature === lastSignature) return;
    lastSignature = signature;

    renderAccountRoller(data.accountDonors);
    renderCreators(data.creators);
  }

  refresh();
  setInterval(refresh, 5000);
})();
</script>
</body>
</html>
