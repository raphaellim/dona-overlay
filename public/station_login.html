<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>공통 로그인</title>
<style>
:root{--bg:#070b12;--card:#0b1220;--line:#263247;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--pink:#ec4899;--red:#dc2626}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% -10%,rgba(37,99,235,.28),transparent 36%),radial-gradient(circle at 92% 10%,rgba(236,72,153,.16),transparent 30%),linear-gradient(180deg,#08111f,#04070d);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:22px}.login-card{width:100%;max-width:470px;background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(7,12,22,.98));border:1px solid rgba(148,163,184,.2);border-radius:24px;padding:24px;box-shadow:0 24px 90px rgba(0,0,0,.5)}
.logo{width:58px;height:58px;border-radius:18px;margin:0 auto 14px;background:linear-gradient(135deg,#2563eb,#ec4899);display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:1000;box-shadow:0 0 34px rgba(59,130,246,.45)}
h1{margin:0;text-align:center;font-size:28px;font-weight:1000;letter-spacing:-.8px}.desc{margin:10px 0 18px;text-align:center;color:var(--muted);font-size:14px;font-weight:800;line-height:1.5}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}.tab{height:48px;border-radius:15px;border:1px solid rgba(148,163,184,.22);background:rgba(15,23,42,.75);color:#cbd5e1;font-weight:1000;cursor:pointer}.tab.active{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border-color:transparent;box-shadow:0 0 22px rgba(37,99,235,.24)}
.row{margin-bottom:12px}label{display:block;margin:0 0 7px;color:#cbd5e1;font-size:13px;font-weight:950}.input{width:100%;height:48px;border-radius:14px;border:1px solid rgba(148,163,184,.28);background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(5,10,18,.96));color:#fff;padding:0 14px;font-size:16px;font-weight:900;outline:none}.input:focus{border-color:rgba(96,165,250,.85);box-shadow:0 0 0 4px rgba(59,130,246,.16)}
.btn{width:100%;height:52px;border:0;border-radius:15px;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;font-size:16px;font-weight:1000;cursor:pointer;margin-top:4px}.btn.manager{background:linear-gradient(135deg,#ec4899,#f97316)}.btn:disabled{opacity:.55;cursor:not-allowed}.links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.links a{height:42px;border-radius:13px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.72);color:#cfe2ff;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:950}.msg{display:none;margin-top:14px;padding:11px 12px;border-radius:14px;font-size:13px;font-weight:900;line-height:1.45}.msg.show{display:block}.msg.err{background:rgba(127,29,29,.23);border:1px solid rgba(248,113,113,.35);color:#fecaca}.hint{margin-top:14px;color:#94a3b8;font-size:12px;font-weight:800;line-height:1.5;text-align:center}@media(max-width:420px){body{padding:14px}.login-card{padding:20px;border-radius:20px}h1{font-size:24px}.links{grid-template-columns:1fr}.tabs{grid-template-columns:1fr}}
</style>
</head>
<body>
  <main class="login-card">
    <div class="logo">ON</div>
    <h1>공통 로그인</h1>
    <p class="desc">크리에이터는 방송국 관리자 비밀번호,<br>매니저는 당일 방송 비밀번호로 입장합니다.</p>
    <div class="tabs" role="tablist">
      <button id="creatorTab" class="tab active" type="button" onclick="setRole('creator')">크리에이터</button>
      <button id="managerTab" class="tab" type="button" onclick="setRole('manager')">매니저</button>
    </div>
    <form id="loginForm">
      <div class="row"><label for="station">방송국 코드</label><input id="station" class="input" autocomplete="username" placeholder="예: default" inputmode="latin" autocapitalize="off"></div>
      <div class="row"><label id="pwLabel" for="password">방송국 관리자 비밀번호</label><input id="password" class="input" type="password" autocomplete="current-password" placeholder="방송국 관리자 비밀번호"></div>
      <button id="loginBtn" class="btn" type="submit">크리에이터 인덱스로 입장</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="links">
      <a href="/admin_login.html">최고관리자 로그인</a>
      <a id="quickIndex" href="/creator_index.html?station=default">인덱스 바로가기</a>
    </div>
    <div class="hint" id="hint">크리에이터는 방송국 전체 설정/입력/오버레이 링크를 관리합니다.</div>
  </main>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const stationInput = document.getElementById('station');
  const passwordInput = document.getElementById('password');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('loginBtn');
  const form = document.getElementById('loginForm');
  let role = (params.get('role') || '').toLowerCase() === 'manager' ? 'manager' : 'creator';
  window.setRole = setRole;
  function safeStation(v){ return String(v || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '') || 'default'; }
  function showMsg(text,type){ msg.textContent=text; msg.className='msg show '+(type||'err'); }
  function stationUrl(path, station){ const u = new URL(path, location.origin); u.searchParams.set('station', station); return u.pathname + u.search; }
  function sameOriginNext(station, fallback){
    const next = params.get('next');
    if(!next) return stationUrl(fallback, station);
    try{ const u = new URL(next, location.origin); if(u.origin !== location.origin) return stationUrl(fallback, station); u.searchParams.set('station', station); return u.pathname + u.search + u.hash; }catch(_){ return stationUrl(fallback, station); }
  }
  function setRole(nextRole){
    role = nextRole === 'manager' ? 'manager' : 'creator';
    document.getElementById('creatorTab').classList.toggle('active', role==='creator');
    document.getElementById('managerTab').classList.toggle('active', role==='manager');
    document.getElementById('pwLabel').textContent = role === 'creator' ? '방송국 관리자 비밀번호' : '당일 방송 비밀번호';
    passwordInput.placeholder = role === 'creator' ? '방송국 관리자 비밀번호' : '당일 방송 비밀번호';
    btn.textContent = role === 'creator' ? '크리에이터 인덱스로 입장' : '매니저 인덱스로 입장';
    btn.className = role === 'manager' ? 'btn manager' : 'btn';
    document.getElementById('hint').textContent = role === 'creator' ? '크리에이터는 방송국 전체 설정/입력/오버레이 링크를 관리합니다.' : '매니저는 당일 방송 입력/수정 중심의 빠른 운영 화면으로 이동합니다.';
    updateQuick();
  }
  function updateQuick(){
    const s = safeStation(stationInput.value);
    document.getElementById('quickIndex').href = stationUrl(role === 'manager' ? '/manager_index.html' : '/creator_index.html', s);
  }
  const initialStation = safeStation(params.get('station') || localStorage.getItem('STATION_SLUG') || 'default');
  stationInput.value = initialStation;
  stationInput.addEventListener('input', updateQuick);
  setRole(role);
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const station = safeStation(stationInput.value);
    const password = passwordInput.value || '';
    if(!station) return showMsg('방송국 코드를 입력하세요.','err');
    btn.disabled = true; const oldText = btn.textContent; btn.textContent = '로그인 중...'; msg.className='msg';
    try{
      const api = role === 'manager' ? '/api/broadcast-login' : '/api/station-login';
      const fallback = role === 'manager' ? '/manager_index.html' : '/creator_index.html';
      const res = await fetch(api + '?station=' + encodeURIComponent(station),{method:'POST',credentials:'include',cache:'no-store',headers:{'Content-Type':'application/json','X-Station-Password':password,'x-station-password':password},body:JSON.stringify({station,password})});
      const data = await res.json().catch(()=>({}));
      if(!res.ok || data.ok === false) throw new Error(data.error || '로그인 실패');
      localStorage.setItem('STATION_SLUG', station); localStorage.setItem('station_slug', station);
      if(role === 'manager' && data.broadcast && data.broadcast.id) localStorage.setItem('broadcastPassword_' + data.broadcast.id, password);
      window.location.replace(sameOriginNext(station, fallback));
    }catch(err){ showMsg(err.message || '로그인 실패','err'); btn.disabled=false; btn.textContent=oldText; }
  });
})();
</script>
</body>
</html>
