<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>최고관리자 로그인</title>
<style>
:root{--bg:#070b12;--card:#0b1220;--line:#263247;--text:#e5e7eb;--muted:#94a3b8;--green:#16a34a;--blue:#2563eb}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% -10%,rgba(22,163,74,.22),transparent 34%),linear-gradient(180deg,#08111f,#04070d);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:22px}.box{width:min(440px,94vw);background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(7,12,22,.98));border:1px solid rgba(148,163,184,.22);border-radius:24px;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.48)}
.logo{width:58px;height:58px;border-radius:18px;margin:0 auto 14px;background:linear-gradient(135deg,#16a34a,#22c55e);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:1000;color:#fff;box-shadow:0 0 34px rgba(34,197,94,.35)}
h1{margin:0;text-align:center;font-size:28px;font-weight:1000;letter-spacing:-.8px}.desc{margin:10px 0 22px;color:var(--muted);text-align:center;font-size:14px;font-weight:800;line-height:1.5}
input{width:100%;height:50px;background:#070b12;color:#fff;border:1px solid #334155;border-radius:14px;padding:0 14px;font-size:16px;font-weight:900;outline:none}input:focus{border-color:#86efac;box-shadow:0 0 0 4px rgba(34,197,94,.14)}
button{width:100%;height:52px;border:0;border-radius:15px;padding:0 14px;margin-top:12px;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;font-weight:1000;font-size:16px;cursor:pointer}.link{display:flex;align-items:center;justify-content:center;height:42px;margin-top:12px;border:1px solid rgba(148,163,184,.18);border-radius:13px;background:rgba(15,23,42,.72);color:#cfe2ff;text-decoration:none;font-size:13px;font-weight:950}.err{display:none;margin-top:14px;padding:11px 12px;border-radius:14px;background:rgba(127,29,29,.23);border:1px solid rgba(248,113,113,.35);color:#fecaca;font-size:13px;font-weight:900}.err.show{display:block}
</style>
</head>
<body>
<div class="box">
  <div class="logo">M</div>
  <h1>최고관리자 로그인</h1>
  <p class="desc">방송국 생성·삭제·비밀번호·오버레이 토큰을 관리하는 최고관리자 전용 입구입니다.</p>
  <input id="pw" type="password" placeholder="최고관리자 PW" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
  <button id="btn" onclick="login()">최고관리자 입장</button>
  <a class="link" href="/station_login.html">공통 로그인으로 이동</a>
  <div class="err" id="err"></div>
</div>
<script>
async function login(){
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/master_index.html';
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  err.className = 'err'; err.textContent = '';
  btn.disabled = true; btn.textContent = '로그인 중...';
  try{
    const res = await fetch('/api/admin-login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || '로그인 실패');
    localStorage.setItem('MASTER_PW', pw);
    location.replace(next);
  }catch(e){
    err.textContent = e.message || '로그인 실패'; err.className = 'err show';
    btn.disabled = false; btn.textContent = '최고관리자 입장';
  }
}
</script>
</body>
</html>
