<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>관리자 로그인</title>
<style>
  body{margin:0;min-height:100vh;background:#070b12;color:#e5e7eb;font-family:Arial,'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center}
  .box{width:min(420px,92vw);background:#0b1220;border:1px solid #334155;border-radius:20px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  h1{margin:0 0 8px;font-size:26px}
  p{color:#94a3b8;line-height:1.5}
  input{width:100%;box-sizing:border-box;background:#070b12;color:#fff;border:1px solid #334155;border-radius:12px;padding:13px 14px;font-size:16px;margin:10px 0}
  button{width:100%;border:0;border-radius:12px;padding:13px 14px;background:#16a34a;color:#fff;font-weight:900;font-size:16px;cursor:pointer}
  .err{color:#ff8a8a;margin-top:10px;font-weight:900}
</style>
</head>
<body>
<div class="box">
  <h1>관리자 로그인</h1>
  <p>관리자 페이지는 관리자 비밀번호가 필요합니다.</p>
  <input id="pw" type="password" placeholder="관리자 PW" onkeydown="if(event.key==='Enter') login()">
  <button onclick="login()">관리자 입장</button>
  <div class="err" id="err"></div>
</div>
<script>
async function login(){
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/control.html';
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try{
    const res = await fetch('/api/admin-login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || '로그인 실패');
    try{ localStorage.setItem('MASTER_PW', pw); }catch{}
    location.href = next;
  }catch(e){ err.textContent = e.message; }
}
</script>
</body>
</html>
