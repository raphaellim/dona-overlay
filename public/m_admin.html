<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>모바일 후원 입력</title><style>
*{box-sizing:border-box}body{margin:0;background:#070b12;color:#e5e7eb;font-family:Arial,'Noto Sans KR',sans-serif;padding-bottom:78px}.top{position:sticky;top:0;z-index:10;background:#07111f;border-bottom:1px solid #253247;padding:12px}.title{font-size:18px;font-weight:1000}.sub{font-size:12px;color:#94a3b8;margin-top:4px}.nav{display:flex;gap:8px;overflow:auto;margin-top:9px}.nav a{white-space:nowrap;color:#dbeafe;text-decoration:none;border:1px solid #334155;border-radius:999px;padding:8px 11px;background:#111827;font-weight:900;font-size:13px}.wrap{padding:12px}.card{background:#0b1220;border:1px solid #253247;border-radius:18px;padding:14px;margin-bottom:12px}h2{font-size:17px;margin:0 0 12px}.row{margin-bottom:11px}label{display:block;margin-bottom:6px;font-size:13px;color:#cbd5e1;font-weight:900}.input,input,select{width:100%;min-height:48px;background:#070b12;color:#fff;border:1px solid #334155;border-radius:13px;padding:11px 12px;font-size:17px;font-weight:800}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{width:100%;min-height:46px;border:0;border-radius:13px;background:#334155;color:#fff;font-weight:1000;font-size:15px}.green{background:#16a34a}.blue{background:#2563eb}.red{background:#dc2626}.muted{font-size:12px;color:#94a3b8}.pillbox{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.pill{background:#0f172a;border:1px solid #334155;border-radius:13px;padding:9px;text-align:center}.pill span{display:block;color:#94a3b8;font-size:11px}.pill b{font-size:15px}.pill.ok{border-color:#16a34a}.pill.bad{border-color:#dc2626}.split-row{background:#101827;border:1px solid #334155;border-radius:15px;padding:11px;margin-bottom:9px;display:grid;gap:8px}.split-top{display:flex;justify-content:space-between;align-items:center;gap:8px}.check{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:1000}.check input{width:20px;height:20px;min-height:20px;accent-color:#38bdf8}.mini{min-height:38px;font-size:13px}.recent{background:#0f172a;border:1px solid #334155;border-radius:13px;padding:10px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:8px}.bottom{position:fixed;left:0;right:0;bottom:0;background:#07111f;border-top:1px solid #253247;padding:10px 12px calc(10px + env(safe-area-inset-bottom))}@media(max-width:380px){.grid2,.grid3,.pillbox{grid-template-columns:1fr}}
</style></head><body><div class="top"><div class="title">모바일 후원 입력</div><div id="info" class="sub">불러오는 중...</div><div class="nav"><a id="pcAdmin" target="_blank">PC 입력</a><a id="mControl">모바일 설정</a><a id="stationCtl" target="_blank">방송국</a></div></div><div class="wrap"><section class="card"><h2>후원 입력</h2><div class="row"><label>도네이터명</label><input id="donor" class="input"></div><div class="grid2"><div class="row"><label>계좌 총액</label><input id="accountTotal" class="input" inputmode="decimal" placeholder="6.6 / 6600"></div><div class="row"><label>투네 총액</label><input id="toonieTotal" class="input" inputmode="decimal" placeholder="2.5 / 2500"></div></div><div class="row"><label>처리 프리셋 / 펀딩</label><select id="processType" class="input"></select></div><div class="pillbox"><div class="pill"><span>총액</span><b id="topTotalText">0</b></div><div class="pill"><span>분배</span><b id="splitTotalText">0</b></div><div class="pill" id="diffBox"><span>차이</span><b id="diffText">0</b></div></div><div class="muted" id="preview" style="margin-top:8px">자동결과: -</div></section><section class="card"><h2>크리에이터 분배</h2><div class="grid3" style="margin-bottom:10px"><button class="btn" onclick="checkAll(true)">전체체크</button><button class="btn" onclick="checkAll(false)">전체해제</button><button class="btn blue" onclick="distribute()">균등분배</button></div><div id="splitRows"></div></section><section class="card"><h2>최근 입력</h2><div id="recentList" class="muted">불러오는 중...</div></section></div><div class="bottom"><button class="btn green" onclick="saveBatch()">후원 입력 저장</button></div><script>
const P=new URLSearchParams(location.search),STATION=P.get('station')||localStorage.getItem('STATION_SLUG')||'default';localStorage.setItem('STATION_SLUG',STATION);let settings={};const $=s=>document.querySelector(s);function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}async function api(url,opt={}){const u=new URL(url,location.origin);u.searchParams.set('station',STATION);opt.headers=opt.headers||{};if(opt.body&&!opt.headers['Content-Type'])opt.headers['Content-Type']='application/json';const r=await fetch(u.pathname+u.search,opt),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||r.statusText);return d}function toWon(v){const raw=String(v??'').trim().replace(/,/g,'');if(!raw)return 0;const n=Number(raw.replace(/[^0-9.-]/g,''));if(!Number.isFinite(n))return 0;if(Math.abs(n)>0&&Math.abs(n)<1000)return Math.round(n*1000);return Math.trunc(n)}function fromWon(w){const v=Number(w||0)/1000;if(!v)return'';return String(Number(v.toFixed(3))).replace(/\.0+$/,'')}function fmt(n){return Math.trunc(Number(n||0)).toLocaleString('ko-KR')}function total(){return toWon($('#accountTotal').value)+toWon($('#toonieTotal').value)}function splitTotal(){return [...document.querySelectorAll('.split-amount')].reduce((s,e)=>s+toWon(e.value),0)}function renderProcess(){const presets=Array.isArray(settings.presets)?settings.presets:[],funds=(settings.fundingData?.items||[]).filter(f=>f.enabled!==false);$('#processType').innerHTML='<option value="후원">후원</option>'+presets.filter(p=>p.enabled!==false).map(p=>`<option value="${esc(p.title||p.id)}">${esc(p.title||p.id)}</option>`).join('')+(funds.length?'<optgroup label="펀딩">'+funds.map(f=>`<option value="funding:${esc(f.id)}">펀딩 - ${esc(f.title)} ${Number(f.current||0)}/${Number(f.target||0)}</option>`).join('')+'</optgroup>':'')}function renderSplits(){const cs=Array.isArray(settings.creators)?settings.creators:[];$('#splitRows').innerHTML=cs.length?cs.map((n,i)=>`<div class="split-row" data-idx="${i}"><div class="split-top"><label class="check"><input type="checkbox" class="split-check"><span>${esc(n)}</span></label><button class="btn mini" onclick="onlyOne(${i})">전액</button></div><input class="input split-amount" inputmode="decimal" placeholder="금액"><input class="input split-memo" placeholder="메모"></div>`).join(''):'<div class="muted">control.html에서 크리에이터를 먼저 등록하세요.</div>';document.querySelectorAll('.split-amount,.split-check').forEach(e=>{e.addEventListener('input',preview);e.addEventListener('change',preview)})}function preview(){const t=total(),s=splitTotal(),d=t-s;$('#topTotalText').textContent=fmt(t);$('#splitTotalText').textContent=fmt(s);$('#diffText').textContent=fmt(d);$('#diffBox').classList.toggle('ok',d===0);$('#diffBox').classList.toggle('bad',d!==0);$('#preview').textContent='자동결과: '+($('#processType').value||'후원')}function checkAll(f){document.querySelectorAll('.split-check').forEach(c=>c.checked=!!f);preview()}function checked(){return [...document.querySelectorAll('.split-row')].filter(r=>r.querySelector('.split-check')?.checked)}function distribute(){const rows=checked(),t=total();if(t<=0)return alert('총액을 먼저 입력하세요.');if(!rows.length)return alert('분배할 크리에이터를 체크하세요.');document.querySelectorAll('.split-amount').forEach(e=>e.value='');let base=Math.floor(t/rows.length),rem=t-base*rows.length;rows.forEach(r=>{let a=base;if(rem>0){a++;rem--}r.querySelector('.split-amount').value=fromWon(a)});preview()}function onlyOne(i){document.querySelectorAll('.split-amount').forEach(e=>e.value='');document.querySelectorAll('.split-check').forEach(c=>c.checked=false);const r=document.querySelector(`.split-row[data-idx="${i}"]`);if(r){r.querySelector('.split-check').checked=true;r.querySelector('.split-amount').value=fromWon(total())}preview()}function rows(){return [...document.querySelectorAll('.split-row')].map(r=>({creator:r.querySelector('.check span')?.textContent.trim(),amount:r.querySelector('.split-amount')?.value||'',memo:r.querySelector('.split-memo')?.value||''})).filter(r=>toWon(r.amount)>0)}async function saveBatch(){try{const donor=$('#donor').value.trim();if(!donor)return alert('도네이터명을 입력하세요.');const selected=$('#processType').value||'후원',isFunding=selected.startsWith('funding:');const body={donor,processType:isFunding?'후원':selected,accountTotal:$('#accountTotal').value,toonieTotal:$('#toonieTotal').value,rows:rows(),fundingId:isFunding?selected.replace('funding:',''):'',fundingUnits:''};if(!body.rows.length)return alert('크리에이터별 금액을 입력하세요.');if(total()!==splitTotal()&&!confirm('총액과 분배 합계가 다릅니다. 그대로 저장할까요?'))return;await api('/api/donations/batch',{method:'POST',body:JSON.stringify(body)});alert('저장 완료');$('#donor').value=$('#accountTotal').value=$('#toonieTotal').value='';document.querySelectorAll('.split-amount,.split-memo').forEach(e=>e.value='');document.querySelectorAll('.split-check').forEach(c=>c.checked=false);preview();await loadRecent();await loadSettings()}catch(e){alert(e.message)}}async function loadSettings(){settings=await api('/api/settings');$('#info').textContent=`${settings.station?.name||STATION} / ${settings.broadcast?.title||'현재 방송'}`;$('#pcAdmin').href=`/admin.html?station=${encodeURIComponent(STATION)}`;$('#mControl').href=`/m_control.html?station=${encodeURIComponent(STATION)}`;$('#stationCtl').href=`/station_control.html?station=${encodeURIComponent(STATION)}`;renderProcess();renderSplits();preview()}async function loadRecent(){try{const d=await api('/api/donations');const arr=(d.donations||[]).slice(-10).reverse();$('#recentList').innerHTML=arr.length?arr.map(r=>`<div class="recent"><div><b>${esc(r.donor)} → ${esc(r.creator)}</b><div class="muted">${fmt(r.totalAmount||0)} · ${new Date(r.createdAt).toLocaleString('ko-KR')}</div></div><button class="btn red mini" onclick="delDonation('${esc(r.id)}')">삭제</button></div>`).join(''):'최근 입력 없음'}catch(e){$('#recentList').textContent=e.message}}async function delDonation(id){if(!confirm('삭제할까요?'))return;await api('/api/donations/'+encodeURIComponent(id),{method:'DELETE'});loadRecent()}['#donor','#accountTotal','#toonieTotal','#processType'].forEach(sel=>document.addEventListener('input',e=>{if(e.target.matches(sel))preview()}));(async()=>{try{await loadSettings();await loadRecent()}catch(e){alert(e.message)}})();
</script></body></html>
