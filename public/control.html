<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>방송컨트롤</title>
<link rel="stylesheet" href="/app.css">
<style>
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .preset-card{
    border:1px solid #334155;
    background:#0f172a;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
  }
  .preset-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
  }
  .preset-title{
    font-weight:900;
    font-size:18px;
  }
  .preset-fields{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .preset-fields .full{grid-column:1 / -1}
  .toggle{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:900;
    color:#cbd5e1;
    white-space:nowrap;
  }
  .toggle input{
    width:20px;
    height:20px;
  }
  textarea{
    min-height:180px;
    resize:vertical;
  }
  @media(max-width:900px){
    .settings-grid{grid-template-columns:1fr}
    .preset-fields{grid-template-columns:1fr}
    .preset-fields .full{grid-column:auto}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">방송컨트롤 / 설정</div>
    <div class="nav">
      <a href="/admin.html">입력</a>
      <a href="/summary.html">합산</a>
      <a href="/overlay.html" target="_blank">OBS화면</a>
      <a href="/overlay.html?demo=1" target="_blank">데모</a>
    </div>
  </div>

  <div class="settings-grid">
    <div class="card">
      <h2>기본 설정</h2>
      <div class="row"><label>관리자 PW</label><input id="pw" class="input" type="password" placeholder="Render 환경변수 ADMIN_PASSWORD"></div>
      <div class="row"><label>방송 타이틀</label><input id="title" class="input" placeholder="도네이터 현황"></div>
      <div class="row"><label>타이틀 이미지 URL</label><input id="titleImage" class="input" placeholder="https://..."></div>
      <div class="row"><label>공지</label><input id="notice" class="input" placeholder="공지 문구"></div>
      <div class="row"><label>OBS 박스 가로 개수</label><input id="columns" class="input" type="number" min="1" max="6"></div>
      <div class="row"><label>최대 표시 크리에이터 수</label><input id="maxCreators" class="input" type="number" min="1" max="50"></div>
    </div>

    <div class="card">
      <h2>크리에이터 목록</h2>
      <p class="hint">한 줄에 한 명씩 입력하세요. 순서가 입력/오버레이 표시 순서입니다.</p>
      <textarea id="creators" class="input" placeholder="빵떠기&#10;또영&#10;수박"></textarea>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>처리 프리셋 / 단가 설정</h2>
    <p class="hint">
      프리셋 제목은 admin.html의 처리 선택에 표시됩니다.
      ON을 끄면 관리자 입력 화면에서 해당 처리가 숨겨집니다.
      예: <b>펴피지마</b> = 흡연 11900 / 금연 12000, <b>먹먹마</b> = 먹어 14000 / 먹지마 15000
    </p>

    <div id="presetList"></div>

    <button class="btn gray" onclick="addPreset()">프리셋 추가</button>
  </div>

  <div class="card" style="margin-top:16px">
    <button class="btn green" style="width:100%;font-size:18px" onclick="saveSettings()">설정 저장</button>
    <button class="btn red" style="width:100%;font-size:18px;margin-top:10px" onclick="resetDonations()">후원 데이터 전체 초기화</button>
  </div>
</div>

<script src="/common.js"></script>
<script>
let settings = null;

function escAttr(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

async function load(){
  settings = await api('/api/settings');
  const savedPw = localStorage.getItem('ADMIN_PASSWORD') || '';
  if(savedPw) $('#pw').value = savedPw;

  $('#title').value = settings.title || '';
  $('#titleImage').value = settings.titleImage || '';
  $('#notice').value = settings.notice || '';
  $('#columns').value = settings.columns || 4;
  $('#maxCreators').value = settings.maxCreators || 12;
  $('#creators').value = (settings.creators || []).join('\n');

  if(!settings.presets || !settings.presets.length){
    settings.presets = [
      {id:'smoke', enabled:true, title:'펴피지마', plusName:'흡연', plusPrice:11900, minusName:'금연', minusPrice:12000},
      {id:'food', enabled:true, title:'먹먹마', plusName:'먹어', plusPrice:14000, minusName:'먹지마', minusPrice:15000}
    ];
  }

  renderPresets();
}

function renderPresets(){
  const wrap = $('#presetList');
  wrap.innerHTML = (settings.presets || []).map((p, idx) => `
    <div class="preset-card" data-idx="${idx}">
      <div class="preset-top">
        <div class="preset-title">프리셋 ${idx + 1}</div>
        <label class="toggle">
          <input type="checkbox" class="preset-enabled" ${p.enabled !== false ? 'checked' : ''}>
          ON/OFF
        </label>
      </div>

      <div class="preset-fields">
        <div class="full">
          <label>프리셋 제목</label>
          <input class="input preset-title-input" value="${escAttr(p.title || '')}" placeholder="예: 펴피지마">
        </div>

        <div>
          <label>+ 항목명</label>
          <input class="input preset-plus-name" value="${escAttr(p.plusName || '')}" placeholder="예: 흡연">
        </div>

        <div>
          <label>+ 단가</label>
          <input class="input preset-plus-price" inputmode="numeric" value="${escAttr(p.plusPrice || '')}" placeholder="예: 11900">
        </div>

        <div>
          <label>- 항목명</label>
          <input class="input preset-minus-name" value="${escAttr(p.minusName || '')}" placeholder="예: 금연">
        </div>

        <div>
          <label>- 단가</label>
          <input class="input preset-minus-price" inputmode="numeric" value="${escAttr(p.minusPrice || '')}" placeholder="예: 12000">
        </div>
      </div>
    </div>
  `).join('');
}

function collectPresets(){
  return Array.from(document.querySelectorAll('.preset-card')).map((card, idx) => {
    const old = settings.presets[idx] || {};
    return {
      id: old.id || `preset_${idx+1}`,
      enabled: card.querySelector('.preset-enabled').checked,
      title: card.querySelector('.preset-title-input').value.trim(),
      plusName: card.querySelector('.preset-plus-name').value.trim(),
      plusPrice: toWon(card.querySelector('.preset-plus-price').value),
      minusName: card.querySelector('.preset-minus-name').value.trim(),
      minusPrice: toWon(card.querySelector('.preset-minus-price').value)
    };
  }).filter(p => p.title && p.plusName && p.minusName);
}

function addPreset(){
  settings.presets = settings.presets || [];
  settings.presets.push({
    id: 'preset_' + Date.now(),
    enabled: true,
    title: '새프리셋',
    plusName: '플러스',
    plusPrice: 10000,
    minusName: '마이너스',
    minusPrice: 10000
  });
  renderPresets();
}

async function saveSettings(){
  try{
    const pw = $('#pw').value;
    localStorage.setItem('ADMIN_PASSWORD', pw);

    const body = {
      password: pw,
      title: $('#title').value,
      titleImage: $('#titleImage').value,
      notice: $('#notice').value,
      columns: Number($('#columns').value || 4),
      maxCreators: Number($('#maxCreators').value || 12),
      creators: $('#creators').value.split(/\n+/).map(v => v.trim()).filter(Boolean),
      presets: collectPresets()
    };

    await api('/api/settings', {method:'POST', body:JSON.stringify(body)});
    alert('설정 저장 완료');
    await load();
  }catch(e){
    alert(e.message);
  }
}

async function resetDonations(){
  const pw = $('#pw').value;
  if(!confirm('후원 데이터를 전체 초기화할까요?')) return;
  await api('/api/reset', {method:'POST', body:JSON.stringify({password: pw})});
  alert('초기화 완료');
}

load();
</script>
</body>
</html>
