<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>방송컨트롤</title>
<link rel="stylesheet" href="/app.css">
<style>
  :root{--bg:#070b12;--card:#0b1220;--card2:#0f172a;--line:#253247;--line2:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--pink:#ec4899}
  *{box-sizing:border-box} body{background:var(--bg);color:var(--text);margin:0}.wrap{max-width:1240px;margin:0 auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}.title{font-size:30px;font-weight:950;letter-spacing:-.06em}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a{text-decoration:none;color:#dbeafe;background:#111827;border:1px solid var(--line2);padding:10px 14px;border-radius:12px;font-weight:900}.layout{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;align-items:start}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.card + .card{margin-top:14px}.card h2{font-size:20px;margin:0 0 12px;font-weight:950;letter-spacing:-.05em;display:flex;align-items:center;justify-content:space-between;gap:8px}.sub-card{background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:12px;margin-top:10px}.muted{color:var(--muted);font-size:13px;line-height:1.45}.row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}label{font-size:13px;color:#cbd5e1;font-weight:900}.input,select,textarea{width:100%;background:#070b12;color:var(--text);border:1px solid var(--line2);border-radius:12px;padding:11px 12px;font-size:15px;outline:none}.input:focus,select:focus,textarea:focus{border-color:#60a5fa;box-shadow:0 0 0 3px rgba(37,99,235,.18)}textarea{resize:vertical;line-height:1.45}.notice-area{min-height:110px}.creator-area{min-height:180px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:12px;padding:10px 13px;font-weight:900;cursor:pointer;background:#334155;color:#fff}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.blue{background:var(--blue)}.btn.gray{background:#334155}.btn.mini{font-size:12px;padding:7px 9px;border-radius:9px}.resultBox{background:#08111f;border:1px solid var(--line2);border-radius:12px;padding:11px 12px;font-weight:900;color:#dbeafe;margin-bottom:10px}.broadcast-create{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}.broadcast-list{display:flex;flex-direction:column;gap:8px;min-height:318px}.broadcast-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--line2);border-radius:13px;background:var(--card2);padding:10px 11px;min-height:56px}.broadcast-item.active{border-color:#22c55e;background:linear-gradient(90deg,rgba(34,197,94,.14),rgba(15,23,42,.95))}.broadcast-title{font-size:16px;font-weight:950;letter-spacing:-.045em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.broadcast-meta{font-size:12px;color:var(--muted);margin-top:3px}.broadcast-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.pill{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:900;background:#14532d;color:#bbf7d0;margin-left:4px}.pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;color:#cbd5e1;font-weight:900}.toggle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.toggle-box{display:flex;align-items:center;gap:9px;padding:12px;border:1px solid var(--line2);border-radius:13px;background:#070b12;color:var(--text);font-weight:950;cursor:pointer;user-select:none}.toggle-box input{width:20px;height:20px;accent-color:var(--pink)}.preset-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.preset-card{background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:12px}.preset-card.off{opacity:.55}.preset-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.preset-name{font-size:17px;font-weight:950;letter-spacing:-.045em}.preset-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.toggle{display:flex;align-items:center;gap:6px;font-weight:900;color:#cbd5e1;font-size:13px}.toggle input{width:18px;height:18px;accent-color:var(--green)}.preset-fields{display:grid;grid-template-columns:1fr 1fr;gap:7px}.preset-fields .full{grid-column:1/-1}.preset-fields label{font-size:11px}.preset-fields .input{padding:8px 9px;font-size:14px;border-radius:10px}.savebar{position:sticky;bottom:10px;z-index:10;margin-top:12px;background:rgba(15,23,42,.92);border:1px solid var(--line2);border-radius:16px;padding:10px;display:flex;gap:8px;align-items:center;justify-content:space-between;backdrop-filter:blur(4px)}.savebar .muted{font-weight:900}@media(max-width:980px){.layout,.grid-2,.toggle-grid,.preset-grid{grid-template-columns:1fr}.broadcast-create{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><div class="title">방송컨트롤 / 설정</div><div class="muted">현재 선택된 방송마다 공지, 프리셋, 오버레이 표시 설정이 따로 저장됩니다.</div></div><div class="nav"><a href="/admin.html">입력</a><a href="/summary.html">합산</a><a href="/donor_detail.html">도네이터</a><a href="/overlay.html" target="_blank">오버레이</a><a href="/overlay.html?demo=1" target="_blank">데모</a></div></div>
  <div class="layout">
    <div>
      <section class="card"><h2>방송 세션 <span class="muted">5개씩 표시</span></h2><div id="activeBroadcast" class="resultBox">현재 방송 확인 중...</div><div class="broadcast-create"><input id="broadcastTitle" class="input" placeholder="새 방송 제목 예: 0518여행방송"><button class="btn green" onclick="createBroadcast()">새 방송 시작</button></div><div id="broadcastList" class="broadcast-list"></div><div class="pager"><button class="btn gray mini" onclick="prevBroadcastPage()">이전</button><span id="broadcastPageInfo">1 / 1</span><button class="btn gray mini" onclick="nextBroadcastPage()">다음</button></div></section>
      <section class="card"><h2>크리에이터 목록</h2><p class="muted">한 줄에 한 명씩 입력하세요. 이 순서가 입력/오버레이 표시 순서입니다.</p><textarea id="creators" class="input creator-area" placeholder="빵떠기&#10;또영&#10;수박"></textarea></section>
    </div>
    <div>
      <section class="card"><h2>현재 방송 설정</h2><div class="row"><label>관리자 PW</label><input id="pw" class="input" type="password" placeholder="Render 환경변수 ADMIN_PASSWORD"></div><div class="grid-2"><div class="row"><label>방송 타이틀</label><input id="title" class="input" placeholder="도네이터 현황"></div><div class="row"><label>타이틀 이미지 URL</label><input id="titleImage" class="input" placeholder="https://..."></div></div><div class="sub-card"><h2 style="font-size:17px;margin-bottom:10px">공지사항</h2><div class="row"><label>공지 타이틀</label><input id="noticeTitle" class="input" placeholder="예: 오늘 공지"></div><div class="row"><label>공지문구</label><textarea id="notice" class="input notice-area" placeholder="여러 줄 입력 가능&#10;예) 계좌후원 반영 중&#10;예) 흡연/금연 단가 확인"></textarea></div></div><div class="sub-card"><h2 style="font-size:17px;margin-bottom:10px">오버레이 노출 박스</h2><div class="toggle-grid"><label class="toggle-box"><input type="checkbox" id="overlayAccountBox">계좌박스</label><label class="toggle-box"><input type="checkbox" id="overlayNoticeBox">공지박스</label><label class="toggle-box"><input type="checkbox" id="overlayCreatorBox">크리에이터박스</label></div></div><div class="grid-2" style="margin-top:10px"><div class="row"><label>최대 표시 크리에이터 수</label><input id="maxCreators" class="input" type="number" min="1" max="50"></div><div class="row"><label>OBS 박스 가로 개수</label><input id="columns" class="input" type="number" min="1" max="6"></div></div></section>
      <section class="card"><h2>처리 프리셋 <button class="btn blue mini" onclick="addPreset()">프리셋 추가</button></h2><p class="muted">OFF 하면 입력화면과 오버레이에서 숨김 처리됩니다. 삭제 버튼으로 방송별 프리셋에서 제거할 수 있습니다.</p><div id="presetList" class="preset-grid"></div></section>
    </div>
  </div>
  <div class="savebar"><div class="muted" id="saveHint">현재 방송 설정을 저장합니다.</div><button class="btn green" onclick="saveSettings()">설정 전체 저장</button></div>
</div>
<script src="/common.js"></script>
<script>
let settings = null;
let broadcasts = [];
let activeBroadcast = null;
let broadcastPage = 1;
const pageSize = 5;

function escAttr(v){return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}

async function load(){
  const savedPw = localStorage.getItem('ADMIN_PASSWORD') || '';
  if(savedPw) $('#pw').value = savedPw;
  await loadBroadcasts();
  await loadSettings();
}
async function loadSettings(){
  settings = await api('/api/settings');
  $('#title').value = settings.title || '';
  $('#titleImage').value = settings.titleImage || '';
  $('#noticeTitle').value = settings.noticeTitle || '공지';
  $('#notice').value = settings.notice || '';
  $('#columns').value = settings.columns || 4;
  $('#maxCreators').value = settings.maxCreators || 12;
  $('#creators').value = (settings.creators || []).join('\n');
  const overlaySections = settings.overlaySections || { account:true, notice:false, creators:true };
  $('#overlayAccountBox').checked = overlaySections.account !== false;
  $('#overlayNoticeBox').checked = overlaySections.notice === true;
  $('#overlayCreatorBox').checked = overlaySections.creators !== false;
  if(!settings.presets || !settings.presets.length){settings.presets=[{id:'smoke',enabled:true,title:'펴피지마',plusName:'흡연',plusPrice:11900,minusName:'금연',minusPrice:12000},{id:'food',enabled:true,title:'먹먹마',plusName:'먹어',plusPrice:14000,minusName:'먹지마',minusPrice:15000}];}
  renderPresets();
  $('#saveHint').textContent = settings.broadcast ? `현재 방송 "${settings.broadcast.title}" 설정을 저장합니다.` : '현재 방송 설정을 저장합니다.';
}
async function loadBroadcasts(){
  try{const data=await api('/api/broadcasts');broadcasts=data.broadcasts||[];activeBroadcast=data.active||null;$('#activeBroadcast').textContent=activeBroadcast?`현재 방송: ${activeBroadcast.title}`:'현재 방송 없음';const maxPage=Math.max(1,Math.ceil(broadcasts.length/pageSize));if(broadcastPage>maxPage)broadcastPage=maxPage;renderBroadcasts();}catch(e){$('#activeBroadcast').textContent='방송 세션 조회 실패: '+e.message;}
}
function renderBroadcasts(){const maxPage=Math.max(1,Math.ceil(broadcasts.length/pageSize));const start=(broadcastPage-1)*pageSize;const pageRows=broadcasts.slice(start,start+pageSize);$('#broadcastList').innerHTML=pageRows.map(b=>`<div class="broadcast-item ${b.isActive?'active':''}"><div><div class="broadcast-title">${esc(b.title)} ${b.isActive?'<span class="pill">현재</span>':''}</div><div class="broadcast-meta">${new Date(b.createdAt).toLocaleString('ko-KR')}</div></div><div class="broadcast-actions">${b.isActive?'':`<button class="btn blue mini" onclick="activateBroadcast('${b.id}')">선택</button>`}<button class="btn gray mini" onclick="resetBroadcast('${b.id}')">초기화</button>${b.isActive?'':`<button class="btn red mini" onclick="deleteBroadcast('${b.id}')">삭제</button>`}</div></div>`).join('')||`<div class="resultBox">방송 세션 없음</div>`;$('#broadcastPageInfo').textContent=`${broadcastPage} / ${maxPage}`;}
function prevBroadcastPage(){if(broadcastPage>1){broadcastPage--;renderBroadcasts();}}
function nextBroadcastPage(){const maxPage=Math.max(1,Math.ceil(broadcasts.length/pageSize));if(broadcastPage<maxPage){broadcastPage++;renderBroadcasts();}}
async function createBroadcast(){try{const pw=$('#pw').value;localStorage.setItem('ADMIN_PASSWORD',pw);const title=$('#broadcastTitle').value.trim();if(!title)return alert('방송 제목을 입력하세요.');await api('/api/broadcasts',{method:'POST',body:JSON.stringify({password:pw,title,activate:true})});$('#broadcastTitle').value='';broadcastPage=1;await load();alert('새 방송이 현재 방송으로 선택되었습니다. 현재 설정값이 새 방송 설정으로 복사됩니다.');}catch(e){alert(e.message);}}
async function activateBroadcast(id){try{const pw=$('#pw').value;localStorage.setItem('ADMIN_PASSWORD',pw);await api('/api/broadcasts/'+id+'/activate',{method:'POST',body:JSON.stringify({password:pw})});await load();alert('현재 방송이 변경되었습니다. 해당 방송 설정을 불러왔습니다.');}catch(e){alert(e.message);}}
async function resetBroadcast(id){try{const pw=$('#pw').value;if(!confirm('선택한 방송의 후원 데이터만 초기화할까요?'))return;await api('/api/reset',{method:'POST',body:JSON.stringify({password:pw,broadcastId:id})});alert('선택한 방송 데이터가 초기화되었습니다.');await loadBroadcasts();}catch(e){alert(e.message);}}
async function deleteBroadcast(id){try{const pw=$('#pw').value;if(!confirm('이 방송 세션과 해당 후원 데이터를 리스트에서 삭제할까요?'))return;await api('/api/broadcasts/'+id,{method:'DELETE',headers:{'x-admin-password':pw}});await load();alert('삭제되었습니다.');}catch(e){alert(e.message);}}
function renderPresets(){const wrap=$('#presetList');wrap.innerHTML=(settings.presets||[]).map((p,idx)=>`<div class="preset-card ${p.enabled===false?'off':''}" data-idx="${idx}"><div class="preset-head"><div class="preset-name">${esc(p.title||('프리셋 '+(idx+1)))}</div><div class="preset-actions"><label class="toggle"><input type="checkbox" class="preset-enabled" ${p.enabled!==false?'checked':''}> ON</label><button class="btn red mini" onclick="deletePreset(${idx})">삭제</button></div></div><div class="preset-fields"><div class="full"><label>프리셋 제목</label><input class="input preset-title-input" value="${escAttr(p.title||'')}" placeholder="예: 펴피지마"></div><div><label>+ 항목</label><input class="input preset-plus-name" value="${escAttr(p.plusName||'')}" placeholder="흡연"></div><div><label>+ 단가</label><input class="input preset-plus-price" inputmode="decimal" value="${escAttr(p.plusPrice||'')}" placeholder="11900"></div><div><label>- 항목</label><input class="input preset-minus-name" value="${escAttr(p.minusName||'')}" placeholder="금연"></div><div><label>- 단가</label><input class="input preset-minus-price" inputmode="decimal" value="${escAttr(p.minusPrice||'')}" placeholder="12000"></div></div></div>`).join('');}
function collectPresets(){return Array.from(document.querySelectorAll('.preset-card')).map((card,idx)=>{const old=settings.presets[idx]||{};return{id:old.id||`preset_${idx+1}`,enabled:card.querySelector('.preset-enabled').checked,title:card.querySelector('.preset-title-input').value.trim(),plusName:card.querySelector('.preset-plus-name').value.trim(),plusPrice:toWon(card.querySelector('.preset-plus-price').value),minusName:card.querySelector('.preset-minus-name').value.trim(),minusPrice:toWon(card.querySelector('.preset-minus-price').value)}}).filter(p=>p.title&&p.plusName&&p.minusName);}
function addPreset(){settings.presets=collectPresets();settings.presets.push({id:'preset_'+Date.now(),enabled:true,title:'새프리셋',plusName:'플러스',plusPrice:10000,minusName:'마이너스',minusPrice:10000});renderPresets();}
function deletePreset(idx){settings.presets=collectPresets();if(!confirm('이 프리셋을 삭제할까요?'))return;settings.presets.splice(idx,1);renderPresets();}
async function saveSettings(){try{const pw=$('#pw').value;localStorage.setItem('ADMIN_PASSWORD',pw);const body={password:pw,title:$('#title').value,titleImage:$('#titleImage').value,noticeTitle:$('#noticeTitle').value,notice:$('#notice').value,columns:Number($('#columns').value||4),maxCreators:Number($('#maxCreators').value||12),creators:$('#creators').value.split(/\n+/).map(v=>v.trim()).filter(Boolean),presets:collectPresets(),overlaySections:{account:$('#overlayAccountBox').checked,notice:$('#overlayNoticeBox').checked,creators:$('#overlayCreatorBox').checked}};await api('/api/settings',{method:'POST',body:JSON.stringify(body)});alert('현재 방송 설정 저장 완료');await loadSettings();}catch(e){alert(e.message);}}
load();
</script>
</body>
</html>
