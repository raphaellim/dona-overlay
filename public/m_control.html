<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>모바일 방송 설정</title><style>
*{box-sizing:border-box}body{margin:0;background:#070b12;color:#e5e7eb;font-family:Arial,'Noto Sans KR',sans-serif;padding-bottom:78px}.top{position:sticky;top:0;z-index:20;background:#07111f;border-bottom:1px solid #253247;padding:12px}.title{font-size:18px;font-weight:1000}.sub{font-size:12px;color:#94a3b8;margin-top:4px}.nav,.tabs{display:flex;gap:8px;overflow:auto}.nav{margin-top:9px}.nav a{white-space:nowrap;color:#dbeafe;text-decoration:none;border:1px solid #334155;border-radius:999px;padding:8px 11px;background:#111827;font-weight:900;font-size:13px}.tabs{position:sticky;top:74px;z-index:15;background:#070b12;border-bottom:1px solid #253247;padding:9px 12px}.tab{white-space:nowrap;border:1px solid #334155;border-radius:999px;background:#0f172a;color:#fff;padding:9px 12px;font-weight:1000}.tab.active{background:#2563eb}.wrap{padding:12px}.panel{display:none}.panel.active{display:block}.card{background:#0b1220;border:1px solid #253247;border-radius:18px;padding:14px;margin-bottom:12px}h2{font-size:17px;margin:0 0 12px}.row{margin-bottom:11px}label{display:block;margin-bottom:6px;font-size:13px;color:#cbd5e1;font-weight:900}.input,input,select,textarea{width:100%;min-height:48px;background:#070b12;color:#fff;border:1px solid #334155;border-radius:13px;padding:11px 12px;font-size:16px;font-weight:800}textarea{min-height:100px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{width:100%;min-height:46px;border:0;border-radius:13px;background:#334155;color:#fff;font-weight:1000;font-size:15px}.green{background:#16a34a}.blue{background:#2563eb}.red{background:#dc2626}.pink{background:#ec4899}.mini{min-height:38px;font-size:13px}.toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#101827;border:1px solid #334155;border-radius:15px;padding:12px;margin-bottom:8px;font-weight:1000}.toggle input{width:22px;height:22px;min-height:22px;accent-color:#38bdf8}.item{background:#101827;border:1px solid #334155;border-radius:15px;padding:11px;margin-bottom:9px;display:grid;gap:8px}.colors{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.colors input{padding:3px;min-height:44px}.muted{font-size:12px;color:#94a3b8}.bottom{position:fixed;left:0;right:0;bottom:0;background:#07111f;border-top:1px solid #253247;padding:10px 12px calc(10px + env(safe-area-inset-bottom))}@media(max-width:380px){.grid2,.grid3{grid-template-columns:1fr}.tabs{top:86px}}
</style></head><body><div class="top"><div class="title">모바일 방송 설정</div><div id="info" class="sub">불러오는 중...</div><div class="nav"><a id="pcControl" target="_blank">PC 설정</a><a id="mAdmin">모바일 입력</a><a id="overlay" target="_blank">오버레이</a></div></div><div class="tabs"><button class="tab active" data-tab="display">표시</button><button class="tab" data-tab="notice">공지</button><button class="tab" data-tab="funding">펀딩</button><button class="tab" data-tab="karaoke">노래방</button><button class="tab" data-tab="sound">사운드</button></div><div class="wrap"><section id="display" class="panel active"><div class="card"><h2>표시 ON/OFF</h2><div id="toggles"></div></div><div class="card"><h2>방송시간</h2><div class="grid2"><button class="btn green" onclick="startTimer()">방송시작</button><button class="btn red" onclick="endTimer()">방송종료</button></div></div></section><section id="notice" class="panel"><div class="card"><h2>공지</h2><div class="row"><label>제목</label><input id="noticeTitle" class="input"></div><div class="row"><label>내용</label><textarea id="noticeText"></textarea></div><div class="row"><label>줄별 컬러</label><div id="noticeColors" class="colors"></div></div></div></section><section id="funding" class="panel"><div class="card"><h2>펀딩</h2><div id="fundingList"></div><button class="btn blue" onclick="addFunding()">펀딩 추가</button></div></section><section id="karaoke" class="panel"><div class="card"><h2>노래방 기본</h2><div class="row"><label>타이틀</label><input id="karaokeTitle" class="input"></div><div class="row"><label>간단알림</label><input id="karaokeNotice" class="input"></div></div><div class="card"><h2>코인 등록</h2><input id="coinNick" class="input" placeholder="닉네임"><div class="grid3"><input id="coinVerse" class="input" type="number" placeholder="1절"><input id="coinFull" class="input" type="number" placeholder="완곡"><input id="coinSpecial" class="input" type="number" placeholder="스페셜"></div><button class="btn blue" onclick="addCoin()">코인 추가/수정</button></div><div class="card"><h2>선곡 추가</h2><input id="songNick" class="input" list="coinUsers" placeholder="닉네임"><datalist id="coinUsers"></datalist><input id="songTitle" class="input" placeholder="곡명"><select id="songType" class="input"><option value="verse">1절</option><option value="full">완곡</option><option value="special">스페셜</option></select><button class="btn green" onclick="addSong()">선곡 추가</button></div><div class="card"><h2>선곡 리스트</h2><div id="songList"></div></div></section><section id="sound" class="panel"><div class="card"><h2>수동 ALERT / 사운드</h2><input id="manualTitle" class="input" placeholder="제목"><input id="manualFile" class="input" placeholder="alert.mp3"><input id="repeatCount" class="input" type="number" min="1" value="1"><div class="grid2"><button class="btn pink" onclick="sendSound('immediate')">즉시</button><button class="btn blue" onclick="sendSound('queue')">대기열</button></div><button class="btn green" style="margin-top:8px" onclick="releaseQueue()">대기열 전송</button></div></section></div><div class="bottom"><button class="btn green" onclick="saveAll()">설정 저장</button></div><script>
const P=new URLSearchParams(location.search),STATION=P.get('station')||localStorage.getItem('STATION_SLUG')||'default';localStorage.setItem('STATION_SLUG',STATION);let settings={};const $=s=>document.querySelector(s);function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}async function api(url,opt={}){const u=new URL(url,location.origin);u.searchParams.set('station',STATION);opt.headers=opt.headers||{};if(opt.body&&!opt.headers['Content-Type'])opt.headers['Content-Type']='application/json';const r=await fetch(u.pathname+u.search,opt),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||r.statusText);return d}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===b.dataset.tab))});function sections(){const s=settings.overlaySections||{};return {account:s.account!==false,funding:s.funding===true,notice:s.notice===true,karaoke:s.karaoke===true,broadcastTimer:s.broadcastTimer===true,creators:s.creators!==false,creatorDonations:s.creatorDonations!==false}}function renderToggles(){const s=sections(),labels={account:'계좌후원',funding:'펀딩',notice:'공지',karaoke:'노래방',broadcastTimer:'방송시간',creators:'크리에이터 박스',creatorDonations:'크리에이터 후원금액'};$('#toggles').innerHTML=Object.keys(labels).map(k=>`<label class="toggle">${labels[k]}<input class="sec" data-key="${k}" type="checkbox" ${s[k]?'checked':''}></label>`).join('')}function renderNotice(){const cs=Array.isArray(settings.noticeColors)?settings.noticeColors:['#ffffff'];while(cs.length<5)cs.push('');$('#noticeTitle').value=settings.noticeTitle||'공지';$('#noticeText').value=settings.notice||'';$('#noticeColors').innerHTML=cs.slice(0,5).map(c=>`<input class="notice-color input" value="${esc(c)}" placeholder="#ffffff">`).join('')}function fundingData(){if(!settings.fundingData||!Array.isArray(settings.fundingData.items))settings.fundingData={items:[]};return settings.fundingData}function renderFunding(){const d=fundingData();$('#fundingList').innerHTML=d.items.length?d.items.map((f,i)=>`<div class="item fund" data-idx="${i}"><input class="input ft" value="${esc(f.title)}" placeholder="펀딩명"><div class="grid2"><input class="input fc" type="number" value="${Number(f.current||0)}" placeholder="현재"><input class="input fg" type="number" value="${Number(f.target||0)}" placeholder="목표"></div><select class="input fe"><option value="true" ${f.enabled!==false?'selected':''}>표시</option><option value="false" ${f.enabled===false?'selected':''}>숨김</option></select><button class="btn red mini" onclick="delFunding(${i})">삭제</button></div>`).join(''):'<div class="muted">등록된 펀딩 없음</div>'}function collectFunding(){return {items:[...document.querySelectorAll('.fund')].map((r,i)=>({id:fundingData().items[i]?.id||('fund_'+Date.now()+'_'+i),title:r.querySelector('.ft').value.trim(),current:Number(r.querySelector('.fc').value||0),target:Number(r.querySelector('.fg').value||0),enabled:r.querySelector('.fe').value!=='false'})).filter(f=>f.title)}}function addFunding(){fundingData().items.push({id:'fund_'+Date.now(),title:'새 펀딩',current:0,target:100,enabled:true});renderFunding()}function delFunding(i){if(confirm('삭제할까요?')){fundingData().items.splice(i,1);renderFunding()}}function karaoke(){if(!settings.karaokeData)settings.karaokeData={title:'노래방 공지 알림판',notice:'노래문의필수',users:[],songs:[]};if(!Array.isArray(settings.karaokeData.users))settings.karaokeData.users=[];if(!Array.isArray(settings.karaokeData.songs))settings.karaokeData.songs=[];return settings.karaokeData}function renderKaraoke(){const k=karaoke();$('#karaokeTitle').value=k.title||'노래방 공지 알림판';$('#karaokeNotice').value=k.notice||k.ticker||'';$('#coinUsers').innerHTML=k.users.map(u=>`<option value="${esc(u.nick)}"></option>`).join('');$('#songList').innerHTML=k.songs.filter(s=>s.status!=='완료'&&s.status!=='삭제').map(s=>`<div class="item"><b>${esc(s.nick)} - ${esc(s.title)}</b><select class="input" onchange="statusSong('${s.id}',this.value)">${['진행','대기','보류','완료'].map(st=>`<option ${s.status===st?'selected':''}>${st}</option>`).join('')}</select><div class="grid2"><button class="btn blue mini" onclick="editSong('${s.id}')">변경</button><button class="btn red mini" onclick="deleteSong('${s.id}')">삭제</button></div></div>`).join('')||'<div class="muted">등록된 선곡 없음</div>'}function addCoin(){const k=karaoke(),nick=$('#coinNick').value.trim();if(!nick)return alert('닉네임 입력');let u=k.users.find(x=>x.nick===nick);if(!u){u={nick,coins:{verse:0,full:0,special:0}};k.users.push(u)}u.coins={verse:Number($('#coinVerse').value||0),full:Number($('#coinFull').value||0),special:Number($('#coinSpecial').value||0)};$('#coinNick').value=$('#coinVerse').value=$('#coinFull').value=$('#coinSpecial').value='';renderKaraoke()}function addSong(){const k=karaoke(),nick=$('#songNick').value.trim(),title=$('#songTitle').value.trim(),type=$('#songType').value;if(!nick||!title)return alert('닉네임/곡명 입력');const u=k.users.find(x=>x.nick===nick);if(!u)return alert('코인 있는 닉네임만 가능');if(Number(u.coins?.[type]||0)<=0)return alert('해당 코인 부족');u.coins[type]--;k.songs.push({id:'song_'+Date.now(),nick,title,type,status:'대기'});$('#songNick').value=$('#songTitle').value='';renderKaraoke()}function statusSong(id,st){const s=karaoke().songs.find(x=>x.id===id);if(s)s.status=st;renderKaraoke()}function editSong(id){const s=karaoke().songs.find(x=>x.id===id);if(!s)return;const v=prompt('곡명 수정',s.title);if(v!==null)s.title=v.trim()||s.title;renderKaraoke()}function deleteSong(id){if(!confirm('삭제할까요?'))return;const s=karaoke().songs.find(x=>x.id===id);if(s)s.status='삭제';renderKaraoke()}async function saveAll(){try{const ov={};document.querySelectorAll('.sec').forEach(c=>ov[c.dataset.key]=c.checked);settings.overlaySections=ov;settings.noticeTitle=$('#noticeTitle').value.trim();settings.notice=$('#noticeText').value;settings.noticeColors=[...document.querySelectorAll('.notice-color')].map(e=>e.value.trim()).filter(Boolean);if(!settings.noticeColors.length)settings.noticeColors=['#ffffff'];settings.fundingData=collectFunding();const k=karaoke();k.title=$('#karaokeTitle').value.trim()||'노래방 공지 알림판';k.notice=$('#karaokeNotice').value.trim();await api('/api/settings',{method:'POST',body:JSON.stringify({overlaySections:settings.overlaySections,noticeTitle:settings.noticeTitle,notice:settings.notice,noticeColors:settings.noticeColors,fundingData:settings.fundingData,karaokeData:settings.karaokeData})});alert('저장 완료');await load()}catch(e){alert(e.message)}}async function startTimer(){try{await api('/api/broadcast-timer/start',{method:'POST',body:'{}'});alert('방송 시작')}catch(e){alert(e.message)}}async function endTimer(){if(!confirm('방송 종료?'))return;try{await api('/api/broadcast-timer/end',{method:'POST',body:'{}'});alert('방송 종료')}catch(e){alert(e.message)}}async function sendSound(mode){try{const f=$('#manualFile').value.trim();if(!f)return alert('사운드 파일명 입력');await api('/api/sound-events',{method:'POST',body:JSON.stringify({title:$('#manualTitle').value.trim()||f,soundFile:f,repeatCount:Number($('#repeatCount').value||1),mode})});alert('전송 완료')}catch(e){alert(e.message)}}async function releaseQueue(){try{await api('/api/sound-events/release',{method:'POST',body:'{}'});alert('대기열 전송 완료')}catch(e){alert(e.message)}}async function load(){settings=await api('/api/settings');$('#info').textContent=`${settings.station?.name||STATION} / ${settings.broadcast?.title||'현재 방송'}`;$('#pcControl').href=`/control.html?station=${encodeURIComponent(STATION)}`;$('#mAdmin').href=`/m_admin.html?station=${encodeURIComponent(STATION)}`;$('#overlay').href=`/overlay.html?station=${encodeURIComponent(STATION)}&token=${encodeURIComponent(settings.station?.overlayToken||'')}&monitor=1&v=${Date.now()}`;renderToggles();renderNotice();renderFunding();renderKaraoke()}load().catch(e=>alert(e.message));
</script></body></html>
