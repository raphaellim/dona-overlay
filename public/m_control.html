<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>모바일 방송 설정</title><style>
:root{--bg:#07101c;--card:#111b2a;--card2:#0d1624;--line:rgba(148,163,184,.22);--text:#eef6ff;--muted:#9fb0c6;--blue:#3b82f6;--green:#58c96b;--red:#ef6b86;--gold:#ffd166}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 30% -10%,rgba(59,130,246,.22),transparent 38%),linear-gradient(180deg,#0b1522,#060b12);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif}body{padding-bottom:92px}button,input,select,textarea{font-family:inherit}.topbar{position:sticky;top:0;z-index:30;padding:12px 12px 10px;padding-top:calc(12px + env(safe-area-inset-top));background:linear-gradient(180deg,rgba(7,16,28,.97),rgba(7,16,28,.84));backdrop-filter:blur(16px);border-bottom:1px solid rgba(148,163,184,.12)}.top-main{height:36px;display:grid;grid-template-columns:42px 1fr 42px;align-items:center}.icon-btn{width:36px;height:36px;border:0;background:transparent;color:#fff;font-size:24px;font-weight:900}.page-title{text-align:center;font-size:20px;font-weight:1000;letter-spacing:-.5px}.station-line{display:flex;justify-content:center;align-items:center;gap:7px;margin-top:5px;color:#c9d8ee;font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.live-dot{width:9px;height:9px;border-radius:50%;background:#33a7ff;box-shadow:0 0 0 4px rgba(51,167,255,.14),0 0 14px #33a7ff}.quick-links{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:12px}.quick-links a{min-height:38px;border-radius:14px;text-decoration:none;color:#eaf2ff;background:linear-gradient(180deg,rgba(30,41,59,.9),rgba(15,23,42,.92));border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}.quick-links a.primary{background:linear-gradient(135deg,#2463d8,#3b82f6)}.wrap{padding:12px;max-width:520px;margin:0 auto}.card{background:linear-gradient(180deg,rgba(17,27,42,.94),rgba(10,18,30,.96));border:1px solid rgba(148,163,184,.16);border-radius:18px;padding:13px;margin-bottom:12px;box-shadow:0 18px 60px rgba(0,0,0,.38)}.card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}h2{font-size:16px;margin:0;font-weight:1000}.badge{font-size:12px;font-weight:1000;color:#93c5fd;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.35);border-radius:999px;padding:5px 9px}.row{margin-bottom:10px}label{display:block;margin:0 0 6px;color:#d3e0f2;font-size:13px;font-weight:900}.input,select,textarea{width:100%;min-height:42px;border-radius:12px;border:1px solid rgba(148,163,184,.24);background:linear-gradient(180deg,rgba(13,22,36,.9),rgba(8,15,25,.95));color:#fff;padding:10px 12px;font-size:15px;font-weight:800;outline:none}.input:focus,select:focus,textarea:focus{border-color:rgba(96,165,250,.75);box-shadow:0 0 0 3px rgba(59,130,246,.14)}textarea{min-height:92px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{width:100%;min-height:42px;border:0;border-radius:12px;background:linear-gradient(180deg,#334155,#1f2937);color:#fff;font-size:14px;font-weight:1000;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}.btn.blue{background:linear-gradient(135deg,#2563eb,#3b82f6)}.btn.green{background:linear-gradient(135deg,#35a853,#65d778)}.btn.red{background:linear-gradient(135deg,#be123c,#fb7185)}.btn.gray{background:linear-gradient(180deg,#253244,#162030)}.btn.mini{min-height:34px;font-size:12px;border-radius:10px;padding:0 8px}.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.summary-pill{min-height:58px;border-radius:14px;padding:8px 6px;text-align:center;border:1px solid rgba(148,163,184,.2);background:rgba(15,23,42,.72)}.summary-pill span{display:block;color:#b7c7dc;font-size:11px;font-weight:1000;margin-bottom:4px}.summary-pill b{font-size:20px}.summary-pill.blue{border-color:rgba(59,130,246,.55);background:linear-gradient(180deg,rgba(30,64,175,.26),rgba(15,23,42,.72))}.summary-pill.green{border-color:rgba(74,222,128,.46);background:linear-gradient(180deg,rgba(22,101,52,.26),rgba(15,23,42,.72))}.summary-pill.red{border-color:rgba(248,113,113,.48);background:linear-gradient(180deg,rgba(127,29,29,.25),rgba(15,23,42,.72))}.summary-pill.ok{border-color:rgba(74,222,128,.55)}.muted{color:var(--muted);font-size:12px;font-weight:800}.item,.creator-row,.recent{background:linear-gradient(180deg,rgba(15,24,38,.88),rgba(10,18,30,.9));border:1px solid rgba(148,163,184,.16);border-radius:15px;padding:10px;margin-bottom:8px}.creator-top{display:grid;grid-template-columns:1fr 68px;gap:8px;align-items:center;margin-bottom:8px}.check-name{margin:0;display:flex;align-items:center;gap:9px;color:#fff;font-size:15px}.check-name input{width:21px;height:21px;accent-color:#3b82f6}.amount-line{display:grid;grid-template-columns:1fr 58px;gap:8px}.memo-line{display:none;margin-top:8px}.creator-row.open .memo-line{display:block}.recent{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.status{display:inline-flex;min-width:64px;justify-content:center;border-radius:999px;background:rgba(34,197,94,.18);color:#b8ffc4;font-size:12px;font-weight:1000;padding:4px 8px}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(7,16,28,.74),rgba(7,16,28,.98));border-top:1px solid rgba(148,163,184,.16);backdrop-filter:blur(16px)}.bottom .btn{max-width:520px;margin:0 auto;min-height:56px;border-radius:14px;font-size:17px}.toast{position:fixed;left:50%;bottom:84px;z-index:100;transform:translateX(-50%) translateY(20px);min-width:220px;max-width:calc(100% - 32px);padding:12px 14px;border-radius:999px;background:rgba(15,23,42,.96);border:1px solid rgba(148,163,184,.25);color:#fff;font-size:14px;font-weight:1000;text-align:center;opacity:0;pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.empty,.warning{padding:12px;border-radius:16px;color:#cbd5e1;background:rgba(15,23,42,.8);border:1px dashed rgba(148,163,184,.24);font-size:13px;font-weight:900}.warning{color:#fecaca;background:rgba(127,29,29,.2);border-color:rgba(248,113,113,.35)}.tabs{position:sticky;top:calc(104px + env(safe-area-inset-top));z-index:25;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 12px;background:rgba(7,16,28,.84);backdrop-filter:blur(12px);border-bottom:1px solid rgba(148,163,184,.10)}.tab{min-height:32px;border:1px solid rgba(148,163,184,.18);border-radius:8px;background:rgba(15,23,42,.74);color:#cbd5e1;font-size:12px;font-weight:1000}.tab.active{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff}.panel{display:none}.panel.active{display:block}.toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(180deg,rgba(15,24,38,.88),rgba(10,18,30,.9));border:1px solid rgba(148,163,184,.16);border-radius:14px;padding:10px;font-weight:1000;font-size:13px}.switch{position:relative;width:48px;height:26px;flex:0 0 auto}.switch input{display:none}.knob{position:absolute;inset:0;border-radius:999px;background:#334155;transition:.18s}.knob:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 2px 8px rgba(0,0,0,.35)}.switch input:checked+.knob{background:#58c96b}.switch input:checked+.knob:before{transform:translateX(22px)}.colors{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.colors input{padding:4px;min-height:42px}.progress{height:8px;border-radius:999px;background:rgba(148,163,184,.18);overflow:hidden}.bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#58c96b,#9cffaa);width:0}.small{font-size:11px;color:#9fb0c6;font-weight:800}@media(max-width:380px){.grid2,.grid3,.summary-grid,.toggle-grid,.colors,.amount-line{grid-template-columns:1fr}.tabs{top:calc(126px + env(safe-area-inset-top));grid-template-columns:repeat(3,1fr)}}
</style></head><body>
<header class="topbar"><div class="top-main"><button class="icon-btn" onclick="location.href=stationUrl('/station_control.html')">☰</button><div class="page-title">모바일 방송 설정</div><button class="icon-btn" onclick="location.href=stationUrl('/m_admin.html')">⚙</button></div><div class="station-line"><span class="live-dot"></span><span id="stationInfo">방송국 확인 중.</span></div><div class="quick-links"><a id="pcControlLink" target="_blank">PC 설정</a><a id="mobileAdminLink">모바일 입력</a><a id="overlayLink" class="primary" target="_blank">오버레이</a></div></header><nav class="tabs"><button class="tab active" data-tab="display">표시</button><button class="tab" data-tab="notice">공지</button><button class="tab" data-tab="funding">펀딩</button><button class="tab" data-tab="karaoke">노래방</button><button class="tab" data-tab="sound">사운드</button></nav>
<main class="wrap"><section id="display" class="panel active"><div class="card"><div class="card-head"><h2>오버레이 표시 항목</h2><span class="badge">ON/OFF</span></div><div class="toggle-grid" id="sectionToggles"></div></div><div class="card"><div class="card-head"><h2>방송시간</h2><span class="badge" id="timerBadge">확인 중</span></div><div class="grid2"><button class="btn green" onclick="startTimer()">방송 시작</button><button class="btn red" onclick="endTimer()">방송 종료</button></div></div></section><section id="notice" class="panel"><div class="card"><div class="card-head"><h2>공지 설정</h2><span class="badge">텍스트/색상</span></div><div class="row"><label>제목</label><input id="noticeTitle" class="input"></div><div class="row"><label>내용</label><textarea id="noticeText" class="input"></textarea></div><div class="row"><label>텍스트 색상 3개</label><div class="colors" id="noticeColors"></div></div></div></section><section id="funding" class="panel"><div class="card"><div class="card-head"><h2>펀딩 관리</h2><button class="btn blue mini" style="width:86px" onclick="addFunding()">+ 추가</button></div><div id="fundingList"><div class="empty">불러오는 중.</div></div></div></section><section id="karaoke" class="panel"><div class="card"><div class="card-head"><h2>노래방 기본</h2><span class="badge">대기곡</span></div><div class="row"><label>기본 제목</label><input id="karaokeTitle" class="input"></div><div class="row"><label>간단 알림</label><input id="karaokeNotice" class="input"></div><div class="grid2"><div class="row"><label>신청 코인</label><input id="karaokeCoinBasic" class="input" type="number"></div><div class="row"><label>우선 코인</label><input id="karaokeCoinPriority" class="input" type="number"></div></div></div><div class="card"><div class="card-head"><h2>대기곡</h2><button class="btn blue mini" style="width:78px" onclick="addSong()">+ 곡 추가</button></div><div class="grid2"><input id="songNick" class="input" placeholder="신청자"><input id="songTitle" class="input" placeholder="곡명"></div><div style="height:8px"></div><div id="songList"></div></div></section><section id="sound" class="panel"><div class="card"><div class="card-head"><h2>사운드 / ALERT</h2><span class="badge">수동 전송</span></div><div class="row"><label>제목</label><input id="manualTitle" class="input"></div><div class="row"><label>사운드 파일명</label><input id="manualFile" class="input" placeholder="alert.mp3"></div><div class="row"><label>반복 횟수</label><input id="repeatCount" class="input" type="number" value="1"></div><div class="grid2"><button class="btn blue" onclick="sendSound('now')">즉시 전송</button><button class="btn gray" onclick="sendSound('queue')">대기열 추가</button></div><div style="height:8px"></div><button class="btn green" onclick="releaseQueue()">대기열 전송</button></div></section></main><div class="bottom"><button class="btn green" onclick="saveAll()">▣ 현재 탭/전체 설정 저장</button></div><div class="toast" id="toast"></div>
<script>
const PARAMS=new URLSearchParams(location.search);const STATION=PARAMS.get('station')||localStorage.getItem('STATION_SLUG')||'default';localStorage.setItem('STATION_SLUG',STATION);let settings=null;const $=s=>document.querySelector(s);function stationUrl(path){const u=new URL(path,location.origin);u.searchParams.set('station',STATION);return u.pathname+u.search}function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]))}function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800)}async function api(url,opt={}){const u=new URL(url,location.origin);u.searchParams.set('station',STATION);const options=Object.assign({headers:{}},opt||{});if(options.body&&!options.headers['Content-Type'])options.headers['Content-Type']='application/json';const res=await fetch(u.pathname+u.search,options);const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||res.statusText||'API 오류');return data}function toWon(v){const raw=String(v??'').trim().replace(/,/g,'');if(!raw)return 0;const n=Number(raw.replace(/[^0-9.-]/g,''));if(!Number.isFinite(n))return 0;if(Math.abs(n)>0&&Math.abs(n)<1000)return Math.round(n*1000);return Math.trunc(n)}function inputValueFromWon(won){const v=Number(won||0)/1000;if(!Number.isFinite(v)||v===0)return '';return String(Number(v.toFixed(3))).replace(/\.0+$/,'')}function fmtWon(n){return '₩'+Math.trunc(Number(n||0)).toLocaleString('ko-KR')}

function renderHeader(){const stationName=settings?.station?.name||STATION,broadcastTitle=settings?.broadcast?.title||'현재 방송';$('#stationInfo').textContent=`방송국: ${stationName} · 현재 방송: ${broadcastTitle}`;$('#pcControlLink').href=stationUrl('/control.html');$('#mobileAdminLink').href=stationUrl('/m_admin.html');const token=settings?.station?.overlayToken||'';$('#overlayLink').href=`/overlay.html?station=${encodeURIComponent(STATION)}&token=${encodeURIComponent(token)}&monitor=1&v=${Date.now()}`;const timer=settings?.broadcastTimerData||settings?.broadcast?.broadcastTimerData||{};$('#timerBadge').textContent=timer.running?'실행중':'대기'}function renderToggles(){const s=settings.overlaySections||{};const labels=[['accountDonations','🏦 계좌후원'],['funding','💗 펀딩'],['notice','📢 공지'],['karaoke','🎤 노래방'],['broadcastTimer','🕒 방송시간'],['creators','👥 크리에이터 박스'],['creatorDonations','🪙 크리에이터 후원금액']];$('#sectionToggles').innerHTML=labels.map(([key,label])=>`<div class="toggle"><span>${label}</span><label class="switch"><input class="sec" data-key="${key}" type="checkbox" ${s[key]!==false?'checked':''}><span class="knob"></span></label></div>`).join('')}function renderNotice(){$('#noticeTitle').value=settings.noticeTitle||'공지';$('#noticeText').value=settings.notice||'';const colors=Array.isArray(settings.noticeColors)?settings.noticeColors.slice(0,3):['#FFD166','#E5E7EB','#1F2937'];while(colors.length<3)colors.push('');$('#noticeColors').innerHTML=colors.map(c=>`<input class="input notice-color" value="${esc(c)}" placeholder="#FFFFFF">`).join('')}function fundingData(){if(!settings.fundingData||!Array.isArray(settings.fundingData.items))settings.fundingData={items:[]};return settings.fundingData}function fundingPercent(f){const target=Number(f.target||0);return target?Math.max(0,Math.min(100,Math.round(Number(f.current||0)/target*100))):0}function renderFunding(){const items=fundingData().items;$('#fundingList').innerHTML=items.length?items.map((f,i)=>`<div class="item fund" data-idx="${i}"><div class="grid2"><b>펀딩${i+1}</b><button class="btn red mini" onclick="delFunding(${i})">삭제</button></div><input class="input ft" value="${esc(f.title||'')}" placeholder="펀딩명"><div class="grid2"><input class="input fc" type="number" value="${Number(f.current||0)}" placeholder="현재"><input class="input fg" type="number" value="${Number(f.target||0)}" placeholder="목표"></div><select class="input fe"><option value="true" ${f.enabled!==false?'selected':''}>표시</option><option value="false" ${f.enabled===false?'selected':''}>숨김</option></select><div class="progress"><div class="bar" style="width:${fundingPercent(f)}%"></div></div><div class="small">${fundingPercent(f)}%</div></div>`).join(''):'<div class="empty">등록된 펀딩 없음</div>'}function collectFunding(){return {items:Array.from(document.querySelectorAll('.fund')).map((row,i)=>({id:fundingData().items[i]?.id||('fund_'+Date.now()+'_'+i),title:row.querySelector('.ft').value.trim(),current:Number(row.querySelector('.fc').value||0),target:Number(row.querySelector('.fg').value||0),enabled:row.querySelector('.fe').value!=='false'})).filter(f=>f.title)}}function addFunding(){fundingData().items.push({id:'fund_'+Date.now(),title:'새 펀딩',current:0,target:100000,enabled:true});renderFunding()}function delFunding(i){if(confirm('삭제할까요?')){fundingData().items.splice(i,1);renderFunding()}}function karaokeData(){if(!settings.karaokeData)settings.karaokeData={title:'신청곡 받습니다!',notice:'신청곡이 등록되었습니다!',basicCoin:100,priorityCoin:300,songs:[]};if(!Array.isArray(settings.karaokeData.songs))settings.karaokeData.songs=[];return settings.karaokeData}function renderKaraoke(){const k=karaokeData();$('#karaokeTitle').value=k.title||'신청곡 받습니다!';$('#karaokeNotice').value=k.notice||'신청곡이 등록되었습니다!';$('#karaokeCoinBasic').value=Number(k.basicCoin||100);$('#karaokeCoinPriority').value=Number(k.priorityCoin||300);$('#songList').innerHTML=k.songs.filter(s=>s.status!=='완료'&&s.status!=='삭제').map((s,i)=>`<div class="item"><b>${i+1}. ${esc(s.title||'-')}</b><div class="small">신청자: ${esc(s.nick||'-')} / 상태: ${esc(s.status||'대기')}</div><select class="input" onchange="statusSong('${esc(s.id)}',this.value)">${['대기','진행','보류','완료'].map(st=>`<option value="${st}" ${s.status===st?'selected':''}>${st}</option>`).join('')}</select><div class="grid2"><button class="btn gray mini" onclick="editSong('${esc(s.id)}')">변경</button><button class="btn red mini" onclick="deleteSong('${esc(s.id)}')">삭제</button></div></div>`).join('')||'<div class="empty">등록된 선곡 없음</div>'}function addSong(){const k=karaokeData(),nick=$('#songNick').value.trim(),title=$('#songTitle').value.trim();if(!nick||!title)return toast('신청자와 곡명을 입력하세요');k.songs.push({id:'song_'+Date.now(),nick,title,status:'대기'});$('#songNick').value=$('#songTitle').value='';renderKaraoke()}function statusSong(id,status){const s=karaokeData().songs.find(x=>String(x.id)===String(id));if(s){s.status=status;renderKaraoke()}}function editSong(id){const s=karaokeData().songs.find(x=>String(x.id)===String(id));if(!s)return;const v=prompt('곡명 수정',s.title||'');if(v!==null){s.title=v.trim()||s.title;renderKaraoke()}}function deleteSong(id){if(!confirm('삭제할까요?'))return;const s=karaokeData().songs.find(x=>String(x.id)===String(id));if(s){s.status='삭제';renderKaraoke()}}function collectKaraoke(){const k=karaokeData();k.title=$('#karaokeTitle').value.trim()||'신청곡 받습니다!';k.notice=$('#karaokeNotice').value.trim();k.basicCoin=Number($('#karaokeCoinBasic').value||100);k.priorityCoin=Number($('#karaokeCoinPriority').value||300);return k}async function saveAll(){try{const overlaySections={};document.querySelectorAll('.sec').forEach(el=>overlaySections[el.dataset.key]=el.checked);const noticeColors=Array.from(document.querySelectorAll('.notice-color')).map(el=>el.value.trim()).filter(Boolean);await api('/api/settings',{method:'POST',body:JSON.stringify({overlaySections,noticeTitle:$('#noticeTitle').value.trim(),notice:$('#noticeText').value,noticeColors:noticeColors.length?noticeColors:['#ffffff'],fundingData:collectFunding(),karaokeData:collectKaraoke()})});toast('저장 완료');await load()}catch(e){alert(e.message)}}async function startTimer(){try{await api('/api/broadcast-timer/start',{method:'POST',body:'{}'});toast('방송 시작');await load()}catch(e){alert(e.message)}}async function endTimer(){if(!confirm('방송 종료?'))return;try{await api('/api/broadcast-timer/end',{method:'POST',body:'{}'});toast('방송 종료');await load()}catch(e){alert(e.message)}}async function sendSound(mode){try{const file=$('#manualFile').value.trim();if(!file)return toast('사운드 파일명을 입력하세요');await api('/api/sound-events',{method:'POST',body:JSON.stringify({title:$('#manualTitle').value.trim()||file,soundFile:file,repeatCount:Number($('#repeatCount').value||1),mode})});toast('전송 완료')}catch(e){alert(e.message)}}async function releaseQueue(){try{await api('/api/sound-events/release',{method:'POST',body:'{}'});toast('대기열 전송 완료')}catch(e){alert(e.message)}}function bindTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');$('#'+btn.dataset.tab).classList.add('active')}))}async function load(){settings=await api('/api/settings');renderHeader();renderToggles();renderNotice();renderFunding();renderKaraoke()}bindTabs();(async()=>{try{await load()}catch(e){alert(e.message)}})();</script></body></html>
