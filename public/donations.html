<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>전체 입력 리스트</title>
<link rel="stylesheet" href="/app.css">
<style>
  body{background:#070b12;color:#e5e7eb}
  .wrap{max-width:1280px;margin:0 auto;padding:22px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
  .title{font-size:28px;font-weight:900;letter-spacing:-.06em}
  .nav{display:flex;gap:8px;flex-wrap:wrap}
  .nav a,.btn{text-decoration:none;color:#dbeafe;background:#111827;border:1px solid #334155;padding:9px 12px;border-radius:11px;font-weight:900;cursor:pointer}
  .card{background:#0b1220;border:1px solid #253247;border-radius:18px;padding:16px}
  .resultBox{background:#08111f;border:1px solid #334155;border-radius:12px;padding:12px 14px;font-weight:900;color:#dbeafe;margin-bottom:14px}
  .table{width:100%;border-collapse:collapse;font-size:14px}
  .table th,.table td{border-bottom:1px solid #1f2937;padding:9px 8px;text-align:left;white-space:nowrap}
  .table th{color:#93c5fd;font-weight:900;background:#0f172a}
  .num{text-align:right!important;font-variant-numeric:tabular-nums}
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;color:#cbd5e1;font-weight:900}
</style>
<link rel="stylesheet" href="/ux_compact.css">
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">전체 입력 리스트</div>
    <div class="nav">
      <a href="/summary.html">합산으로</a>
      <a href="/creator_detail.html">크리에이터 전체</a>
      <a href="/control.html">방송컨트롤</a>
    </div>
  </div>

  <div id="currentBroadcast" class="resultBox">현재 방송 확인 중...</div>

  <section class="card">
    <table class="table">
      <thead><tr><th>시간</th><th>도네이터</th><th>크리에이터</th><th>계좌</th><th>투네</th><th>합산</th><th>처리</th><th>결과</th><th>메모</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="pager">
      <button class="btn" onclick="prevPage()">이전</button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn" onclick="nextPage()">다음</button>
    </div>
  </section>
</div>

<script src="/common.js"></script>
<script>
let summary = null;
let page = 1;
const pageSize = 30;

async function load(){
  summary = await api('/api/summary');
  $('#currentBroadcast').textContent = summary.broadcast ? `현재 방송: ${summary.broadcast.title}` : '현재 방송 없음';
  render();
}

function render(){
  const rows = (summary.donations || []).slice().reverse();
  const maxPage = Math.max(1, Math.ceil(rows.length / pageSize));
  if(page > maxPage) page = maxPage;
  const pageRows = rows.slice((page-1)*pageSize, (page-1)*pageSize + pageSize);

  $('#rows').innerHTML = pageRows.map(r => `
    <tr>
      <td>${new Date(r.createdAt).toLocaleString('ko-KR')}</td>
      <td>${esc(r.donor)}</td>
      <td>${esc(r.creator)}</td>
      <td class="num">${displayMan(r.accountAmount).toFixed(1)}</td>
      <td class="num">${displayMan(r.toonieAmount).toFixed(1)}</td>
      <td class="num"><b>${esc(r.displayAmount)}</b></td>
      <td>${esc(r.processType)}</td>
      <td>${esc(r.resultLabel)}</td>
      <td>${esc(r.memo)}</td>
    </tr>
  `).join('');

  $('#pageInfo').textContent = `${page} / ${maxPage}`;
}

function prevPage(){ if(page > 1){ page--; render(); } }
function nextPage(){
  const rows = (summary.donations || []);
  const maxPage = Math.max(1, Math.ceil(rows.length / pageSize));
  if(page < maxPage){ page++; render(); }
}

load();
</script>

<script>
(function preserveStationLinks(){
  const station = new URLSearchParams(location.search).get('station') || localStorage.getItem('STATION_SLUG') || 'default';
  localStorage.setItem('STATION_SLUG', station);
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    const href=a.getAttribute('href');
    if(!href || href.includes('station=') || href.startsWith('/api/')) return;
    const u=new URL(href, location.origin);
    u.searchParams.set('station', station);
    a.setAttribute('href', u.pathname+u.search+(u.hash||''));
  });
})();
</script>


<script>(function(){
  var path=location.pathname;
  if(path==='/overlay.html') return;
  var st=new URLSearchParams(location.search).get('station')||localStorage.getItem('STATION_SLUG')||'default';
  var a=document.createElement('a');
  a.className='quick-index-link';
  a.href='/creator_index.html?station='+encodeURIComponent(st);
  a.textContent='인덱스';
  document.body.appendChild(a);
})();</script>
</body>
</html>
