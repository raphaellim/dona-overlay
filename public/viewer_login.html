<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>방송매니저 로그인</title>
<style>
  body{margin:0;min-height:100vh;background:#070b12;color:#e5e7eb;font-family:Arial,'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center}
  .box{width:min(420px,92vw);background:#0b1220;border:1px solid #334155;border-radius:20px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  h1{margin:0 0 8px;font-size:26px}
  p{color:#94a3b8;line-height:1.5}
  input{width:100%;box-sizing:border-box;background:#070b12;color:#fff;border:1px solid #334155;border-radius:12px;padding:13px 14px;font-size:16px;margin:10px 0}
  button{width:100%;border:0;border-radius:12px;padding:13px 14px;background:#2563eb;color:#fff;font-weight:900;font-size:16px;cursor:pointer}
  .err{color:#ff8a8a;margin-top:10px;font-weight:900}
</style>
</head>
<body>
<div class="box">
  <h1>방송매니저 로그인</h1>
  <p>당일 방송 비밀번호로 모바일 운영 페이지에 접속합니다.</p>
  <input id="pw" type="password" placeholder="당일 방송 비밀번호" onkeydown="if(event.key==='Enter') login()">
  <button onclick="login()">입장</button>
  <div class="err" id="err"></div>
</div>
<script>
function isManagerNext(nextUrl){
  try{
    const u = new URL(nextUrl, location.origin);
    return ['/m_admin.html','/m_control.html','/m_roulette.html','/m_creator.html'].includes(u.pathname);
  }catch(_){ return false; }
}

async function login(){
  const params = new URLSearchParams(location.search);
  const station = params.get('station') || localStorage.getItem('STATION_SLUG') || 'default';
  const defaultNext = '/m_admin.html?station=' + encodeURIComponent(station);
  const nextParam = params.get('next');
  const next = nextParam || defaultNext;
  const managerMode = !nextParam || isManagerNext(next);
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try{
    const api = managerMode ? '/api/broadcast-login' : '/api/viewer-login';
    const res = await fetch(api + '?station=' + encodeURIComponent(station),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({station,password:pw})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || '입장 실패');
    localStorage.setItem('STATION_SLUG', station);
    location.href = next;
  }catch(e){ err.textContent = e.message; }
}
</script>
</body>
</html>
