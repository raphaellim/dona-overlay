<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><title>Overlay Debug</title>
<style>body{background:#111;color:#eee;font-family:monospace;padding:20px}pre{background:#000;padding:15px;border-radius:10px;white-space:pre-wrap}</style></head>
<body>
<h1>Overlay Debug</h1>
<pre id="out">loading...</pre>
<script>
Promise.all([
  fetch('/api/settings',{cache:'no-store'}).then(r=>r.json()),
  fetch('/api/summary',{cache:'no-store'}).then(r=>r.json())
]).then(([settings,summary])=>{
  document.getElementById('out').textContent=JSON.stringify({
    settingsOverlaySections:settings.overlaySections,
    summaryOverlaySections:summary.settings&&summary.settings.overlaySections,
    notice:settings.notice,
    donationsCount:(summary.donations||[]).length,
    latestDonation:(summary.donations||[]).slice(-1)[0]
  },null,2);
}).catch(e=>document.getElementById('out').textContent=e.message);
</script>
</body></html>
