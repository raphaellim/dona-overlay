<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><title>Overlay Debug</title>
<style>body{font-family:monospace;background:#111;color:#eee;padding:20px}pre{white-space:pre-wrap;background:#000;padding:16px;border-radius:12px}</style></head>
<body>
<h1>Overlay Debug</h1>
<pre id="out">loading...</pre>
<script>
Promise.all([
  fetch('/api/settings',{cache:'no-store'}).then(r=>r.json()).catch(e=>({error:e.message})),
  fetch('/api/summary',{cache:'no-store'}).then(r=>r.json()).catch(e=>({error:e.message}))
]).then(([settings,summary])=>{
  document.getElementById('out').textContent=JSON.stringify({
    settingsCreators:settings.creators,
    settingsPresets:settings.presets,
    broadcast:summary.broadcast,
    accountDonors:summary.accountDonors,
    creators:summary.creators,
    donationsCount:(summary.donations||[]).length,
    latestDonations:(summary.donations||[]).slice(-5)
  },null,2);
});
</script>
</body></html>
