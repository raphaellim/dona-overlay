<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>도네이터별 합산 리스트</title>
<link rel="stylesheet" href="/app.css">
<style>
  body{background:#070b12;color:#e5e7eb}
  .wrap{max-width:1220px;margin:0 auto;padding:22px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
  .title{font-size:28px;font-weight:900;letter-spacing:-.06em}
  .nav{display:flex;gap:8px;flex-wrap:wrap}
  .nav a,.btn{text-decoration:none;color:#dbeafe;background:#111827;border:1px solid #334155;padding:9px 12px;border-radius:11px;font-weight:900;cursor:pointer}
  .card{background:#0b1220;border:1px solid #253247;border-radius:18px;padding:16px;margin-bottom:14px}
  .resultBox{background:#08111f;border:1px solid #334155;border-radius:12px;padding:12px 14px;font-weight:900;color:#dbeafe;margin-bottom:14px}
  .summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
  .summary-box{background:#101827;border:1px solid #334155;border-radius:14px;padding:12px 13px}
  .summary-label{font-size:12px;color:#94a3b8;font-weight:900;margin-bottom:5px}
  .summary-value{font-size:24px;font-weight:900;letter-spacing:-.05em;color:#f8fafc}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tab{border:1px solid #334155;background:#111827;color:#dbeafe;padding:10px 14px;border-radius:999px;font-weight:900;cursor:pointer}
  .tab.active{background:#2563eb;border-color:#60a5fa;color:#fff}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  input,select{background:#070b12;color:#e5e7eb;border:1px solid #334155;border-radius:12px;padding:10px 12px;font-weight:900}
  input{min-width:240px}
  select{min-width:180px}
  .table{width:100%;border-collapse:collapse;font-size:14px}
  .table th,.table td{border-bottom:1px solid #1f2937;padding:9px 8px;text-align:left;white-space:nowrap}
  .table th{color:#93c5fd;font-weight:900;background:#0f172a}
  .table tr:hover td{background:#101827}
  .table tr.clickable{cursor:pointer}
  .num{text-align:right!important;font-variant-numeric:tabular-nums}
  .center{text-align:center!important}
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;color:#cbd5e1;font-weight:900}
  .selected td{background:#101827!important}
  .account-color{color:#7dd3fc;font-weight:900}
  .toonie-color{color:#c4b5fd;font-weight:900}
  .total-color{color:#fbbf24;font-weight:900}
  @media(max-width:900px){
    .top{align-items:flex-start;flex-direction:column}
    .summary-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">도네이터별 합산 리스트</div>
    <div class="nav">
      <a href="/summary.html">합산으로</a>
      <a href="/creator_detail.html">크리에이터 전체</a>
      <a href="/donations.html">전체 입력</a>
      <a href="/control.html">방송컨트롤</a>
    </div>
  </div>

  <div id="currentBroadcast" class="resultBox">현재 방송 확인 중...</div>

  <section class="card">
    <div class="tabs">
      <button class="tab active" id="tabAll" onclick="setMode('all')">전체</button>
      <button class="tab" id="tabAccount" onclick="setMode('account')">계좌만</button>
      <button class="tab" id="tabToonie" onclick="setMode('toonie')">투네만</button>
    </div>

    <div class="summary-grid">
      <div class="summary-box">
        <div class="summary-label">표시 도네이터 수</div>
        <div class="summary-value" id="totalDonorCount">0</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">계좌 총합</div>
        <div class="summary-value account-color" id="totalAccount">0</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">투네 총합</div>
        <div class="summary-value toonie-color" id="totalToonie">0</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">전체 합산</div>
        <div class="summary-value total-color" id="totalAll">0</div>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" placeholder="도네이터 검색" oninput="resetAndRender()">
      <select id="sortSelect" onchange="resetAndRender()">
        <option value="auto">선택 분류 기준 정렬</option>
        <option value="total">전체합계 높은순</option>
        <option value="account">계좌 높은순</option>
        <option value="toonie">투네 높은순</option>
        <option value="name">이름순</option>
      </select>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th class="center">순번</th>
          <th>도네이터</th>
          <th class="num">계좌합계</th>
          <th class="num">투네합계</th>
          <th class="num">전체합계</th>
          <th>최근처리</th>
          <th class="center">입력건수</th>
        </tr>
      </thead>
      <tbody id="donorRows"></tbody>
    </table>

    <div class="pager">
      <button class="btn" onclick="prevPage()">이전</button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn" onclick="nextPage()">다음</button>
    </div>
  </section>

  <section class="card">
    <div class="resultBox" id="selectedDonorTitle">도네이터를 선택하면 상세 내역이 표시됩니다.</div>
    <table class="table">
      <thead>
        <tr>
          <th>시간</th>
          <th>크리에이터</th>
          <th class="num">계좌</th>
          <th class="num">투네</th>
          <th class="num">합산</th>
          <th>처리</th>
          <th>결과</th>
          <th>메모</th>
        </tr>
      </thead>
      <tbody id="detailRows"></tbody>
    </table>
  </section>
</div>

<script src="/common.js"></script>
<script>
let summary = null;
let page = 1;
let selectedDonor = '';
let mode = 'all';
const pageSize = 20;

async function load(){
  summary = await api('/api/summary');
  $('#currentBroadcast').textContent = summary.broadcast ? `현재 방송: ${summary.broadcast.title}` : '현재 방송 없음';

  const params = new URLSearchParams(location.search);
  const m = params.get('mode');
  if(['all','account','toonie'].includes(m)) mode = m;

  applyTab();
  renderTopSummary();
  renderDonors();
}

function setMode(nextMode){
  mode = nextMode;
  page = 1;
  selectedDonor = '';
  history.replaceState(null, '', '/donor_detail.html?mode=' + mode);
  applyTab();
  renderTopSummary();
  renderDonors();
  renderDetail();
}

function applyTab(){
  $('#tabAll').classList.toggle('active', mode === 'all');
  $('#tabAccount').classList.toggle('active', mode === 'account');
  $('#tabToonie').classList.toggle('active', mode === 'toonie');
}

function fmtMan(won){
  return displayMan(Number(won || 0)).toFixed(1).replace(/\.0$/, '');
}

function baseDonors(){
  let rows = (summary?.donors || []).slice();

  if(mode === 'account'){
    rows = rows.filter(r => Number(r.account || 0) > 0);
  }

  if(mode === 'toonie'){
    rows = rows.filter(r => Number(r.toonie || 0) > 0);
  }

  return rows;
}

function renderTopSummary(){
  const donors = baseDonors();

  const account = donors.reduce((sum, r) => sum + Number(r.account || 0), 0);
  const toonie = donors.reduce((sum, r) => sum + Number(r.toonie || 0), 0);
  const total = donors.reduce((sum, r) => sum + Number(r.total || 0), 0);

  $('#totalDonorCount').textContent = String(donors.length);
  $('#totalAccount').textContent = fmtMan(account);
  $('#totalToonie').textContent = fmtMan(toonie);
  $('#totalAll').textContent = fmtMan(total);
}

function getFilteredDonors(){
  const q = ($('#searchInput').value || '').trim().toLowerCase();
  const sort = $('#sortSelect').value;

  let rows = baseDonors();

  if(q){
    rows = rows.filter(r => String(r.donor || '').toLowerCase().includes(q));
  }

  rows.sort((a,b) => {
    if(sort === 'account') return Number(b.account || 0) - Number(a.account || 0);
    if(sort === 'toonie') return Number(b.toonie || 0) - Number(a.toonie || 0);
    if(sort === 'total') return Number(b.total || 0) - Number(a.total || 0);
    if(sort === 'name') return String(a.donor || '').localeCompare(String(b.donor || ''), 'ko');

    if(mode === 'account') return Number(b.account || 0) - Number(a.account || 0);
    if(mode === 'toonie') return Number(b.toonie || 0) - Number(a.toonie || 0);
    return Number(b.total || 0) - Number(a.total || 0);
  });

  return rows;
}

function renderDonors(){
  const rows = getFilteredDonors();
  const maxPage = Math.max(1, Math.ceil(rows.length / pageSize));

  if(page > maxPage) page = maxPage;

  const start = (page - 1) * pageSize;
  const pageRows = rows.slice(start, start + pageSize);

  $('#donorRows').innerHTML = pageRows.map((r, idx) => `
    <tr class="clickable ${r.donor === selectedDonor ? 'selected' : ''}" onclick="selectDonor('${escAttr(r.donor)}')">
      <td class="center">${start + idx + 1}</td>
      <td><b>${esc(r.donor)}</b></td>
      <td class="num account-color">${r.accountText || fmtMan(r.account)}</td>
      <td class="num toonie-color">${r.toonieText || fmtMan(r.toonie)}</td>
      <td class="num total-color">${r.totalText || fmtMan(r.total)}</td>
      <td>${esc(r.latestProcess || '')}</td>
      <td class="center">${filteredDetailRows(r).length}</td>
    </tr>
  `).join('');

  $('#pageInfo').textContent = `${page} / ${maxPage}`;

  if(selectedDonor){
    renderDetail();
  }
}

function filteredDetailRows(donor){
  let rows = (donor?.rows || []).slice();

  if(mode === 'account'){
    rows = rows.filter(r => Number(r.accountAmount || 0) > 0);
  }

  if(mode === 'toonie'){
    rows = rows.filter(r => Number(r.toonieAmount || 0) > 0);
  }

  return rows;
}

function resetAndRender(){
  page = 1;
  renderTopSummary();
  renderDonors();
}

function selectDonor(name){
  selectedDonor = name;
  renderDonors();
  renderDetail();
}

function renderDetail(){
  const donor = (summary?.donors || []).find(r => r.donor === selectedDonor);

  if(!donor){
    $('#selectedDonorTitle').textContent = '도네이터를 선택하면 상세 내역이 표시됩니다.';
    $('#detailRows').innerHTML = '';
    return;
  }

  const detailRows = filteredDetailRows(donor).slice().reverse();

  const account = detailRows.reduce((sum, r) => sum + Number(r.accountAmount || 0), 0);
  const toonie = detailRows.reduce((sum, r) => sum + Number(r.toonieAmount || 0), 0);
  const total = detailRows.reduce((sum, r) => sum + Number(r.totalAmount || 0), 0);

  const modeText = mode === 'account' ? '계좌 상세' : mode === 'toonie' ? '투네 상세' : '전체 상세';

  $('#selectedDonorTitle').textContent =
    `${donor.donor} ${modeText} / 계좌 ${fmtMan(account)} / 투네 ${fmtMan(toonie)} / 합산 ${fmtMan(total)}`;

  $('#detailRows').innerHTML = detailRows.map(r => `
    <tr>
      <td>${new Date(r.createdAt).toLocaleString('ko-KR')}</td>
      <td>${esc(r.creator)}</td>
      <td class="num account-color">${fmtMan(r.accountAmount)}</td>
      <td class="num toonie-color">${fmtMan(r.toonieAmount)}</td>
      <td class="num total-color">${r.displayAmount || fmtMan(r.totalAmount)}</td>
      <td>${esc(r.processType || '')}</td>
      <td>${esc(r.resultLabel || '')}</td>
      <td>${esc(r.memo || '')}</td>
    </tr>
  `).join('');
}

function prevPage(){
  if(page > 1){
    page--;
    renderDonors();
  }
}

function nextPage(){
  const maxPage = Math.max(1, Math.ceil(getFilteredDonors().length / pageSize));
  if(page < maxPage){
    page++;
    renderDonors();
  }
}

function escAttr(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

load();
</script>

<script>
(function preserveStationLinks(){
  const station = new URLSearchParams(location.search).get('station') || localStorage.getItem('STATION_SLUG') || 'default';
  localStorage.setItem('STATION_SLUG', station);
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    const href=a.getAttribute('href');
    if(!href || href.includes('station=') || href.startsWith('/api/')) return;
    const u=new URL(href, location.origin);
    u.searchParams.set('station', station);
    a.setAttribute('href', u.pathname+u.search+(u.hash||''));
  });
})();
</script>

</body>
</html>
