<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>방송국 컨트롤</title>
<link rel="stylesheet" href="/app.css">
<style>
body{background:#070b12;color:#e5e7eb}.wrap{max-width:1180px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.title{font-size:30px;font-weight:950}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a{text-decoration:none;color:#dbeafe;background:#111827;border:1px solid #334155;padding:10px 14px;border-radius:12px;font-weight:900}.card{background:#0b1220;border:1px solid #253247;border-radius:18px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row{margin-bottom:10px}label{display:block;font-size:13px;color:#cbd5e1;font-weight:900;margin-bottom:6px}.input{width:100%;background:#070b12;color:#fff;border:1px solid #334155;border-radius:12px;padding:11px 12px}.btn{border:0;border-radius:12px;padding:10px 13px;font-weight:900;cursor:pointer;background:#334155;color:#fff}.green{background:#16a34a}.blue{background:#2563eb}.red{background:#dc2626}.mini{font-size:12px;padding:7px 9px}.broadcast{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid #334155;border-radius:14px;padding:12px;margin-bottom:8px;background:#0f172a}.broadcast.active{border-color:#22c55e}.muted{color:#94a3b8;font-size:13px}.mono{font-family:ui-monospace,Consolas,monospace}@media(max-width:900px){.grid,.broadcast{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="title" id="title">방송국 컨트롤</div>
      <div class="muted" id="info">방송국 정보 확인 중...</div>
    </div>
    <div class="nav">
      <a id="adminLink" href="/admin.html">입력</a>
      <a id="controlLink" href="/control.html">설정</a>
      <a id="summaryLink" href="/summary.html">합산</a>
      <a id="overlayLink" href="/overlay.html" target="_blank">오버레이</a>
    </div>
  </div>
  <div class="grid">
    <section class="card">
      <h2>새 방송 생성</h2>
      <div class="row"><label>방송 제목</label><input id="broadcastTitle" class="input" placeholder="0518 여행방송"></div>
      <div class="row"><label>방송 비밀번호</label><input id="broadcastPw" class="input" placeholder="이 방송 입력/설정용 비밀번호"></div>
      <button class="btn green" onclick="createBroadcast()">새 방송 시작</button>
      <hr style="border-color:#334155;margin:16px 0">
      <h2>현재 방송 비밀번호 입력</h2>
      <div class="row"><label>선택한 방송 비밀번호</label><input id="loginBroadcastPw" class="input" type="password"></div>
      <button class="btn blue" onclick="loginBroadcast()">방송 비밀번호 저장</button>
      <p class="muted">방송이 바뀌면 해당 방송 비밀번호를 한 번 입력하면 입력/설정 페이지 사용이 가능합니다.</p>
    </section>
    <section class="card">
      <h2>방송 목록</h2>
      <div id="broadcasts"></div>
    </section>
  </div>
</div>
<script src="/common.js"></script>
<script>
let station=null, active=null, broadcasts=[];
function st(){return getStation()}
function setLinks(){
  const s=encodeURIComponent(st());
  document.getElementById('adminLink').href='/admin.html?station='+s;
  document.getElementById('controlLink').href='/control.html?station='+s;
  document.getElementById('summaryLink').href='/summary.html?station='+s;
}
async function load(){
  setLinks();
  const info=await api('/api/station-info');
  station=info.station; active=info.active;
  document.getElementById('title').textContent=station.name+' 컨트롤';
  document.getElementById('info').textContent='방송국 코드: '+station.slug+' / 현재 방송: '+active.title;
  document.getElementById('overlayLink').href=`/overlay.html?station=${encodeURIComponent(station.slug)}&token=${encodeURIComponent(station.overlayToken)}`;
  const data=await api('/api/broadcasts');
  broadcasts=data.broadcasts||[];
  render();
}
function render(){
  document.getElementById('broadcasts').innerHTML=broadcasts.map(b=>`
    <div class="broadcast ${b.isActive?'active':''}">
      <div>
        <b>${esc(b.title)}</b> ${b.isActive?'<span class="muted">현재</span>':''}<br>
        <span class="muted">${new Date(b.createdAt).toLocaleString('ko-KR')} / 비번 ${b.hasPassword?'있음':'없음'}</span>
      </div>
      <div>
        ${b.isActive?'':`<button class="btn blue mini" onclick="activateBroadcast('${b.id}')">선택</button>`}
        <button class="btn red mini" onclick="deleteBroadcast('${b.id}')">삭제</button>
      </div>
    </div>
  `).join('');
}
async function createBroadcast(){
  try{
    await api('/api/broadcasts',{method:'POST',body:JSON.stringify({
      title:document.getElementById('broadcastTitle').value,
      broadcastPassword:document.getElementById('broadcastPw').value,
      activate:true
    })});
    document.getElementById('broadcastTitle').value='';
    document.getElementById('broadcastPw').value='';
    await load();
    alert('새 방송이 시작되었습니다.');
  }catch(e){alert(e.message)}
}
async function activateBroadcast(id){
  try{await api('/api/broadcasts/'+id+'/activate',{method:'POST',body:JSON.stringify({})});await load();alert('현재 방송 변경 완료')}catch(e){alert(e.message)}
}
async function deleteBroadcast(id){
  if(!confirm('삭제할까요? 현재 방송은 삭제할 수 없습니다.'))return;
  try{await api('/api/broadcasts/'+id,{method:'DELETE'});await load();}catch(e){alert(e.message)}
}
async function loginBroadcast(){
  try{
    await api('/api/broadcast-login',{method:'POST',body:JSON.stringify({password:document.getElementById('loginBroadcastPw').value})});
    alert('방송 비밀번호 저장 완료');
  }catch(e){alert(e.message)}
}
load();
</script>
</body>
</html>
