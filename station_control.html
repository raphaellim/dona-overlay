<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>방송국 로그인</title>
<style>
body{margin:0;min-height:100vh;background:#070b12;color:#e5e7eb;font-family:Arial,'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center}
.box{width:min(440px,92vw);background:#0b1220;border:1px solid #334155;border-radius:20px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
h1{margin:0 0 8px;font-size:28px} p{color:#94a3b8;line-height:1.5}
input{width:100%;box-sizing:border-box;background:#070b12;color:#fff;border:1px solid #334155;border-radius:12px;padding:13px 14px;font-size:16px;margin:7px 0}
button{width:100%;border:0;border-radius:12px;padding:13px 14px;background:#2563eb;color:#fff;font-weight:900;font-size:16px;cursor:pointer;margin-top:8px}
a{color:#93c5fd;text-decoration:none;font-weight:900}
.err{color:#ff8a8a;margin-top:10px;font-weight:900}
</style>
</head>
<body>
<div class="box">
  <h1>방송국 로그인</h1>
  <p>방송국 코드와 방송국 관리자 비밀번호를 입력하세요.</p>
  <input id="station" placeholder="방송국 코드 예: bbtv">
  <input id="pw" type="password" placeholder="방송국 관리자 비밀번호" onkeydown="if(event.key==='Enter') login()">
  <button onclick="login()">방송국 입장</button>
  <p><a href="/admin_login.html?next=/master.html">최고관리자 로그인</a></p>
  <div class="err" id="err"></div>
</div>
<script>
const params = new URLSearchParams(location.search);
document.getElementById('station').value = params.get('station') || localStorage.getItem('STATION_SLUG') || 'default';
async function login(){
  const station = document.getElementById('station').value.trim() || 'default';
  const pw = document.getElementById('pw').value;
  const next = params.get('next') || `/station_control.html?station=${encodeURIComponent(station)}`;
  const err = document.getElementById('err');
  err.textContent = '';
  try{
    const res = await fetch(`/api/station-login?station=${encodeURIComponent(station)}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({station,password:pw})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || '로그인 실패');
    localStorage.setItem('STATION_SLUG', station);
    location.href = next.includes('station=') ? next : next + (next.includes('?')?'&':'?') + 'station=' + encodeURIComponent(station);
  }catch(e){ err.textContent = e.message; }
}
</script>
</body>
</html>
